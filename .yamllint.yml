---
extends: default

ignore: |
  aviato/library/scaffold/files/*.yml
  aviato.egg-info/**
  build/**
  dist/**

rules:
  braces: disable
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines:
    max: 1
    max-end: 1
  line-length:
    max: 240
  truthy: disable
