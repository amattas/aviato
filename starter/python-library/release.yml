# Release — fires when you push a SemVer tag. Releasing is:
#   git tag 1.2.3 && git push origin 1.2.3
# Bump [project] version in pyproject.toml FIRST; the workflow refuses a mismatched tag.
# Copy to: .github/workflows/release.yml
#
# One-time: register the PyPI trusted publisher (pypi.org → Publishing) with
# workflow `release.yml` and NO environment. PyPI matches the workflow file
# containing the publish step, so this file must live in this repo.
#
# CUSTOMIZE:
#  - python-version
# The GitHub release is created LAST, after a successful publish, so a failed
# publish never leaves a published release with no package.
name: Release

on:
  push:
    tags: ["**"]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "${TAG}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'; then
            echo "::error::Tag '${TAG}' is not X.Y.Z (optionally -alphaN/-betaN)"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches the source version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "${version}" != "${TAG}" ]; then
            echo "::error::pyproject.toml version ${version} != tag ${TAG} — bump the version first"
            exit 1
          fi
      - name: Build and check
        run: |
          python -m pip install --quiet build==1.5.0 twine==6.2.0
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          args=(--generate-notes --verify-tag)
          case "${TAG}" in *-alpha*|*-beta*) args+=(--prerelease) ;; esac
          gh release create "${TAG}" "${args[@]}" dist/*
