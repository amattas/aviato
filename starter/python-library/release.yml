# Release — fires when you push a SemVer tag. Releasing is:
#   git tag 1.2.3 && git push origin 1.2.3
# Bump [project] version in pyproject.toml FIRST; the workflow refuses a mismatched tag.
# Copy to: .github/workflows/release.yml
#
# One-time: register the PyPI trusted publisher (pypi.org → Publishing) with
# workflow `release.yml` and environment `release`. PyPI matches the workflow
# file containing the publish step plus the environment — that's why this file
# must live in the repo itself. Referencing the environment auto-creates it on
# GitHub; no extra setup.
#
# CUSTOMIZE:
#  - python-version
# The GitHub release is created LAST, after a successful publish, so a failed
# publish never leaves a published release with no package.
name: Release

on:
  push:
    # Only digit-initiated tags: version-shaped tags (including malformed ones,
    # which fail validation LOUDLY — a typo'd release tag must not be a silent
    # no-op) trigger; v-prefixed legacy tags and non-version tags don't.
    tags: ["[0-9]*"]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release # must match the trusted publisher registration
    permissions:
      contents: write # create the GitHub release
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "${TAG}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'; then
            echo "::error::Tag '${TAG}' is not X.Y.Z (optionally -alphaN/-betaN)"
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches the source version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "${version}" != "${TAG}" ]; then
            echo "::error::pyproject.toml version ${version} != tag ${TAG} — bump the version first"
            exit 1
          fi
      - name: Build and check
        run: |
          python -m pip install --quiet build==1.5.0 twine==6.2.0
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1 (v1.14.1)
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          args=(--generate-notes --verify-tag)
          case "${TAG}" in *-alpha*|*-beta*) args+=(--prerelease) ;; esac
          gh release create "${TAG}" "${args[@]}" dist/*
