# Docs — build and deploy to GitHub Pages on every push to the default branch.
# Deliberately NOT tied to release tags: docs ship when they merge.
# Copy to: .github/workflows/docs.yml
# One-time: repo Settings → Pages → Source: GitHub Actions.
#
# CUSTOMIZE:
#  - DOCS_DIR if the Docusaurus site doesn't live in website/
#  - node-version
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCS_DIR: website

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      # PYTHON API DOCS (optional): generate an API reference from docstrings
      # before the site build — uncomment and set PACKAGE/-I path. The
      # `mdx.format: md` front matter is load-bearing: generated markdown
      # contains braces MDX treats as JSX expressions, failing the build.
      # Gitignore `website/docs/api/reference.md`; versioned snapshots commit
      # their own frozen copy when you cut a docs version.
      # - uses: actions/setup-python@v6
      #   with:
      #     python-version: "3.12"
      # - name: Generate API reference from docstrings
      #   run: |
      #     python -m pip install --quiet -e . "pydoc-markdown==4.8.2"
      #     mkdir -p website/docs/api
      #     {
      #       printf -- '---\ntitle: API Reference\nmdx:\n  format: md\n---\n\n'
      #       pydoc-markdown -I src -p PACKAGE
      #     } > website/docs/api/reference.md
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ env.DOCS_DIR }}/package-lock.json
      - name: Build
        working-directory: ${{ env.DOCS_DIR }}
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.DOCS_DIR }}/build
      - uses: actions/deploy-pages@v5
        id: deployment
