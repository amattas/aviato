# Zensical configuration — https://zensical.org/docs/setup/basics/
# Copy to the repo root. Docs versioning is handled by the Zensical fork of
# mike (see docs.yml); versions live on the gh-pages branch, "latest" is the
# default alias. Fill the ALL-CAPS placeholders.

[project]
site_name = "PROJECT"
site_url = "https://OWNER.github.io/REPO/"
repo_url = "https://github.com/OWNER/REPO"
repo_name = "OWNER/REPO"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"

[project.extra.version]
provider = "mike"
default = "latest"
alias = true

[project.theme]
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
