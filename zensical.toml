# Zensical configuration — instantiated from starter/docs-site/zensical.toml.
# Docs versioning is handled by the Zensical fork of mike (see
# .github/workflows/docs.yml); versions live on the gh-pages branch,
# "latest" is the default alias.

[project]
site_name = "Aviato"
site_description = "Reusable GitHub policy, CI, release, and onboarding conventions library."
site_author = "Anthony Mattas"
site_url = "https://amattas.github.io/aviato/"
repo_url = "https://github.com/amattas/aviato"
repo_name = "amattas/aviato"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"

# Explicit nav: keeps ordering deliberate and leaves working delivery artifacts
# (docs/superpowers/ plans) out of the published sidebar.
nav = [
  { "Overview" = "index.md" },
  { "Guide" = [
    { "Getting started" = "guide/getting-started.md" },
    { "CLI reference" = "guide/cli.md" },
    { "Releases and docs" = "guide/releases-and-docs.md" },
  ] },
  { "Architecture" = [
    { "Overview" = "architecture/overview.md" },
    { "Data flow" = "architecture/data-flow.md" },
    { "Infrastructure" = "architecture/infrastructure.md" },
    { "Validation" = "architecture/validation.md" },
    { "Security" = "architecture/security.md" },
  ] },
  { "Requirements" = [
    { "Index" = "requirements/README.md" },
    { "Traceability" = "requirements/traceability.md" },
    { "Core" = [
      { "Purpose" = "requirements/core/purpose.md" },
      { "Principles" = "requirements/core/principles.md" },
      { "Structure" = "requirements/core/structure.md" },
      { "Modularity" = "requirements/core/modularity.md" },
      { "State and failures" = "requirements/core/state-and-failures.md" },
      { "Definition of done" = "requirements/core/definition-of-done.md" },
      { "Glossary" = "requirements/core/glossary.md" },
      { "Backlog" = "requirements/core/backlog.md" },
    ] },
    { "Modules" = [
      { "Index" = "requirements/modules/README.md" },
      { "Onboarding" = "requirements/modules/onboarding/backlog.md" },
      { "Scaffolding" = "requirements/modules/scaffolding/backlog.md" },
      { "Drift" = "requirements/modules/drift/backlog.md" },
      { "Reconcile" = "requirements/modules/reconcile/backlog.md" },
      { "Fleet" = "requirements/modules/fleet/backlog.md" },
      { "Versioning" = "requirements/modules/versioning/backlog.md" },
      { "Offboarding" = "requirements/modules/offboarding/backlog.md" },
      { "Security" = "requirements/modules/security/backlog.md" },
      { "Languages" = [
        { "Index" = "requirements/modules/languages/README.md" },
        { "Python" = "requirements/modules/languages/python/backlog.md" },
        { "Node" = "requirements/modules/languages/node/backlog.md" },
        { "Swift" = "requirements/modules/languages/swift/backlog.md" },
      ] },
      { "Deployment" = [
        { "Index" = "requirements/modules/deployment/README.md" },
        { "Backlog" = "requirements/modules/deployment/backlog.md" },
        { "PyPI" = "requirements/modules/deployment/pypi/backlog.md" },
        { "GHCR" = "requirements/modules/deployment/ghcr/backlog.md" },
        { "Docs site" = "requirements/modules/deployment/docs-site/backlog.md" },
        { "Apple" = "requirements/modules/deployment/apple/backlog.md" },
      ] },
      { "Starter kit" = [
        { "Conventions" = "requirements/modules/starter-kit/conventions.md" },
        { "Backlog" = "requirements/modules/starter-kit/backlog.md" },
      ] },
    ] },
  ] },
  { "Specifications" = [
    { "Index" = "specifications/README.md" },
    { "Consumer contract" = "specifications/core/consumer-contract.md" },
    { "Onboarding" = [
      { "Flow" = "specifications/modules/onboarding/flow.md" },
      { "Bootstrap" = "specifications/modules/onboarding/bootstrap.md" },
    ] },
    { "Scaffolding" = [
      { "Sync" = "specifications/modules/scaffolding/sync.md" },
    ] },
    { "Drift" = [
      { "File drift" = "specifications/modules/drift/file-drift.md" },
      { "Settings drift" = "specifications/modules/drift/settings-drift.md" },
    ] },
    { "Reconcile" = [
      { "Flow" = "specifications/modules/reconcile/flow.md" },
      { "Consent" = "specifications/modules/reconcile/consent.md" },
    ] },
    { "Fleet" = [
      { "Diagnosis" = "specifications/modules/fleet/diagnosis.md" },
      { "Scan" = "specifications/modules/fleet/scan.md" },
    ] },
    { "Versioning" = [
      { "Release" = "specifications/modules/versioning/release.md" },
      { "Repin" = "specifications/modules/versioning/repin.md" },
    ] },
    { "Offboarding" = [
      { "Flow" = "specifications/modules/offboarding/flow.md" },
    ] },
    { "Security" = [
      { "Scanning" = "specifications/modules/security/scanning.md" },
      { "Supply chain" = "specifications/modules/security/supply-chain.md" },
    ] },
    { "Languages" = [
      { "Python" = "specifications/modules/languages/python/requirements.md" },
      { "Node" = "specifications/modules/languages/node/requirements.md" },
      { "Swift" = "specifications/modules/languages/swift/requirements.md" },
    ] },
    { "Deployment" = [
      { "PyPI" = "specifications/modules/deployment/pypi/requirements.md" },
      { "GHCR" = "specifications/modules/deployment/ghcr/requirements.md" },
      { "Docs site" = "specifications/modules/deployment/docs-site/requirements.md" },
      { "Apple" = "specifications/modules/deployment/apple/requirements.md" },
    ] },
    { "Starter kit" = [
      { "Documentation governance" = "specifications/modules/starter-kit/documentation-governance.md" },
    ] },
  ] },
  { "Security" = [
    { "Threat model" = "security/threat-model.md" },
    { "Controls" = "security/controls.md" },
  ] },
]

[project.extra.version]
provider = "mike"
default = "latest"
alias = true

[project.theme]
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
