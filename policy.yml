release:
  tag_pattern: '^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
  tag_format_description: 'vN.N.N, vN.N.N-alphaN, or vN.N.N-betaN'
  examples:
    valid:
      - v1.2.3
      - v1.2.3-alpha1
      - v1.2.3-beta2
    invalid:
      - 1.2.3
      - v1.2.3-beta.1
      - build-20260519.0215

branch:
  required_approvals_default: 1

rulesets:
  protect_default_branch_name: 'Common: protect default branch'
  release_tag_format_name: 'Common: release tag format'

