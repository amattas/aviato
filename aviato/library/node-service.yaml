name: node-service
workflows: node-service-wf
scaffold: node-service-sc
settings: baseline
requires_macos: false
variables:
  - {name: project-name, type: string}
  - {name: language-variant, type: enum, domain: [typescript, javascript]}
version_source:
  locations: [package.json]
toolchain:
  linter: eslint
  formatter: prettier
  type_checker: tsc
notes:
  - "Requires a seed-once container build definition before GHCR publishing (§13.2)."
  - "type-check runs only when language-variant is typescript (§12.2)."
docs_pipeline: docs-pages
prerequisites:
  container_build_definition: [Dockerfile]
