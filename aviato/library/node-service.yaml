name: node-service
identity: aviato-profile/node-service/v1
workflows: node-service-wf
scaffold: node-service-sc
settings: baseline
variables:
  - {name: serve-pages, type: boolean, required: false, default: false}
  # finding 28: read (never guessed) from the git remote / provision slug by the CLI
  # auto-detection tier; seeds the LICENSE/CODEOWNERS owner. Optional, NO default —
  # an unset optional is omitted from render vars so seed-once templates keep the
  # {{ owner }} placeholder instead of baking "None".
  - {name: owner, type: string, required: false}
  # seeds the zensical.toml site metadata (seed-once; unset leaves the placeholder)
  - {name: repo, type: string, required: false}
  # R4-3: optional; the consumer's default branch (default `main`), templated into the
  # generated callers' trigger filters and release-gate input for non-`main` repos.
  - {name: default-branch, type: string, required: false, default: main}
  - {name: project-name, type: string}
  - {name: language-variant, type: enum, domain: [typescript, javascript]}
version_source:
  locations: [package.json]
derived_variables:
  # Data-driven: the typecheck step is gated by the language-variant value.
  # Lives here (plug-in DATA), never as a literal in the agnostic core (§9b).
  - {name: run-typecheck, from: language-variant, cases: {javascript: "false"}, default: "true"}
  # JavaScript has no compile step; the production artifact is the Docker image (§13.2),
  # so the source-CI build gate is enabled only for TypeScript (tsc) — never a no-op pass.
  - {name: run-build, from: language-variant, cases: {javascript: "false"}, default: "true"}
toolchain:
  linter: eslint
  formatter: prettier
  type_checker: tsc
notes:
  - "Requires an OPERATOR-PROVIDED container build definition before GHCR publishing (§13.2; probed, never seeded — R5-6)."
  - "type-check runs only when language-variant is typescript (§12.2)."
docs_pipeline: docs-pages
prerequisites:
  container_build_definition: [Dockerfile]
