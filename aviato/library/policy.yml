library:
  repository: amattas/aviato

release:
  tag_pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
  tag_format_description: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
  examples:
    valid:
      - 1.2.3
      - 1.2.3-alpha1
      - 1.2.3-beta2
    invalid:
      - v1.2.3
      # finding 47: SemVer forbids leading zeros; 01.2.3 would otherwise be a
      # second tag normalizing to the same version key as 1.2.3.
      - 01.2.3
      - 1.02.3
      - 1.2.3-beta.1
      - build-20260519.0215

branch:
  required_approvals_default: 1
# R4-10: the ruleset `name` literals live in the ruleset JSON templates (their single source of
# truth); the previously-duplicated `rulesets.*_name` policy keys were never read by the renderer
# or settings, so they were a drift hazard and have been removed.
