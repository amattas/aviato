name: common
# Shared managed/seed-once files every profile materializes (§12.1 common
# scaffold). LICENSE is seed-once (non-annotatable, §6.3).
templates:
  - editorconfig
  - gitignore-common
  - license
  # §12.1 shared files (review finding 48): contributing, code owners, and
  # issue/PR templates — all seed-once (§6.3), the consumer owns them after seeding.
  - contributing
  - codeowners
  - issue-template-bug
  - issue-template-feature
  - pr-template
