name: aviato-library-sc
# Internal Library bootstrap scaffold: only the self-applied automation that can
# safely resolve through local workflow refs before any published Aviato ref exists.
templates:
  - wf-ci-python-library
  - wf-drift
  # Self-docs (operator decision 2026-06): the Library publishes its own versioned
  # Docusaurus site through the same §13.3 pipeline consumers get — one docs
  # version per release, matching the §2.6 pin model. Bootstrap renders the docs
  # caller through local workflow refs like the CI caller.
  - wf-docs-python-library
  - docs-npmrc
  - docs-eslint-config
  - docusaurus-config
  - docusaurus-config-algolia
  - docs-package
  - docs-sidebars
  - docs-intro
