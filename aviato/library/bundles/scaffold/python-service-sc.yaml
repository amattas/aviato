name: python-service-sc
# Adds the profile's caller workflows (verify/release/deploy/security + drift)
# to the language scaffold, so a consumer actually receives them (§15).
extends: python-sc
add:
  # A container service has no wheel: swap the pyproject manifest (removed below) for a
  # packaging-free VERSION version-source + a requirements-dev.txt the CI installs (§13.2).
  - python-version-file
  - python-dev-deps
  # R4-1: swap the strict library mypy.ini for a genuinely non-strict service config (same output
  # path), so the caller's non-strict type-check intent is actually delivered.
  - python-typecheck-config-service
  # Seed-once root-level skeleton (packaging-free service, §13.2) so first CI is green (§13.3).
  - python-service-main
  - python-service-test
  - python-requirements
  - wf-ci-python-service
  - wf-docs-python-service
  - zensical-config
  - docs-intro
  - docs-requirements
remove:
  # python-sc seeds pyproject.toml (the library packaging manifest); a container service that
  # builds via its Dockerfile and installs from requirements.txt does not use it (§13.2).
  - python-manifest
  # R4-1: replaced by python-typecheck-config-service (non-strict mypy.ini) above.
  - python-typecheck-config
