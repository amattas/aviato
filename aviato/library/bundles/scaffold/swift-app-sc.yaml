name: swift-app-sc
# Adds the profile's caller workflows (verify/release/deploy/security + drift)
# to the language scaffold, so a consumer actually receives them (§15).
extends: swift-sc
add:
  - wf-ci-swift-app
  - wf-drift
  - wf-docs-swift-app
  - docs-npmrc
  - docs-eslint-config
  - docusaurus-config
  - docusaurus-config-algolia
  - docs-package
  - docs-sidebars
  - docs-intro
remove: []
