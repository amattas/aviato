name: baseline
# Desired protected-resource settings every day-zero profile enforces (§3.2,
# §15). Branch protection plus the named rulesets applied by the operator-gated
# reconcile (§5.7). Terminology uses "default branch", never "main" (§ARCH).
settings:
  default_branch:
    requires_pull_request: true
    required_reviews: 1
    dismiss_stale_reviews: true
    require_thread_resolution: true
    block_force_push: true
    block_deletion: true
    # Administrators are subject to branch protection (no admin bypass). Modeled as desired
    # state so it is part of the §5.7 reviewed/consented diff — never silently forced by the
    # apply outside the diff the operator confirmed (§2.9).
    enforce_admins: true
    # Verify/security checks required to merge (§10) are NOT hardcoded here: they are
    # derived at composition time from the status_check each composed pipeline
    # declares (common-lint, security-baseline heartbeat, and the per-language verify
    # job). Single source of truth — a profile cannot require a check it never runs.
  # finding 42 (R4-10 rationale): the ruleset NAMES are deliberately NOT listed here —
  # they were a third unchecked copy that could silently desync from the rendered
  # manifest. The ruleset manifest (aviato/library/rulesets.yml) is the single source.
  # Always-on security baseline (§2.13). These are repo-level GitHub features the
  # operator enables out-of-band (§17, probeable by diagnosis §5.4); modeled here as
  # desired state so a profile cannot silently omit them.
  # Repo-level security toggles reconciled by §5.6/§5.7 (read + diff + apply).
  # Code scanning (SAST) is delivered by the CodeQL `security-baseline` PIPELINE
  # (always composed, §2.13) and the scaffolded workflow — not a repo toggle —
  # so it is not listed here (it would otherwise be perpetually un-reconcilable).
  security:
    secret_scanning: true
    secret_push_protection: true
    dependency_scanning: true
  # Repo-level PR merge-method toggles, reconciled by §5.6/§5.7 (read + diff + apply). GitHub
  # returns these as top-level booleans on the repo GET and accepts them 1:1 on the repo PATCH.
  # Managed for fleet consistency (operator decision 2026-07-11): every managed repo allows all
  # three merge methods so contributors get a uniform merge UI across the fleet — modeled as
  # desired state so a repo that flips one off drifts and is caught by the §5.7 reviewed diff.
  repository:
    allow_merge_commit: true
    allow_squash_merge: true
    allow_rebase_merge: true
