name: baseline
# Desired protected-resource settings every day-zero profile enforces (§3.2,
# §15). Branch protection plus the named rulesets applied by the operator-gated
# reconcile (§5.7). Terminology uses "default branch", never "main" (§ARCH).
settings:
  default_branch:
    requires_pull_request: true
    required_reviews: 1
    dismiss_stale_reviews: true
    require_thread_resolution: true
    block_force_push: true
    block_deletion: true
  rulesets:
    - "Common: protect default branch"
    - "Common: release tag format"
  # Always-on security baseline (§2.13). These are repo-level GitHub features the
  # operator enables out-of-band (§17, probeable by diagnosis §5.4); modeled here as
  # desired state so a profile cannot silently omit them.
  security:
    code_scanning: true
    secret_scanning: true
    secret_push_protection: true
    dependency_scanning: true
