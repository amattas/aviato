name: python-component
# Zero-deploy profile (§10.3): GitHub release is the only output, no deploy plug-in.
workflows: python-component-wf
scaffold: python-component-sc
settings: baseline
requires_macos: false
variables:
  # §12.1 Python plug-in vars: the wheel/distribution name (the pyproject [project] name) and
  # the import package name. (A component publishes no index artifact, but it still builds a
  # wheel whose [project] name is the distribution name.)
  - {name: distribution-name, type: string}
  - {name: import-name, type: string}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
docs_pipeline: docs-pages
