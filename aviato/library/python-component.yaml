name: python-component
identity: aviato-profile/python-component/v1
# Zero-deploy profile (§10.3): GitHub release is the only output, no deploy plug-in.
workflows: python-component-wf
scaffold: python-component-sc
settings: baseline
variables:
  - {name: serve-pages, type: boolean, required: false, default: false}
  # finding 28: read (never guessed) from the git remote / provision slug by the CLI
  # auto-detection tier; seeds the LICENSE/CODEOWNERS owner. Optional, NO default —
  # an unset optional is omitted from render vars so seed-once templates keep the
  # {{ owner }} placeholder instead of baking "None".
  - {name: owner, type: string, required: false}
  # seeds the zensical.toml site metadata (seed-once; unset leaves the placeholder)
  - {name: repo, type: string, required: false}
  - {name: project-name, type: string, required: false}
  # R4-3: optional; the consumer's default branch (default `main`), templated into the
  # generated callers' trigger filters and release-gate input for non-`main` repos.
  - {name: default-branch, type: string, required: false, default: main}
  # §12.1 Python plug-in vars: the wheel/distribution name (the pyproject [project] name) and
  # the import package name. (A component publishes no index artifact, but it still builds a
  # wheel whose [project] name is the distribution name.)
  - {name: distribution-name, type: string}
  - {name: import-name, type: string}
  # Same strict-mypy default as python-library; a consumer can disable without
  # hand-editing the managed caller (review finding 49).
  - {name: run-typecheck, type: string, required: false, default: "true"}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
docs_pipeline: docs-pages
