name: aviato-library
workflows: python-library-wf
scaffold: aviato-library-sc
settings: baseline
variables:
  # The Library's own source predates a typing migration; consumers keep the
  # strict-mypy default from python-library.
  - {name: run-typecheck, type: string, required: false, default: "false"}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Internal bootstrap profile for Aviato's own self-applied automation (§5.10)."
