name: aviato-library
workflows: python-library-wf
scaffold: aviato-library-sc
settings: baseline
variables:
  # finding 38: the typing migration is COMPLETE for the package (mypy --strict
  # aviato is clean); the Library now runs the gate it mandates for consumers,
  # scoped to the package via typecheck-command (tests are a follow-up).
  - {name: run-typecheck, type: string, required: false, default: "true"}
  # finding 38: the type-check COMMAND is a variable so the Library can scope strict
  # mypy to its package (tests pending) while consumers keep the strict-everything
  # default from reusable-python-ci.
  - {name: typecheck-command, type: string, required: false, default: "python -m mypy --strict ."}
  # Self-docs: the API-reference emit command targets the import package.
  - {name: import-name, type: string}
  # seeds the zensical.toml site metadata (seed-once; unset leaves the placeholder)
  - {name: owner, type: string, required: false}
  - {name: repo, type: string, required: false}
  - {name: project-name, type: string, required: false}
docs_pipeline: docs-pages
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Internal bootstrap profile for Aviato's own self-applied automation (§5.10)."
