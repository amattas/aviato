name: aviato-library
identity: aviato-profile/aviato-library/v1
workflows: python-library-wf
scaffold: aviato-library-sc
settings: baseline
variables:
  - {name: serve-pages, type: boolean, required: false, default: false}
  # finding 38: the typing migration is COMPLETE for the package and tests;
  # the Library now runs the gate it mandates for consumers.
  - {name: run-typecheck, type: string, required: false, default: "true"}
  - {name: typecheck-command, type: string, required: false, default: "python -m mypy --strict aviato tests"}
  # Used only when the optional docs capability is enabled for this profile.
  - {name: import-name, type: string}
  # seeds the zensical.toml site metadata (seed-once; unset leaves the placeholder)
  - {name: owner, type: string, required: false}
  - {name: repo, type: string, required: false}
  - {name: project-name, type: string, required: false}
docs_pipeline: docs-pages
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Internal bootstrap profile for Aviato's own self-applied automation (§5.10)."
