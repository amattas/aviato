# Compatibility-only aggregate descriptors used by v1 snapshot inspection. No v2
# profile selects them; graph mutation continues to reject a selected legacy node.
release:
  privileges: ["contents: read", "contents: write", "pull-requests: write", "actions: write", "issues: read", "statuses: write"]
  secrets: *verifier-secrets
  runner: ubuntu-latest
release-gate:
  privileges: ["actions: read", "contents: read", "pull-requests: read"]
  runner: ubuntu-latest
docs-pages:
  privileges: ["actions: read", "contents: read", "contents: write", "pages: read", "pages: write", "id-token: write"]
  secrets: *verifier-secrets
  runner: ubuntu-latest
