app-store-connect:
  identity: pipeline/app-store-connect/v2
  envelope: ci
  privileges: ["actions: read", "attestations: write", "contents: write", "id-token: write"]
  environment_input: environment-name
  secrets: &appstore-secrets
    [APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_API_PRIVATE_KEY, APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE_BASE64, AVIATO_VERIFIER_APP_ID, AVIATO_VERIFIER_APP_PRIVATE_KEY]
  runner: macos-latest
  jobs:
    app-store-connect:
      identity: job/app-store-connect/v2
      fragment: workflow-fragments/app-store-connect.yml
      needs: [release, release-gate, security]
      permissions: ["actions: read", "attestations: write", "contents: write", "id-token: write"]
      secrets: *appstore-secrets
      runner: macos-latest
      environment_input: environment-name
      authorization_gate: release-gate
      authorization_outputs: [gated-sha, checkpoint-digest, verified-envelope-digest]

docs-python-library: &docs-python-library
  identity: pipeline/docs-python-library/v2
  envelope: docs
  privileges: &docs-privileges ["actions: read", "contents: write", "pull-requests: read", "security-events: write", "pages: write", "id-token: write"]
  secrets: *verifier-secrets
  artifacts: [zensical-config, docs-intro, docs-requirements]
  triggers:
    workflow_run:
      workflows: {add: ["{{ workflow-name }}"]}
      types: {add: [completed]}
      branches: {add: ["{{ default-branch }}"]}
  jobs: &docs-python-library-jobs
    docs-resolve:
      identity: job/docs-python-library-resolve/v2
      fragment: workflow-fragments/docs-resolve.yml
      permissions: ["contents: read"]
      runner: ubuntu-latest
    docs-release-gate:
      identity: job/docs-python-library-gate/v2
      fragment: workflow-fragments/docs-release-gate.yml
      needs: [docs-resolve]
      permissions: ["actions: read", "contents: read", "pull-requests: read"]
      runner: ubuntu-latest
    docs-security:
