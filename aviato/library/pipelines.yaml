security-baseline:
  identity: pipeline/security-baseline/v2
  envelope: ci
  always_on: true
  privileges: ["contents: read", "pull-requests: read", "security-events: write", "actions: read"]
  runner: ubuntu-latest
  status_check: "security / Security baseline heartbeat"
  triggers:
    schedule:
      add: [{cron: "23 5 * * 1"}]
  jobs:
    security:
      identity: job/security-baseline/v2
      fragment: workflow-fragments/security-baseline.yml
      permissions: ["contents: read", "pull-requests: read", "security-events: write", "actions: read"]
      runner: ubuntu-latest
      status_check: "security / Security baseline heartbeat"
  code_scanning_tool:
    tool: CodeQL
    alerts_threshold: none
    security_alerts_threshold: high_or_higher

common-lint:
  identity: pipeline/common-lint/v2
  envelope: ci
  privileges: ["contents: read"]
  runner: ubuntu-latest
  status_check: "common-lint / Common lint"
  jobs:
    common-lint:
      identity: job/common-lint/v2
      fragment: workflow-fragments/common-lint.yml
      permissions: ["contents: read"]
      runner: ubuntu-latest
      status_check: "common-lint / Common lint"

drift-automation:
  identity: pipeline/drift-automation/v2
  envelope: drift
  always_on: true
  privileges: ["contents: write", "pull-requests: write", "issues: write"]
  secrets: [AVIATO_SETTINGS_TOKEN]
  runner: ubuntu-latest
  triggers:
    schedule:
      add: [{cron: "17 6 * * 1"}]
    workflow_dispatch: {}
  jobs:
    drift:
      identity: job/drift-automation/v2
      fragment: workflow-fragments/drift-automation.yml
      permissions: ["contents: write", "pull-requests: write", "issues: write"]
      secrets: [AVIATO_SETTINGS_TOKEN]
      runner: ubuntu-latest

python-verify:
  identity: pipeline/python-verify/v2
  envelope: ci
  privileges: ["contents: read"]
  runner: ubuntu-latest
  status_check: "ci / Python CI"
  triggers: &verify-triggers
    pull_request:
      branches: {add: ["{{ default-branch }}"]}
    push:
      branches: {add: ["{{ default-branch }}"]}
  jobs:
    ci:
      identity: job/python-verify/v2
      fragment: workflow-fragments/python-verify.yml
      permissions: ["contents: read"]
      runner: ubuntu-latest
      status_check: "ci / Python CI"

node-verify:
  identity: pipeline/node-verify/v2
  envelope: ci
  privileges: ["contents: read"]
  runner: ubuntu-latest
  status_check: "ci / Node CI"
  triggers: *verify-triggers
  jobs:
    ci:
      identity: job/node-verify/v2
      fragment: workflow-fragments/node-verify.yml
      permissions: ["contents: read"]
      runner: ubuntu-latest
      status_check: "ci / Node CI"

swift-verify:
  identity: pipeline/swift-verify/v2
  envelope: ci
  privileges: ["contents: read"]
  runner: macos-latest
  status_check: "ci / Swift CI"
  triggers: *verify-triggers
  jobs:
    ci:
      identity: job/swift-verify/v2
      fragment: workflow-fragments/swift-verify.yml
      permissions: ["contents: read"]
      runner: macos-latest
      status_check: "ci / Swift CI"

release-python:
  identity: pipeline/release-python/v2
  envelope: ci
  privileges: &release-privileges ["contents: write", "pull-requests: write", "actions: write", "issues: read", "statuses: write"]
  secrets: &verifier-secrets [AVIATO_VERIFIER_APP_ID, AVIATO_VERIFIER_APP_PRIVATE_KEY]
  triggers: &release-triggers
    workflow_dispatch:
      inputs:
        promotion: {description: "Closed release promotion mode", required: true, type: boolean, default: false}
        merged-sha: {description: "Exact merged default-branch SHA", required: false, type: string, default: ""}
        intended-tag: {description: "Exact SemVer tag", required: false, type: string, default: ""}
        intended-actor: {description: "Exact signed release actor", required: false, type: string, default: ""}
        checkpoint-digest: {description: "Canonical checkpoint digest", required: false, type: string, default: ""}
  jobs: &release-python-jobs
    status-bridge:
      identity: job/release-python-status-bridge/v2
      fragment: workflow-fragments/release-status-bridge.yml
      needs: [ci, security, common-lint]
      permissions: ["statuses: write"]
      runner: ubuntu-latest
    release:
      identity: job/release-python/v2
      fragment: workflow-fragments/release-python.yml
      inputs: [promotion, merged-sha, intended-tag, intended-actor, checkpoint-digest]
      needs: [ci, security, common-lint]
      permissions: ["contents: write", "pull-requests: write", "actions: write", "issues: read"]
      secrets: *verifier-secrets
      runner: ubuntu-latest
    release-gate:
      identity: job/release-python-gate/v2
      fragment: workflow-fragments/release-gate.yml
      inputs: [checkpoint-digest, intended-actor, merged-sha]
      needs: [release]
      permissions: ["actions: read", "contents: read", "pull-requests: read"]
      runner: ubuntu-latest

release-node:
  identity: pipeline/release-node/v2
  envelope: ci
  privileges: *release-privileges
  secrets: *verifier-secrets
  triggers: *release-triggers
  jobs:
    status-bridge:
      identity: job/release-node-status-bridge/v2
      fragment: workflow-fragments/release-status-bridge.yml
      needs: [ci, security, common-lint]
      permissions: ["statuses: write"]
      runner: ubuntu-latest
    release:
      identity: job/release-node/v2
      fragment: workflow-fragments/release-node.yml
      inputs: [promotion, merged-sha, intended-tag, intended-actor, checkpoint-digest]
      needs: [ci, security, common-lint]
      permissions: ["contents: write", "pull-requests: write", "actions: write", "issues: read"]
      secrets: *verifier-secrets
      runner: ubuntu-latest
    release-gate:
      identity: job/release-node-gate/v2
      fragment: workflow-fragments/release-gate.yml
      inputs: [checkpoint-digest, intended-actor, merged-sha]
      needs: [release]
      permissions: ["actions: read", "contents: read", "pull-requests: read"]
      runner: ubuntu-latest

release-swift:
  identity: pipeline/release-swift/v2
  envelope: ci
  privileges: *release-privileges
  secrets: *verifier-secrets
  triggers: *release-triggers
  jobs:
    status-bridge:
      identity: job/release-swift-status-bridge/v2
      fragment: workflow-fragments/release-status-bridge.yml
      needs: [ci, security, common-lint]
      permissions: ["statuses: write"]
      runner: ubuntu-latest
    release:
      identity: job/release-swift/v2
      fragment: workflow-fragments/release-swift.yml
      inputs: [promotion, merged-sha, intended-tag, intended-actor, checkpoint-digest]
      needs: [ci, security, common-lint]
      permissions: ["contents: write", "pull-requests: write", "actions: write", "issues: read"]
      secrets: *verifier-secrets
      runner: ubuntu-latest
    release-gate:
      identity: job/release-swift-gate/v2
      fragment: workflow-fragments/release-gate.yml
      inputs: [checkpoint-digest, intended-actor, merged-sha]
      needs: [release]
      permissions: ["actions: read", "contents: read", "pull-requests: read"]
      runner: ubuntu-latest

pypi-publish:
  identity: pipeline/pypi-publish/v2
  envelope: ci
  required_pipelines: [release-python]
  privileges: ["actions: read", "contents: read", "id-token: write", "attestations: write"]
  environment: pypi
  secrets: *verifier-secrets
  jobs:
    pypi:
      identity: job/pypi-build/v2
      fragment: workflow-fragments/pypi-build.yml
      needs: [release, release-gate, security]
      permissions: ["contents: read"]
      secrets: *verifier-secrets
      runner: ubuntu-latest
    pypi-publish:
      identity: job/pypi-publish/v2
      fragment: workflow-fragments/pypi-publish.yml
      needs: [release-gate, pypi]
      permissions: ["actions: read", "contents: read", "id-token: write", "attestations: write"]
      secrets: *verifier-secrets
      runner: ubuntu-latest
      environment: pypi
      authorization_gate: release-gate
      authorization_outputs: [gated-sha, checkpoint-digest, verified-envelope-digest]
  reusable_privileges: ["actions: read", "contents: read"]
  local_publisher_privileges: ["actions: read", "contents: read", "id-token: write", "attestations: write"]

ghcr-publish:
  identity: pipeline/ghcr-publish/v2
  envelope: ci
  privileges: ["actions: read", "contents: read", "packages: write", "security-events: write", "id-token: write", "attestations: write"]
  environment: ghcr
  secrets: *verifier-secrets
  runner: ubuntu-latest
  jobs:
    docker:
      identity: job/ghcr-publish/v2
      fragment: workflow-fragments/ghcr-publish.yml
