name: swift-app
identity: aviato-profile/swift-app/v1
workflows: swift-app-wf
scaffold: swift-app-sc
settings: baseline
variables:
  - {name: serve-pages, type: boolean, required: false, default: false}
  # finding 28: read (never guessed) from the git remote / provision slug by the CLI
  # auto-detection tier; seeds the LICENSE/CODEOWNERS owner. Optional, NO default —
  # an unset optional is omitted from render vars so seed-once templates keep the
  # {{ owner }} placeholder instead of baking "None".
  - {name: owner, type: string, required: false}
  # seeds the zensical.toml site metadata (seed-once; unset leaves the placeholder)
  - {name: repo, type: string, required: false}
  - {name: project-name, type: string, required: false}
  # R4-3: optional; the consumer's default branch (default `main`), templated into the
  # generated callers' trigger filters and release-gate input for non-`main` repos.
  - {name: default-branch, type: string, required: false, default: main}
  - {name: product-scheme, type: string}
  - {name: workspace, type: string, required: false, default: ""}
  - {name: project, type: string, required: false, default: ""}
  - {name: bundle-identifier, type: string}
  - {name: team-id, type: string}
  - {name: export-method, type: enum, domain: [app-store, ad-hoc, development]}
  - {name: environment-name, type: string, required: false, default: app-store-connect}
  - {name: export-options-plist, type: string, required: false, default: ""}
  - {name: version-command, type: string, required: false, default: ""}
  - {name: build-number, type: string, required: false, default: ""}
  - {name: working-directory, type: string, required: false, default: "."}
  - {name: xcode-version, type: string, required: false, default: ""}
  - {name: destination, type: string, required: false, default: "platform=iOS Simulator,name=iPhone 16"}
variable_constraints:
  any_of:
    - [workspace, project]
version_source:
  # DAY-ZERO PLACEHOLDER (§12.3/§13.4.6): a real Xcode app keeps the marketing version +
  # CURRENT_PROJECT_VERSION/CFBundleVersion in <Scheme>.xcodeproj/project.pbxproj (and/or an
  # Info.plist), whose path varies per project. The operator OVERRIDES version_source.locations
  # in their declaration to point at their actual file(s); `bump-version` names the expected
  # locations and exits non-zero if none exist, so a wrong default fails loud, never silently.
  locations: [project.pbxproj, Info.plist]
toolchain:
  linter: swiftlint
  formatter: swift-format
notes:
  - "Apple App Store Connect deploy requires stored secrets behind a protected environment (§13.4)."
  - "The deploy secrets are declared by the deploy plug-in, never in the declaration (§6.6)."
  - "version_source.locations is a day-zero placeholder; override it for your Xcode layout (§12.3)."
docs_pipeline: docs-pages
