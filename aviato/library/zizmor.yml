# §11.3 single source of truth for action/image pinning, shipped in the wheel and passed to
# zizmor via `--config` by `aviato lint-actions` (so every consumer gets the Library policy
# without authoring their own config). Most-specific pattern wins.
#
# Only `unpinned-uses` and `unpinned-images` are GATED by aviato today (see
# aviato/plugins/zizmor_scan.py:_GATED_AUDITS). zizmor still runs its other audits; their
# findings are intentionally ignored here until explicitly adopted.
rules:
  unpinned-uses:
    config:
      policies:
        actions/*: ref-pin          # first-party GitHub — branch/tag allowed
        github/*: ref-pin
        # The sanctioned mutable self-ref is the reusable WORKFLOW (§6.1/§11.3). R10-5: ideally this
        # would be scoped to `amattas/aviato/.github/workflows/*`, but zizmor matches policies at
        # REPO granularity (owner/* or owner/repo — a deep subpath glob is rejected as an invalid
        # pattern), and a reusable-workflow ref and a composite-action ref share the repo
        # `amattas/aviato`, so the workflow-only form is not expressible. This broad exemption is
        # SAFE because the Library ships ONLY reusable workflows under this repo — there is no
        # `amattas/aviato/<action>` to reference. If a composite action is ever added here, add a
        # supplementary Python uses-check for non-workflow `amattas/aviato/*` refs (the §9b boundary).
        amattas/aviato/*: ref-pin
        "*": hash-pin                # everything else: 40-hex SHA required
