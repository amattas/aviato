name: python-library
workflows: python-library-wf
scaffold: python-library-sc
settings: baseline
variables:
  # R4-3: optional; the consumer's default branch (default `main`), templated into the
  # generated callers' trigger filters and release-gate input for non-`main` repos.
  - {name: default-branch, type: string, required: false, default: main}
  - {name: distribution-name, type: string}
  - {name: import-name, type: string}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Requires PyPI Trusted Publishing registration for the deploy pipeline (§13.1)."
docs_pipeline: docs-pages
