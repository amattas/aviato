name: Aviato Python Library

on:
  pull_request:
    branches: ["{{ default-branch }}"]
  push:
    branches: ["{{ default-branch }}"]
    tags:
      - "*.*.*"
  schedule:
    - cron: "23 5 * * 1"
  # §5.9: lets the release propose phase dispatch this workflow at the
  # release/<next> branch (workflow_dispatch is exempt from GITHUB_TOKEN event
  # suppression), so the release PR reports the same required status checks as
  # any human branch.
  workflow_dispatch:

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release propose-dispatch: actions:write; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: write
  statuses: write
  id-token: write
  attestations: write

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: {{ aviato-workflow-prefix }}reusable-python-ci.yml{{ aviato-workflow-suffix }}
    with:
      python-version: "3.12"
      install-command: "python -m pip install -e .[dev]"
      lint-command: "python -m ruff check ."
      test-command: "python -m pytest --cov --cov-report=term-missing"
      build-command: "python -m build"
      typecheck-command: "{{ typecheck-command }}"
      run-typecheck: {{ run-typecheck }}
      run-build: true

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: {{ aviato-workflow-prefix }}reusable-security-baseline.yml{{ aviato-workflow-suffix }}
    with:
      codeql-languages: "python"

  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: {{ aviato-workflow-prefix }}reusable-common-lint.yml{{ aviato-workflow-suffix }}
    with:
      aviato-ref: {{ aviato-ref }}
      local-install: {{ aviato-local-install }}

  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: [ci, security, common-lint]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish Python CI status
        env:
          STATUS_CONTEXT: "ci / Python CI"
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure' }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="${STATUS_CONTEXT}"
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: "security / Security baseline heartbeat"
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure' }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="${STATUS_CONTEXT}"
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: "common-lint / Common lint"
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' || 'failure' }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="${STATUS_CONTEXT}"

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security, common-lint]
    uses: {{ aviato-workflow-prefix }}reusable-release.yml{{ aviato-workflow-suffix }}
    with:
      aviato-ref: {{ aviato-ref }}
      local-install: {{ aviato-local-install }}

  # Gate before deploy. Two entry points: IN-RUN (release just tagged on this push;
  # release-tag = its output) or a manual tag push (classic tag-ref context).
  release-gate:
    needs: [release]
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: {{ aviato-workflow-prefix }}reusable-release-gate.yml{{ aviato-workflow-suffix }}
    with:
      default-branch: {{ default-branch }}
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}

  pypi:
    needs: [release, release-gate, security]
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: {{ aviato-workflow-prefix }}reusable-pypi-publish.yml{{ aviato-workflow-suffix }}
    with:
      python-version: "3.12"
      working-directory: "."
      packages-dir: "dist"
      release-tag: ${{ needs.release.outputs.tag }}
      gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
