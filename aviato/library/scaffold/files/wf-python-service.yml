name: Aviato Python Service

on:
  pull_request:
    branches: ["{{ default-branch }}"]
  push:
    branches: ["{{ default-branch }}"]
    tags:
      - "*.*.*"
  schedule:
    - cron: "23 5 * * 1"

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release-gate: actions:read; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read
  packages: write
  id-token: write
  attestations: write

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-python-ci.yml@{{ aviato-ref }}
    with:
      python-version: "3.12"
      # A container service installs its runtime deps from requirements.txt (the same file the
      # Dockerfile uses) plus the seeded dev tools — NO editable/package install (no wheel,
      # §13.2). Each install reads a requirements file (which pins its own versions, §11.3) and
      # sits alone on its line so the supply-chain pin scan stays clean. The runtime step is
      # conditional so a deps-less service still works.
      install-command: |
        python -m pip install -r requirements-dev.txt
        if [ -f requirements.txt ]; then
          python -m pip install -r requirements.txt
        fi
      lint-command: "python -m ruff check ."
      # Non-strict type-check for a service (lower adoption friction than the library default's
      # mypy --strict); still typed, just not strict-mode.
      typecheck-command: "python -m mypy ."
      test-command: "python -m pytest --cov --cov-report=term-missing"
      # The build artifact is the Docker image (the `docker` job below), not a wheel — so the
      # source-CI wheel build is disabled (mirrors node-service, §13.2).
      run-build: false

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@{{ aviato-ref }}
    with:
      codeql-languages: "python"

  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@{{ aviato-ref }}

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security, common-lint]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@{{ aviato-ref }}
    with:
      aviato-ref: {{ aviato-ref }}

  # Gate before deploy. Two entry points: IN-RUN (release just tagged on this push;
  # release-tag = its output) or a manual tag push (classic tag-ref context).
  release-gate:
    needs: [release]
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@{{ aviato-ref }}
    with:
      default-branch: {{ default-branch }}
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}

  docker:
    needs: [release, release-gate, security]
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-docker-ghcr.yml@{{ aviato-ref }}
    with:
      # No image-name: defaults to the repo slug in reusable-docker-ghcr.yml (R4-2, mirrors node-service).
      context: "."
      dockerfile: "Dockerfile"
      platforms: "linux/amd64"
      release-tag: ${{ needs.release.outputs.tag }}

