name: Aviato Node Service

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "*"

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release-gate: actions:read; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read
  packages: write
  id-token: write
  attestations: write

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-node-ci.yml@{{ aviato-ref }}
    with:
      node-version: "22"
      install-command: "npm ci"
      # Required gates are explicit (no --if-present): a missing script fails the
      # verify pipeline (§12.2). Format-check (Prettier) and TS type-check (tsc,
      # auto-skipped when there is no tsconfig.json, i.e. language-variant=javascript)
      # use the reusable workflow defaults.
      lint-command: "npx eslint ."
      test-command: "npm test"
      build-command: "npm run build"
      run-typecheck: {{ run-typecheck }}

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@{{ aviato-ref }}
    with:
      codeql-languages: "javascript-typescript"

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@{{ aviato-ref }}
    with:
      aviato-ref: {{ aviato-ref }}

  release-gate:
    if: ${{ github.ref_type == 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@{{ aviato-ref }}
    with:
      default-branch: main
      require-merged-pr: true

  docker:
    if: ${{ github.ref_type == 'tag' }}
    needs: [release-gate, security]
    uses: amattas/aviato/.github/workflows/reusable-docker-ghcr.yml@{{ aviato-ref }}
    with:
      context: "."
      dockerfile: "Dockerfile"
      platforms: "linux/amd64"

