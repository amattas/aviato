needs: [release, release-gate, security]
if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
uses: "{{ aviato-workflow-prefix }}reusable-pypi-publish.yml{{ aviato-workflow-suffix }}"
permissions:
  contents: read
with:
  python-version: "3.12"
  working-directory: "."
  packages-dir: dist
  release-tag: ${{ needs.release.outputs.tag }}
  gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
  consumer-publisher-present: true
  approved-review-release: ${{ github.repository == '{{ aviato-library-repository }}' }}
  approved-review-run-id: ${{ vars.AVIATO_PRIVILEGED_REVIEW_RUN_ID }}
secrets:
  AVIATO_VERIFIER_APP_ID: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
  AVIATO_VERIFIER_APP_PRIVATE_KEY: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
