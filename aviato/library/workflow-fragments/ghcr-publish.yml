needs: [release, release-gate, security]
if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && needs.release-gate.outputs.gated-sha != '' && needs.release-gate.outputs.checkpoint-digest != '' && needs.release-gate.outputs.verified-envelope-digest != '' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
uses: "{{ aviato-workflow-prefix }}reusable-docker-ghcr.yml{{ aviato-workflow-suffix }}"
permissions:
  actions: read
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write
with:
  # The reusable publisher rechecks the managed checkpoint before package/OIDC privilege.
  context: "."
  dockerfile: Dockerfile
  platforms: linux/amd64
  release-tag: ${{ needs.release.outputs.tag }}
  gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
  checkpoint-digest: ${{ needs.release-gate.outputs.checkpoint-digest }}
  checkpoint-run-id: ${{ needs.release-gate.outputs.checkpoint-run-id }}
  verified-envelope-digest: ${{ needs.release-gate.outputs.verified-envelope-digest }}
  environment-name: ghcr
secrets:
  AVIATO_VERIFIER_APP_ID: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
  AVIATO_VERIFIER_APP_PRIVATE_KEY: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
