if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
runs-on: ubuntu-latest
permissions:
  contents: read
outputs:
  tag: ${{ steps.tag.outputs.tag }}
  release: ${{ steps.tag.outputs.release }}
  checkpoint-digest: ${{ steps.tag.outputs.checkpoint-digest }}
  intended-actor: ${{ steps.tag.outputs.intended-actor }}
  merged-sha: ${{ steps.tag.outputs.merged-sha }}
steps:
  - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    with:
      persist-credentials: false
      ref: ${{ github.event.workflow_run.head_sha }}
      fetch-depth: 0
      fetch-tags: true
  - id: tag
    env:
      GH_TOKEN: ${{ github.token }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    run: |
      set -euo pipefail
      tag="$(git tag --points-at "${HEAD_SHA}" --list '[0-9]*.[0-9]*.[0-9]*' | grep -E '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$' | head -n1 || true)"
      if [ -n "${tag}" ]; then
        release_body="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .body)"
        checkpoint_digest="$(sed -n 's/^Aviato-Checkpoint-Digest: //p' <<<"${release_body}")"
        intended_actor="$(sed -n 's/^Aviato-Intended-Actor: //p' <<<"${release_body}")"
        merged_sha="$(sed -n 's/^Aviato-Merged-SHA: //p' <<<"${release_body}")"
        [[ "${checkpoint_digest}" =~ ^[0-9a-f]{64}$ && "${merged_sha}" = "${HEAD_SHA}" && -n "${intended_actor}" ]] || { echo "::error::release lacks exact managed authorization markers"; exit 1; }
        echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
        echo "release=true" >> "${GITHUB_OUTPUT}"
        echo "checkpoint-digest=${checkpoint_digest}" >> "${GITHUB_OUTPUT}"
        echo "intended-actor=${intended_actor}" >> "${GITHUB_OUTPUT}"
        echo "merged-sha=${merged_sha}" >> "${GITHUB_OUTPUT}"
      else
        echo "release=false" >> "${GITHUB_OUTPUT}"
      fi
