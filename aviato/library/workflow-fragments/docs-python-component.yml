needs: [docs-resolve, docs-release-gate, docs-security]
if: ${{ needs.docs-resolve.outputs.release == 'true' }}
uses: "{{ aviato-workflow-prefix }}reusable-docs-pages.yml{{ aviato-workflow-suffix }}"
permissions:
  contents: write
  pages: write
  id-token: write
with:
  working-directory: website
  release-tag: ${{ needs.docs-resolve.outputs.tag }}
  gated-sha: ${{ needs.docs-release-gate.outputs.gated-sha }}
  serve-pages: "{{ serve-pages }}"
  docs-source-directory: "."
  docs-emit-command: |
    python3 -m pip install --quiet -e . "pydoc-markdown==4.8.2"
    mkdir -p website/docs/api
    pydoc-markdown -I . -p "{{ import-name }}" > website/docs/api/reference.md
