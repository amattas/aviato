needs: [docs-resolve, docs-release-gate, docs-security]
if: ${{ needs.docs-resolve.outputs.release == 'true' && needs.docs-release-gate.outputs.gated-sha != '' && needs.docs-release-gate.outputs.checkpoint-digest != '' && needs.docs-release-gate.outputs.verified-envelope-digest != '' }}
uses: "{{ aviato-workflow-prefix }}reusable-docs-pages.yml{{ aviato-workflow-suffix }}"
permissions:
  actions: read
  contents: write
  pages: write
  id-token: write
with:
  # Pages OIDC is closed until the managed checkpoint digest is revalidated.
  working-directory: website
  release-tag: ${{ needs.docs-resolve.outputs.tag }}
  gated-sha: ${{ needs.docs-release-gate.outputs.gated-sha }}
  checkpoint-digest: ${{ needs.docs-release-gate.outputs.checkpoint-digest }}
  checkpoint-run-id: ${{ needs.docs-release-gate.outputs.checkpoint-run-id }}
  verified-envelope-digest: ${{ needs.docs-release-gate.outputs.verified-envelope-digest }}
  serve-pages: "{{ serve-pages }}"
secrets:
  AVIATO_VERIFIER_APP_ID: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
  AVIATO_VERIFIER_APP_PRIVATE_KEY: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
