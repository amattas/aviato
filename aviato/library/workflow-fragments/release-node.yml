# Promotion trusts the generator-owned aviato-protection-checkpoint intake.
if: ${{ github.ref_type != 'tag' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.promotion)) }}
needs: [ci, security, common-lint]
uses: "{{ aviato-workflow-prefix }}reusable-release.yml{{ aviato-workflow-suffix }}"
permissions:
  contents: write
  pull-requests: write
  actions: write
with:
  aviato-ref: "{{ aviato-ref }}"
  local-install: "{{ aviato-local-install }}"
  checkpoint-workflow: ${{ inputs.checkpoint-workflow }}
  promotion: ${{ inputs.promotion || false }}
  merged-sha: ${{ inputs.merged-sha || '' }}
  intended-tag: ${{ inputs.intended-tag || '' }}
  intended-actor: ${{ inputs.intended-actor || '' }}
  checkpoint-run-id: ${{ inputs.checkpoint-run-id || '' }}
  checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
