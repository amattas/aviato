name: Publish Python package
needs: [release-gate, pypi]
if: >-
  ${{
    always()
    && needs.release-gate.result == 'success'
    && needs.pypi.result == 'success'
    && needs.release-gate.outputs.gated-sha != ''
    && needs.release-gate.outputs.checkpoint-digest != ''
    && needs.release-gate.outputs.verified-envelope-digest != ''
  }}
runs-on: ubuntu-latest
environment: pypi
concurrency:
  group: aviato-pypi-${{ github.repository }}
  cancel-in-progress: false
permissions:
  actions: read
  contents: read
  id-token: write
  attestations: write
steps:
  - name: Recheck managed checkpoint before OIDC
    shell: bash
    env:
      CHECKPOINT_DIGEST: ${{ needs.release-gate.outputs.checkpoint-digest }}
      CHECKPOINT_RUN_ID: ${{ needs.release-gate.outputs.checkpoint-run-id }}
      VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest }}
      GH_TOKEN: ${{ github.token }}
    run: |
      set -euo pipefail
      [[ "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::managed checkpoint is absent"; exit 1; }
      [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]
      rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"
      gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"
      envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
      [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
      gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
      reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
      key_id="$(jq -r .key_id "${envelope}")"
      [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
      gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "([flatten[] | select((.id|tostring) == \"${key_id}\")] | length) == 1" | grep -qx true
      [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/pypi" --jq .can_admins_bypass)" = "false" ]
  - name: Download vetted build artifacts
    uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
    with:
      name: ${{ needs.pypi.outputs.artifact-name }}
      path: .
  - name: Verify fresh remote tag after artifact download
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
      GATED_SHA: ${{ needs.release-gate.outputs.gated-sha }}
    run: |
      set -euo pipefail
      read -r object_type actual < <(gh api -H "Cache-Control: no-cache" "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.type + " " + .object.sha')
      for _ in 1 2 3 4 5; do
        [ "${object_type}" = "tag" ] || break
        read -r object_type actual < <(gh api -H "Cache-Control: no-cache" "repos/${GITHUB_REPOSITORY}/git/tags/${actual}" --jq '.object.type + " " + .object.sha')
      done
      if [ "${object_type}" != "commit" ] || [ "${actual}" != "${GATED_SHA}" ]; then
        echo "::error::Fresh remote tag ${RELEASE_TAG} does not peel to gated commit ${GATED_SHA} (type=${object_type}, sha=${actual})."
        exit 1
      fi
  - name: Mint verifier-only read token
    id: verifier-token
    uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
    with:
      app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
      private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
      owner: ${{ github.repository_owner }}
      repositories: ${{ github.event.repository.name }}
      skip-token-revoke: false
      permission-administration: read
      permission-actions: read
      permission-contents: read
      permission-metadata: read
  - &pypi_full_verifier
    name: Verify full authority immediately before provenance attestation
    id: aviato-verify-pypi-provenance
    shell: bash
    env:
      AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
      AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/fresh-authority/verified-checkpoint-envelope.json
      AVIATO_REPOSITORY: ${{ github.repository }}
      AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest }}
      AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
    run: |
      # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in a cleared environment.
      verifier_token="${AVIATO_VERIFIER_TOKEN}"
      unset AVIATO_VERIFIER_TOKEN
      /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C GH_TOKEN="${verifier_token}" VERIFIED_ENVELOPE_DIGEST="${AVIATO_VERIFIED_ENVELOPE_DIGEST}" /usr/bin/python3 -I - "${AVIATO_ENVELOPE_PATH}" "${AVIATO_REPOSITORY}" <<'PY'
      import base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request
      class NoRedirect(urllib.request.HTTPRedirectHandler):
          def redirect_request(self, *args, **kwargs): return None
      envelope_path, repository = sys.argv[1:]
      envelope_bytes = open(envelope_path, "rb").read()
      if hashlib.sha256(envelope_bytes).hexdigest() != os.environ.pop("VERIFIED_ENVELOPE_DIGEST"): raise SystemExit("verified envelope digest mismatch")
      envelope = json.loads(envelope_bytes)
      descriptor = envelope["checkpoint"]["authority_snapshot"]["guard"]["verifier"]
      expected = descriptor["blob_sha"]
      repo = urllib.parse.quote(descriptor["repository"], safe="/")
      path = urllib.parse.quote(descriptor["path"], safe="/")
      ref = urllib.parse.quote(descriptor["ref"], safe="")
      url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}"
      token = os.environ.pop("GH_TOKEN")
      request = urllib.request.Request(
          url,
          headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "Cache-Control": "no-cache",
              "User-Agent": "aviato-authority-bootstrap",
              "X-GitHub-Api-Version": "2022-11-28",
          },
      )
      opener = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()), NoRedirect())
      with opener.open(request, timeout=30) as response:
          parsed = urllib.parse.urlsplit(response.geturl())
          if not (parsed.scheme == "https" and parsed.netloc == "api.github.com"): raise SystemExit("verifier fetch escaped GitHub API origin")
          raw = response.read(400_001)
      if len(raw) > 400_000: raise SystemExit("verifier response exceeds bounded size")
      payload = json.loads(raw)
      if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
      content = payload["content"]
      if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
      encoded = content.replace("\r", "").replace("\n", "")
      if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
      body = base64.b64decode(encoded, validate=True)
      if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
      actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
      if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
      os.environ["GH_TOKEN"] = token
      sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
      exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
      PY
  - name: Attest build provenance
    uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e
    with:
      subject-path: "dist/*"
  - <<: *pypi_full_verifier
    name: Verify full authority immediately before SBOM attestation
    id: aviato-verify-pypi-sbom
  - name: Attest SBOM
    uses: actions/attest-sbom@36590ecaf038d6630c74f2da259095627d52ac11
    with:
      subject-path: "dist/*"
      sbom-path: sbom.cyclonedx.json
  - name: Resolve simple index endpoint
    id: index
    shell: bash
    env:
      REPOSITORY_URL: ${{ vars.PYPI_REPOSITORY_URL }}
      SIMPLE_INDEX_URL: ${{ vars.PYPI_SIMPLE_INDEX_URL }}
    run: |
      set -euo pipefail
      resolved="$(python - "${REPOSITORY_URL}" "${SIMPLE_INDEX_URL}" <<'PY'
      import sys
      import urllib.parse
      upload, explicit_simple = sys.argv[1:3]
      def validated(url: str, suffix: str) -> urllib.parse.SplitResult:
          try:
              parsed = urllib.parse.urlsplit(url)
              _ = parsed.port
          except ValueError as exc:
              raise SystemExit(f"invalid PyPI endpoint: {exc}") from exc
          if parsed.scheme != "https" or not parsed.hostname:
              raise SystemExit("PyPI endpoints must use HTTPS and include a hostname")
          if parsed.username is not None or parsed.password is not None:
              raise SystemExit("credentials are forbidden in PyPI endpoint URLs")
          if parsed.query or parsed.fragment or not parsed.path.endswith(suffix):
              raise SystemExit(f"PyPI endpoint must end in {suffix!r} with no query or fragment")
          return parsed
      if upload:
          upload_parts = validated(upload, "/legacy/")
          derived_path = upload_parts.path[: -len("legacy/")] + "simple/"
          derived = urllib.parse.urlunsplit(("https", upload_parts.netloc, derived_path, "", ""))
      else:
          derived = "https://pypi.org/simple/"
      if explicit_simple:
          validated(explicit_simple, "/simple/")
          resolved = explicit_simple
      else:
          resolved = derived
      print(resolved)
      PY
      )"
      echo "simple-index-url=${resolved}" >> "${GITHUB_OUTPUT}"
  - name: Final fresh remote tag verification
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
      GATED_SHA: ${{ needs.release-gate.outputs.gated-sha }}
    run: |
      set -euo pipefail
      read -r object_type actual < <(gh api -H "Cache-Control: no-cache" "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.type + " " + .object.sha')
      for _ in 1 2 3 4 5; do
        [ "${object_type}" = "tag" ] || break
        read -r object_type actual < <(gh api -H "Cache-Control: no-cache" "repos/${GITHUB_REPOSITORY}/git/tags/${actual}" --jq '.object.type + " " + .object.sha')
      done
      if [ "${object_type}" != "commit" ] || [ "${actual}" != "${GATED_SHA}" ]; then
        echo "::error::Fresh remote tag ${RELEASE_TAG} does not peel to gated commit ${GATED_SHA} (type=${object_type}, sha=${actual})."
        exit 1
      fi
  - name: Fail-closed verifier capability probe
    env:
      AVIATO_REPOSITORY: ${{ github.repository }}
      AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
    shell: bash
    run: |
      verifier_token="${AVIATO_VERIFIER_TOKEN}"
      unset AVIATO_VERIFIER_TOKEN
      /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C \
        GH_TOKEN="${verifier_token}" \
        REPOSITORY="${AVIATO_REPOSITORY}" \
        /usr/bin/python3 -I - <<'PY'
      import json
      import os
      import ssl
      import urllib.parse
      import urllib.request

      class NoRedirect(urllib.request.HTTPRedirectHandler):
          def redirect_request(self, req, fp, code, msg, headers, newurl):
              raise RuntimeError(f"GitHub API redirect rejected: {newurl}")

      token = os.environ.pop("GH_TOKEN")
      repository = os.environ.pop("REPOSITORY")
      opener = urllib.request.build_opener(
          urllib.request.ProxyHandler({}),
          urllib.request.HTTPSHandler(context=ssl.create_default_context()),
          NoRedirect(),
      )

      def get(suffix):
          url = f"https://api.github.com/repos/{repository}{suffix}"
          parsed = urllib.parse.urlsplit(url)
          if parsed.scheme != "https" or parsed.netloc != "api.github.com":
              raise RuntimeError(f"unexpected GitHub API origin: {url}")
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Cache-Control": "no-cache",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with opener.open(request, timeout=30) as response:
              payload = response.read(2_000_001)
          if len(payload) > 2_000_000:
              raise RuntimeError(f"GitHub API response too large: {url}")
          return json.loads(payload)

      branch = get("")["default_branch"]
      get(f"/branches/{urllib.parse.quote(branch, safe='')}/protection")
      get("/rulesets?includes_parents=false&per_page=100")
      get("/environments?per_page=100")
      PY
  - <<: *pypi_full_verifier
    name: Final checkpoint recheck immediately before PyPI mutation
    id: aviato-verify-pypi-publish
  - name: Publish distributions
    if: ${{ vars.PYPI_REPOSITORY_URL == '' }}
    uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
    with:
      packages-dir: dist
  - <<: *pypi_full_verifier
    name: Final checkpoint recheck immediately before alternate PyPI mutation
    id: aviato-verify-pypi-alternate
    if: ${{ vars.PYPI_REPOSITORY_URL != '' }}
  - name: Publish distributions to alternate repository
    if: ${{ vars.PYPI_REPOSITORY_URL != '' }}
    uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
    with:
      packages-dir: dist
      repository-url: ${{ vars.PYPI_REPOSITORY_URL }}
  - name: Confirm published artifacts
    shell: bash
    env:
      SIMPLE_INDEX_URL: ${{ steps.index.outputs.simple-index-url }}
      DISTRIBUTION_NAME: ${{ needs.pypi.outputs.distribution-name }}
      EXPECTED_VERSION: ${{ needs.pypi.outputs.package-version }}
      RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
      DIST_DIR: dist
    run: |
      set -euo pipefail
      python - <<'PY'
      import hashlib
      import json
      import os
      import pathlib
      import re
      import time
      import urllib.error
      import urllib.parse
      import urllib.request
      release_tag = os.environ["RELEASE_TAG"]
      expected_from_tag = re.sub(r"-(alpha|beta)([0-9]+)$", lambda m: {"alpha": "a", "beta": "b"}[m.group(1)] + m.group(2), release_tag)
      if os.environ["EXPECTED_VERSION"] != expected_from_tag:
          raise SystemExit(f"builder version {os.environ['EXPECTED_VERSION']!r} does not match release tag {release_tag!r}")
      dist = pathlib.Path(os.environ["DIST_DIR"])
      local = {path.name: hashlib.sha256(path.read_bytes()).hexdigest() for path in sorted(dist.iterdir()) if path.is_file()}
      if not local:
          raise SystemExit("no local distribution artifacts to confirm")
      normalized_name = re.sub(r"[-_.]+", "-", os.environ["DISTRIBUTION_NAME"]).lower()
      url = urllib.parse.urljoin(os.environ["SIMPLE_INDEX_URL"], urllib.parse.quote(normalized_name) + "/")
      request = urllib.request.Request(url, headers={"Accept": "application/vnd.pypi.simple.v1+json"})
      last_error = "index returned no matching files"
      for attempt in range(1, 11):
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              remote = {}
              for entry in payload.get("files", []):
                  filename = entry.get("filename")
                  sha256 = (entry.get("hashes") or {}).get("sha256")
                  if isinstance(filename, str) and isinstance(sha256, str):
                      remote[filename] = sha256.lower()
              mismatches = [name for name, digest in local.items() if remote.get(name) != digest]
              if not mismatches:
                  print(f"Confirmed {len(local)} published artifact(s) for {os.environ['DISTRIBUTION_NAME']}=={os.environ['EXPECTED_VERSION']} via PEP 691 metadata.")
                  raise SystemExit(0)
              last_error = f"missing or hash-mismatched files: {mismatches}"
          except (OSError, ValueError, json.JSONDecodeError, urllib.error.URLError) as exc:
              last_error = str(exc)
          print(f"PEP 691 confirmation attempt {attempt}/10 failed: {last_error}")
          if attempt < 10:
              time.sleep(30)
      raise SystemExit(f"published artifacts did not become verifiable: {last_error}")
      PY
