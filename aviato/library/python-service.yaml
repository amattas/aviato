name: python-service
workflows: python-service-wf
scaffold: python-service-sc
settings: baseline
requires_macos: false
variables:
  - {name: image-name, type: string}
  - {name: import-name, type: string}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Requires a seed-once container build definition before GHCR publishing (§13.2)."
docs_pipeline: docs-pages
prerequisites:
  container_build_definition: [Dockerfile]
