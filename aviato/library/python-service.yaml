name: python-service
workflows: python-service-wf
scaffold: python-service-sc
settings: baseline
variables:
  # A Python container SERVICE: the build artifact is its Dockerfile image (§13.2), NOT a wheel,
  # so it declares NO distribution/import name (unlike the python-library packaging model, §12.1).
  # The only required var is the GHCR image target. Mirrors node-service, whose production
  # artifact is likewise the image.
  - {name: image-name, type: string}
version_source:
  # Packaging-free version-source: a plain VERSION file holding the bare SemVer (§13.2). The
  # release flow bumps it; the Dockerfile owns the build. (A library uses pyproject.toml instead.)
  locations: [VERSION]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "A container service: builds via its Dockerfile, ships a GHCR image — no wheel/library publish."
  - "Requires a seed-once container build definition (Dockerfile) before GHCR publishing (§13.2)."
  - "CI installs from requirements.txt (+ the seeded requirements-dev.txt); it does NOT `pip install -e .`."
docs_pipeline: docs-pages
prerequisites:
  container_build_definition: [Dockerfile]
