name: python-service
workflows: python-service-wf
scaffold: python-service-sc
settings: baseline
requires_macos: false
variables:
  # §12.1 Python plug-in vars: the wheel/distribution name (the pyproject [project] name) and
  # the import package name. image-name (§13.2) is the GHCR target. All are non-secret.
  - {name: distribution-name, type: string}
  - {name: image-name, type: string}
  - {name: import-name, type: string}
version_source:
  locations: [pyproject.toml]
toolchain:
  linter: ruff
  formatter: ruff
  type_checker: mypy
  test_runner: pytest
notes:
  - "Requires a seed-once container build definition before GHCR publishing (§13.2)."
docs_pipeline: docs-pages
prerequisites:
  container_build_definition: [Dockerfile]
