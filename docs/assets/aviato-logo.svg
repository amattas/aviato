<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Aviato — Where code takes flight">
  <title>Aviato — Where code takes flight</title>
  <g fill="#5B8FD8">
    <!-- Wordmark -->
    <text x="500" y="250" text-anchor="middle"
          font-family="'Century Gothic', 'Futura', 'Trebuchet MS', Verdana, sans-serif"
          font-size="248" font-weight="300" letter-spacing="6">AVIATO</text>

    <!-- Head-on airliner integrated beneath the wordmark -->
    <!-- vertical stabilizer rising into the wordmark -->
    <path d="M497 150 L500 300 L503 150 Z"/>
    <!-- swept wings -->
    <path d="M150 360 Q500 300 850 360 Q500 330 150 360 Z"/>
    <!-- fuselage nose -->
    <circle cx="500" cy="312" r="46"/>
    <!-- engines -->
    <circle cx="360" cy="372" r="20"/>
    <circle cx="430" cy="382" r="16"/>
    <circle cx="570" cy="382" r="16"/>
    <circle cx="640" cy="372" r="20"/>
    <!-- landing gear -->
    <rect x="470" y="356" width="9" height="34"/>
    <rect x="459" y="388" width="31" height="9"/>
    <rect x="521" y="356" width="9" height="34"/>
    <rect x="510" y="388" width="31" height="9"/>

    <!-- Tagline -->
    <text x="500" y="470" text-anchor="middle"
          font-family="'Century Gothic', 'Futura', 'Trebuchet MS', Verdana, sans-serif"
          font-size="74" font-weight="400" letter-spacing="2">Where code takes flight</text>
  </g>
</svg>
