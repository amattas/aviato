name: Reusable Docker GHCR Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      image-name:
        description: Defaults to github.repository when left empty.
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: "linux/amd64"
      push:
        required: false
        type: boolean
        default: true
      scan-image:
        description: Scan the published image for high/critical vulnerabilities.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'n.n.n, n.n.n-alphaN, or n.n.n-betaN'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Release workflows must run from a tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Determine image name
        id: vars
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME:-${GITHUB_REPOSITORY}}"

          echo "image=ghcr.io/${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ contains(inputs.platforms, 'arm') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan published image
        if: ${{ inputs.push && inputs.scan-image }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload image scan results
        if: ${{ always() && inputs.push && inputs.scan-image }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
