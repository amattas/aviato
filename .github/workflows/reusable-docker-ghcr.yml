name: Reusable Docker GHCR Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      image-name:
        description: Defaults to github.repository when left empty.
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: "linux/amd64"
      push:
        required: false
        type: boolean
        default: true
      scan-image:
        description: Scan the published image for high/critical vulnerabilities.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  security-events: write

# Per-alias deploy concurrency group so a slower, older-release deploy cannot
# regress the mutable `latest` tag (§8.14). Queue rather than cancel.
concurrency:
  group: ghcr-latest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'n.n.n, n.n.n-alphaN, or n.n.n-betaN'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Release workflows must run from a tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Determine image name
        id: vars
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME:-${GITHUB_REPOSITORY}}"

          echo "image=ghcr.io/${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ contains(inputs.platforms, 'arm') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}

      # §11.7: the published-artifact security scan GATES the publish. Build the
      # image locally first (no push), scan it, and only push if the scan passes —
      # so a high/critical vulnerability never reaches the registry.
      - name: Build image for scan
        if: ${{ inputs.scan-image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (gate before publish)
        if: ${{ inputs.scan-image }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload image scan results
        if: ${{ always() && inputs.scan-image }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # §8.14/§13.2: move the mutable `latest` tag only if this release is the
      # highest released version. The comparison mirrors aviato.core.versioning
      # .is_highest (which is unit-tested); kept inline to avoid a self-reference
      # install in the deploy job.
      - name: Determine highest released version
        id: monotonic
        if: ${{ inputs.push }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cat > highest.py <<'PY'
          import sys, re
          rel = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta)(\d+))?$")
          rank = {None: 2, "beta": 1, "alpha": 0}
          def key(tag):
              m = rel.match(tag.strip())
              if not m:
                  return None
              a, b, c, pre, pren = m.groups()
              return (int(a), int(b), int(c), rank[pre], int(pren or 0))
          candidate = sys.argv[1]
          ck = key(candidate)
          keys = [k for k in (key(t) for t in sys.stdin) if k]
          print("true" if ck and max(keys + [ck]) == ck else "false")
          PY
          gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" --jq '.[].name' > tags.txt || true
          result="$(python3 highest.py "${RELEASE_TAG}" < tags.txt)"
          echo "is_highest=${result}" >> "${GITHUB_OUTPUT}"

      - name: Tag and push latest (monotonic guard)
        if: ${{ inputs.push && steps.monotonic.outputs.is_highest == 'true' }}
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${TAG}"
