name: Reusable Docker GHCR Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      image-name:
        description: Defaults to github.repository when left empty.
        required: false
        type: string
        default: ""
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      gated-sha:
        description: >-
          The commit SHA the release gate validated (reusable-release-gate.yml's
          gated-sha output). C12-W2: build from this immutable commit — never the
          mutable tag — and re-verify the tag still points at it before publishing.
        required: true
        type: string
      checkpoint-digest:
        description: Exact canonical checkpoint digest emitted by the nonprivileged release gate.
        required: true
        type: string
      checkpoint-run-id:
        required: true
        type: string
      verified-envelope-digest:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: "linux/amd64"
      push:
        required: false
        type: boolean
        default: true
      environment-name:
        description: >-
          GitHub deployment environment for the publish job (finding 7). Non-breaking
          default: GitHub auto-creates it unprotected; the operator adds reviewer/
          branch protection rules to gate image publishes at the platform level.
        required: false
        type: string
        default: ghcr
      verifier-app-owner:
        description: GitHub owner whose Aviato verifier App installation is selected.
        required: false
        type: string
        default: ""
      # §11.7: the published-artifact vulnerability scan is MANDATORY and always gates
      # the publish — there is intentionally no opt-out input to disable it.
    secrets:
      AVIATO_VERIFIER_APP_ID:
        required: true
      AVIATO_VERIFIER_APP_PRIVATE_KEY:
        required: true

permissions: {}
# Consumer checkout/build/scan/push runs without OIDC. A fresh attest-image runner receives only
# the published image identity and mints OIDC immediately after a checkpoint-bound full verifier.

# Per-alias deploy concurrency group so a slower, older-release deploy cannot
# regress the mutable `latest` tag (§8.14). Queue rather than cancel.
concurrency:
  group: ghcr-latest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
    outputs:
      image: ${{ steps.vars.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    # Platform-level gate wraps build+scan+push; the isolated attestation consumes its exact outputs.
    environment:
      name: ${{ inputs.environment-name }}
    steps:
      - name: Recheck exact authorization outputs before registry or OIDC use
        shell: bash
        env:
          GATED_SHA: ${{ inputs.gated-sha }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          ENV_NAME: ${{ inputs.environment-name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${GATED_SHA}" =~ ^[0-9a-f]{40}$ && "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::invalid authorization outputs"; exit 1; }
          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ] || { echo "::error::typed envelope evidence mismatch"; exit 1; }
          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          environment="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}")"
          [ "$(jq -r .can_admins_bypass <<<"${environment}")" = "false" ] || { echo "::error::fresh environment permits admin bypass"; exit 1; }

      - name: Checkout consumer repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          # C12-W2: build from the IMMUTABLE gated commit, not the mutable tag.
          ref: ${{ inputs.gated-sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag still points at the gated commit (C12-W2)
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GATED_SHA: ${{ inputs.gated-sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}" 2>/dev/null || true)"
          if [ -z "${actual}" ] || [ "${actual}" != "${GATED_SHA}" ]; then
            echo "::error::Tag ${RELEASE_TAG} no longer points at the gated commit ${GATED_SHA} (now: ${actual:-missing}) — the tag moved between gate and publish; refusing (C12-W2)."
            exit 1
          fi

      - name: Determine image name
        id: vars
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME:-${GITHUB_REPOSITORY}}"
          # R3-2-GHCRCASE: GHCR/OCI repository paths MUST be lowercase. github.repository preserves
          # the owner/repo casing, so a mixed-case owner (e.g. Owner/MyService) would otherwise build
          # an invalid ghcr.io/Owner/MyService ref and fail the push/attestation/latest move.
          image="$(printf '%s' "${image}" | tr '[:upper:]' '[:lower:]')"

          echo "image=ghcr.io/${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ contains(inputs.platforms, 'arm') }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.vars.outputs.image }}

      # §11.7: the published-artifact security scan GATES the publish. Build EACH
      # target platform locally first (no push) and scan it — so a high/critical
      # vulnerability on ANY published architecture blocks the push, not just amd64.
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.55.0

      - name: Build and scan each target platform (gate before publish)
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          # C12-W3 (§11.7): build each platform ONCE to a local OCI archive. The scans
          # below run against EXACTLY those bytes, and the push step promotes the SAME
          # archives by digest — there is no second build between scan and publish, so
          # a mutable base image or networked RUN step can no longer make the pushed
          # digest differ from the scanned one. (The former type=gha layer cache is
          # deliberately dropped: cached-rebuild "functional equivalence" was the hole.)
          # NOTE: deliberately NOT `set -e` — the high/critical GATE failure is ACCUMULATED so
          # every platform is still report-scanned (its SARIF written) before we fail. A build or
          # report-scan ERROR still hard-fails via explicit `|| exit 1`.
          set -uo pipefail
          mkdir -p trivy-sarif oci
          # OCI image labels come from the metadata action (GHCR links the package to the
          # repository via org.opencontainers.image.source — dropping labels would orphan it).
          label_args=()
          while IFS= read -r label; do
            [ -n "${label}" ] && label_args+=(--label "${label}")
          done <<< "${LABELS}"
          gate_failed=0
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for raw in "${plats[@]}"; do
            plat="$(echo "${raw}" | xargs)"
            [ -z "${plat}" ] && continue
            slug="${plat//\//-}"
            echo "::group::Build + scan ${plat}"
            # --provenance/--sbom=false keeps the archive a SINGLE-manifest image, so the
            # pushed digest provably equals the scanned digest (an embedded attestation
            # index would change the digest shape). Provenance is attested keylessly
            # AFTER push (attest-build-provenance); SBOMs are emitted by trivy below.
            docker buildx build --platform "${plat}" \
              --provenance=false --sbom=false \
              "${label_args[@]}" \
              --output "type=oci,dest=oci/${slug}.tar" \
              -f "${DOCKERFILE}" "${CONTEXT}" || exit 1
            # §2.13 report/gate split: REPORT all severities to the Security surface (SARIF, no
            # severity filter so medium/low are reported too), then GATE the publish on
            # high/critical. A single --severity HIGH,CRITICAL run would drop medium/low from
            # the SARIF entirely — §2.13 requires medium/low reported (without blocking).
            trivy image --ignore-unfixed --input "oci/${slug}.tar" \
              --format sarif --output "trivy-sarif/${slug}.sarif" || exit 1
            # §11.7: per-platform SBOM of the exact scanned bytes (uploaded as an artifact).
            trivy image --input "oci/${slug}.tar" \
              --format cyclonedx --output "oci/${slug}.sbom.cdx.json" || exit 1
            # Accumulate the gate (don't abort), so a high/critical on an early platform doesn't
            # skip scanning/reporting later platforms (§2.13 medium/low reporting completeness).
            if ! trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed \
              --format table --input "oci/${slug}.tar"; then
              gate_failed=1
            fi
            echo "::endgroup::"
          done
          # All platforms scanned + their SARIFs written (the upload step runs next, always()).
          if [ "${gate_failed}" -ne 0 ]; then
            echo "::error::HIGH/CRITICAL image vulnerabilities found; blocking publish (§2.13/§11.7)."
            exit 1
          fi

      - name: Upload image scan results
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: trivy-sarif

      - name: Upload image SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aviato-image-sboms
          path: oci/*.sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

      # C12-W3 (§11.7): promote the EXACT scanned archives by digest — skopeo preserves
      # the manifest bytes, so pushed digest == scanned digest is ASSERTED, not assumed.
      # Each platform lands on a stable per-arch tag (<tag>-<platform> — a registry
      # manifest PUT needs a tag); the release tag is then ASSEMBLED from those verified
      # digests with imagetools, so what ships is provably what was scanned.
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        env:
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C \
            GH_TOKEN="${verifier_token}" \
            REPOSITORY="${AVIATO_REPOSITORY}" \
            /usr/bin/python3 -I - <<'PY'
          import json
          import os
          import ssl
          import urllib.parse
          import urllib.request

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  raise RuntimeError(f"GitHub API redirect rejected: {newurl}")

          token = os.environ.pop("GH_TOKEN")
          repository = os.environ.pop("REPOSITORY")
          opener = urllib.request.build_opener(
              urllib.request.ProxyHandler({}),
              urllib.request.HTTPSHandler(context=ssl.create_default_context()),
              NoRedirect(),
          )

          def get(suffix):
              url = f"https://api.github.com/repos/{repository}{suffix}"
              parsed = urllib.parse.urlsplit(url)
              if parsed.scheme != "https" or parsed.netloc != "api.github.com":
                  raise RuntimeError(f"unexpected GitHub API origin: {url}")
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "Cache-Control": "no-cache",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with opener.open(request, timeout=30) as response:
                  payload = response.read(2_000_001)
              if len(payload) > 2_000_000:
                  raise RuntimeError(f"GitHub API response too large: {url}")
              return json.loads(payload)

          branch = get("")["default_branch"]
          get(f"/branches/{urllib.parse.quote(branch, safe='')}/protection")
          get("/rulesets?includes_parents=false&per_page=100")
          get("/environments?per_page=100")
          PY
      - name: Push scanned digests and assemble release tag (C12-W3)
        id: build
        if: ${{ inputs.push }}
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
          PLATFORMS: ${{ inputs.platforms }}
          GH_TOKEN: ${{ github.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          ENV_NAME: ${{ inputs.environment-name }}
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}" --jq '.status + ":" + .conclusion')" = "completed:success" ]
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          key_id="$(jq -r .key_id "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "([flatten[] | select((.id|tostring) == \"${key_id}\")] | length) == 1" | grep -qx true
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}" --jq .can_admins_bypass)" = "false" ]
          public_key="$(
            gh api --paginate --slurp -H 'Cache-Control: no-cache' \
              "users/${reviewer}/ssh_signing_keys?per_page=100" \
              --jq "[flatten[] | select((.id|tostring) == \"${key_id}\")] | if length == 1 then .[0].key else error(\"signing key must be unique\") end"
          )"
          authority_dir="$(mktemp -d)"
          printf '%s %s\n' "${reviewer}" "${public_key}" > "${authority_dir}/allowed"
          jq -cS .checkpoint "${envelope}" > "${authority_dir}/message"
          jq -r .signature "${envelope}" | python3 -c 'import base64,sys; value=sys.stdin.read().strip(); sys.stdout.buffer.write(base64.urlsafe_b64decode(value + "=" * (-len(value) % 4)))' > "${authority_dir}/signature"
          ssh-keygen -Y verify -f "${authority_dir}/allowed" -I "${reviewer}" -n aviato -s "${authority_dir}/signature" < "${authority_dir}/message"
          aviato_verify_authority() {
            # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute the locally Git-hash-bound verifier only in memory.
            /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C GH_TOKEN="${verifier_token}" VERIFIED_ENVELOPE_DIGEST="${VERIFIED_ENVELOPE_DIGEST}" /usr/bin/python3 -I - "${envelope}" "${AVIATO_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, *args, **kwargs): return None
          envelope_path, repository = sys.argv[1:]
          envelope_bytes = open(envelope_path, "rb").read()
          if hashlib.sha256(envelope_bytes).hexdigest() != os.environ.pop("VERIFIED_ENVELOPE_DIGEST"): raise SystemExit("verified envelope digest mismatch")
          envelope = json.loads(envelope_bytes)
          descriptor = envelope["checkpoint"]["authority_snapshot"]["guard"]["verifier"]
          expected = descriptor["blob_sha"]
          repo = urllib.parse.quote(descriptor["repository"], safe="/")
          path = urllib.parse.quote(descriptor["path"], safe="/")
          ref = urllib.parse.quote(descriptor["ref"], safe="")
          url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}"
          token = os.environ.pop("GH_TOKEN")
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Cache-Control": "no-cache",
                  "User-Agent": "aviato-authority-bootstrap",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          opener = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()), NoRedirect())
          with opener.open(request, timeout=30) as response:
              parsed = urllib.parse.urlsplit(response.geturl())
              if not (parsed.scheme == "https" and parsed.netloc == "api.github.com"): raise SystemExit("verifier fetch escaped GitHub API origin")
              raw = response.read(400_001)
          if len(raw) > 400_000: raise SystemExit("verifier response exceeds bounded size")
          payload = json.loads(raw)
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          os.environ["GH_TOKEN"] = token
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          }
          # skopeo ships preinstalled on GitHub's ubuntu runners; fail CLOSED if absent
          # rather than fetching one at run time (§11.3 forbids unpinned fetch-execute).
          if ! command -v skopeo >/dev/null 2>&1; then
            echo "::error::skopeo is not available on the runner; cannot promote scanned digests (C12-W3)."
            exit 1
          fi
          digest_refs=()
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for raw in "${plats[@]}"; do
            plat="$(echo "${raw}" | xargs)"
            [ -z "${plat}" ] && continue
            slug="${plat//\//-}"
            local_digest="$(skopeo inspect --format '{{.Digest}}' "oci-archive:oci/${slug}.tar")"
            aviato_verify_authority
            skopeo copy --digestfile "oci/${slug}.pushed" \
              "oci-archive:oci/${slug}.tar" "docker://${IMAGE}:${TAG}-${slug}"
            pushed_digest="$(cat "oci/${slug}.pushed")"
            if [ "${pushed_digest}" != "${local_digest}" ]; then
              echo "::error::Pushed digest ${pushed_digest} != scanned digest ${local_digest} for ${plat}; refusing to assemble the release tag (C12-W3)."
              exit 1
            fi
            echo "${plat}: scanned digest ${local_digest} pushed byte-identical."
            digest_refs+=("${IMAGE}@${pushed_digest}")
          done
          if [ "${#digest_refs[@]}" -eq 0 ]; then
            echo "::error::No platforms produced a pushed digest; refusing to assemble the release tag."
            exit 1
          fi
          aviato_verify_authority
          docker buildx imagetools create -t "${IMAGE}:${TAG}" "${digest_refs[@]}"
          # Final identity proof: the release tag must reference ONLY the scanned digests.
          manifest_raw="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --raw)"
          for ref in "${digest_refs[@]}"; do
            d="${ref#*@}"
            if ! grep -q "${d}" <<< "${manifest_raw}"; then
              echo "::error::Release tag manifest does not reference scanned digest ${d} (C12-W3)."
              exit 1
            fi
          done
          tag_digest="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${tag_digest}" >> "${GITHUB_OUTPUT}"

      # §8.14/§13.2: move the mutable `latest` tag only if this release is the
      # highest released version. The comparison mirrors aviato.core.versioning
      # .is_highest (which is unit-tested); kept inline to avoid a self-reference
      # install in the deploy job. `aviato validate` (_check_monotonic_alias_parity)
      # runs this snippet against a battery of cases and fails if it drifts from
      # is_highest, so the inline copy cannot diverge silently.
      - name: Determine highest released version
        id: monotonic
        if: ${{ inputs.push }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cat > highest.py <<'PY'
          import sys, re
          rel = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta)(\d+))?$")
          rank = {None: 2, "beta": 1, "alpha": 0}
          def key(tag):
              m = rel.match(tag.strip())
              if not m:
                  return None
              a, b, c, pre, pren = m.groups()
              return (int(a), int(b), int(c), rank[pre], int(pren or 0))
          candidate = sys.argv[1]
          ck = key(candidate)
          keys = [k for k in (key(t) for t in sys.stdin) if k]
          print("true" if ck and max(keys + [ck]) == ck else "false")
          PY
          # Fail CLOSED: if the tag listing fails (e.g. an API outage), do NOT move
          # `latest` — an empty list must never make an old release look highest (§8.14).
          if ! gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" --jq '.[].name' > tags.txt; then
            echo "::warning::Could not list tags; skipping latest-alias move (fail-closed)."
            echo "is_highest=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          result="$(python3 highest.py "${RELEASE_TAG}" < tags.txt)"
          echo "is_highest=${result}" >> "${GITHUB_OUTPUT}"

      - name: Tag and push latest (monotonic guard)
        if: ${{ inputs.push && steps.monotonic.outputs.is_highest == 'true' }}
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        # `latest` is a mutable ALIAS: imagetools copies the manifest so it points at the
        # exact same digest as the versioned tag (which carries the provenance + SBOM
        # attestations from the build step). No fresh attestation is emitted for the
        # `latest` name itself — verifiers should attest against the immutable digest
        # (or the versioned tag), not the floating `latest` (§11.7).
        run: |
          set -euo pipefail
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          aviato_verify_authority() {
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: fresh full authority immediately before latest.
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C GH_TOKEN="${verifier_token}" VERIFIED_ENVELOPE_DIGEST="${VERIFIED_ENVELOPE_DIGEST}" /usr/bin/python3 -I - "${envelope}" "${AVIATO_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, *args, **kwargs): return None
          envelope_path, repository = sys.argv[1:]
          envelope_bytes = open(envelope_path, "rb").read()
          if hashlib.sha256(envelope_bytes).hexdigest() != os.environ.pop("VERIFIED_ENVELOPE_DIGEST"): raise SystemExit("verified envelope digest mismatch")
          envelope = json.loads(envelope_bytes)
          descriptor = envelope["checkpoint"]["authority_snapshot"]["guard"]["verifier"]
          expected = descriptor["blob_sha"]
          repo = urllib.parse.quote(descriptor["repository"], safe="/")
          path = urllib.parse.quote(descriptor["path"], safe="/")
          ref = urllib.parse.quote(descriptor["ref"], safe="")
          url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}"
          token = os.environ.pop("GH_TOKEN")
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Cache-Control": "no-cache",
                  "User-Agent": "aviato-authority-bootstrap",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          opener = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()), NoRedirect())
          with opener.open(request, timeout=30) as response:
              parsed = urllib.parse.urlsplit(response.geturl())
              if not (parsed.scheme == "https" and parsed.netloc == "api.github.com"): raise SystemExit("verifier fetch escaped GitHub API origin")
              raw = response.read(400_001)
          if len(raw) > 400_000: raise SystemExit("verifier response exceeds bounded size")
          payload = json.loads(raw)
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          os.environ["GH_TOKEN"] = token
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          }
          aviato_verify_authority
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${TAG}"

  attest-image:
    name: Attest exact published image on an isolated runner
    needs: docker
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Download fixed checkpoint envelope for image attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/attest-authority" && mkdir -p "${RUNNER_TEMP}/attest-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/attest-authority"
          [ "$(shasum -a 256 "${RUNNER_TEMP}/attest-authority/verified-checkpoint-envelope.json" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
      - name: Verify full authority immediately before image attestation
        id: aviato-verify-image-attestation
        shell: bash
        env:
          AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
          AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/attest-authority/verified-checkpoint-envelope.json
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in a cleared environment.
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C GH_TOKEN="${verifier_token}" VERIFIED_ENVELOPE_DIGEST="${AVIATO_VERIFIED_ENVELOPE_DIGEST}" /usr/bin/python3 -I - "${AVIATO_ENVELOPE_PATH}" "${AVIATO_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, *args, **kwargs): return None
          envelope_path, repository = sys.argv[1:]
          envelope_bytes = open(envelope_path, "rb").read()
          if hashlib.sha256(envelope_bytes).hexdigest() != os.environ.pop("VERIFIED_ENVELOPE_DIGEST"): raise SystemExit("verified envelope digest mismatch")
          envelope = json.loads(envelope_bytes)
          descriptor = envelope["checkpoint"]["authority_snapshot"]["guard"]["verifier"]
          expected = descriptor["blob_sha"]
          repo = urllib.parse.quote(descriptor["repository"], safe="/")
          path = urllib.parse.quote(descriptor["path"], safe="/")
          ref = urllib.parse.quote(descriptor["ref"], safe="")
          url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}"
          token = os.environ.pop("GH_TOKEN")
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Cache-Control": "no-cache",
                  "User-Agent": "aviato-authority-bootstrap",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          opener = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()), NoRedirect())
          with opener.open(request, timeout=30) as response:
              parsed = urllib.parse.urlsplit(response.geturl())
              if not (parsed.scheme == "https" and parsed.netloc == "api.github.com"): raise SystemExit("verifier fetch escaped GitHub API origin")
              raw = response.read(400_001)
          if len(raw) > 400_000: raise SystemExit("verifier response exceeds bounded size")
          payload = json.loads(raw)
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          os.environ["GH_TOKEN"] = token
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
      - name: Attest published image provenance
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e
        with:
          subject-name: ${{ needs.docker.outputs.image }}
          subject-digest: ${{ needs.docker.outputs.digest }}
          push-to-registry: true
