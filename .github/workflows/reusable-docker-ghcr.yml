name: Reusable Docker GHCR Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      image-name:
        description: Defaults to github.repository when left empty.
        required: false
        type: string
        default: ""
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: "linux/amd64"
      push:
        required: false
        type: boolean
        default: true
      # §11.7: the published-artifact vulnerability scan is MANDATORY and always gates
      # the publish — there is intentionally no opt-out input to disable it.

permissions:
  contents: read
  packages: write
  security-events: write
  # Keyless OIDC build provenance/attestation for the published image (§13.2/§11.7).
  id-token: write
  attestations: write

# Per-alias deploy concurrency group so a slower, older-release deploy cannot
# regress the mutable `latest` tag (§8.14). Queue rather than cancel.
concurrency:
  group: ghcr-latest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          # Build from the release tag — explicit in-run, or the tag ref otherwise.
          ref: ${{ inputs.release-tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Determine image name
        id: vars
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          image="${IMAGE_NAME:-${GITHUB_REPOSITORY}}"

          echo "image=ghcr.io/${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ contains(inputs.platforms, 'arm') }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.vars.outputs.image }}

      # §11.7: the published-artifact security scan GATES the publish. Build EACH
      # target platform locally first (no push) and scan it — so a high/critical
      # vulnerability on ANY published architecture blocks the push, not just amd64.
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.55.0

      - name: Build and scan each target platform (gate before publish)
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
          PLATFORMS: ${{ inputs.platforms }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          set -euo pipefail
          mkdir -p trivy-sarif
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for raw in "${plats[@]}"; do
            plat="$(echo "${raw}" | xargs)"
            [ -z "${plat}" ] && continue
            echo "::group::Build + scan ${plat}"
            docker buildx build --platform "${plat}" --load \
              -t "${IMAGE}:scan-tmp" -f "${DOCKERFILE}" "${CONTEXT}"
            # §2.13 report/gate split: REPORT all severities to the Security surface (SARIF, no
            # severity filter so medium/low are reported too), then GATE the publish on
            # high/critical. A single --severity HIGH,CRITICAL run would drop medium/low from
            # the SARIF entirely — §2.13 requires medium/low reported (without blocking).
            trivy image --ignore-unfixed \
              --format sarif --output "trivy-sarif/${plat//\//-}.sarif" "${IMAGE}:scan-tmp"
            trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed \
              --format table "${IMAGE}:scan-tmp"
            echo "::endgroup::"
          done

      - name: Upload image scan results
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sarif

      # NOTE (scan-vs-push image identity, §11.7): the scan above builds each platform
      # with `--load` and the push below rebuilds via build-push-action. Both share the
      # same Dockerfile, context, and `type=gha` build cache, so the pushed layers are the
      # cached scanned layers — functionally equivalent, but NOT a proven byte-identical
      # digest match. A stronger guarantee (build once to a local OCI store, scan, then push
      # that exact artifact by digest) is a deferred hardening; it interacts with multi-arch
      # `--load` limitations and cannot be exercised without a live registry (operator-verified
      # DoD, §9.9). The gate still blocks publish on a HIGH/CRITICAL finding in those layers.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # §13.2/§11.7: keyless OIDC build provenance attestation for the pushed image.
      - name: Attest image provenance
        if: ${{ inputs.push }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.vars.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # §8.14/§13.2: move the mutable `latest` tag only if this release is the
      # highest released version. The comparison mirrors aviato.core.versioning
      # .is_highest (which is unit-tested); kept inline to avoid a self-reference
      # install in the deploy job. `aviato validate` (_check_monotonic_alias_parity)
      # runs this snippet against a battery of cases and fails if it drifts from
      # is_highest, so the inline copy cannot diverge silently.
      - name: Determine highest released version
        id: monotonic
        if: ${{ inputs.push }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cat > highest.py <<'PY'
          import sys, re
          rel = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta)(\d+))?$")
          rank = {None: 2, "beta": 1, "alpha": 0}
          def key(tag):
              m = rel.match(tag.strip())
              if not m:
                  return None
              a, b, c, pre, pren = m.groups()
              return (int(a), int(b), int(c), rank[pre], int(pren or 0))
          candidate = sys.argv[1]
          ck = key(candidate)
          keys = [k for k in (key(t) for t in sys.stdin) if k]
          print("true" if ck and max(keys + [ck]) == ck else "false")
          PY
          # Fail CLOSED: if the tag listing fails (e.g. an API outage), do NOT move
          # `latest` — an empty list must never make an old release look highest (§8.14).
          if ! gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" --jq '.[].name' > tags.txt; then
            echo "::warning::Could not list tags; skipping latest-alias move (fail-closed)."
            echo "is_highest=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          result="$(python3 highest.py "${RELEASE_TAG}" < tags.txt)"
          echo "is_highest=${result}" >> "${GITHUB_OUTPUT}"

      - name: Tag and push latest (monotonic guard)
        if: ${{ inputs.push && steps.monotonic.outputs.is_highest == 'true' }}
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        # `latest` is a mutable ALIAS: imagetools copies the manifest so it points at the
        # exact same digest as the versioned tag (which carries the provenance + SBOM
        # attestations from the build step). No fresh attestation is emitted for the
        # `latest` name itself — verifiers should attest against the immutable digest
        # (or the versioned tag), not the floating `latest` (§11.7).
        run: docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${TAG}"
