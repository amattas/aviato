name: Reusable Consumer Automation

# Scheduled, low-privilege consumer automation (§5.5/§5.6/§5.14): detect file and
# settings drift and report (open proposals / file tracking issues). It performs
# NO settings mutation — that is the operator-gated reconcile (§5.7). Privileges
# are declared per §11.3; no stored secret (platform token only, §6.6).

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: The Aviato version pin to install and resolve against.
        required: false
        type: string
        default: main
      local-install:
        description: Install Aviato from the checked-out repository for Library bootstrap.
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: "3.12"
    secrets:
      settings-token:
        description: >-
          Optional admin-capable READ token (PAT / GitHub App) used ONLY to read branch
          protection + rulesets for settings drift — the default GITHUB_TOKEN cannot (no
          administration scope). It is read-only in use: the settings-drift step still writes
          the tracking issue/comments under the ambient platform GITHUB_TOKEN, never this
          token (§5.6/§11.2). Omit it and settings drift is skipped; file drift still runs.
        required: false

# File-drift proposals push an identity-keyed branch, which needs contents:write
# (opening a PR with file changes cannot be done with read-only contents).
# Settings drift remains report-only and never mutates protected settings.
#
# NOTE (§5.6/§11.3): the platform GITHUB_TOKEN has no `administration` scope — that
# scope does not exist for workflow tokens — so it CANNOT read branch protection or
# rulesets. Full settings-drift detection therefore requires an operator-supplied
# admin-capable token (PAT / GitHub App) passed as the `settings-token` secret
# below; without it, file drift still runs and settings reads degrade (skipped).
# §5.5 (review #4): the scheduled drift/report run, plus any operator workflow_dispatch or
# re-run, must SERIALIZE per repo — two concurrent runs would force-push the SAME deterministic
# proposal branch and race (lost updates, non-deterministic PR contents). Queue, never cancel
# (a cancelled mid-push run can leave a dangling ref).
concurrency:
  group: aviato-drift-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  drift-report:
    name: Drift detection (propose/report only)
    runs-on: ubuntu-latest
    env:
      # Only the non-sensitive ref is job-wide. Tokens are scoped PER STEP below (§11.2):
      # the admin settings-token must never be visible to the install step or the file-drift
      # writes — only to the read-only settings-drift step.
      AVIATO_REF: ${{ inputs.aviato-ref }}
      AVIATO_LOCAL_INSTALL: ${{ inputs.local-install }}
    steps:
      - name: Jitter
        shell: bash
        run: sleep $((RANDOM % 120))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Aviato
        shell: bash
        run: |
          set -euo pipefail
          if [ "${AVIATO_LOCAL_INSTALL}" = "true" ]; then
            required_anchors=(
              "aviato/core/__init__.py"
              "aviato/library/bundles"
              "aviato/library/scaffold"
              "aviato/library/policy.yml"
              ".github/aviato.yaml"
            )
            for anchor in "${required_anchors[@]}"; do
              if [ ! -e "${anchor}" ]; then
                echo "::error::local-install is only valid for Library bootstrap; missing structural anchor ${anchor} (§5.10)."
                exit 1
              fi
            done
            if ! sed 's/#.*$//' .github/aviato.yaml | grep -Eiq '^[[:space:]]*bootstrap:[[:space:]]*true[[:space:]]*$'; then
              echo "::error::local-install requires .github/aviato.yaml to declare bootstrap: true (§5.10)."
              exit 1
            fi
            python -m pip install -e .
          else
            python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"
          fi

      - name: File drift (platform token; contents/PR/issue writes only)
        shell: bash
        # Least-privilege (§11.2/§5.6): file-drift proposals need only the platform token's
        # contents/PR/issue write scope. The admin settings-token is NEVER exposed here.
        env:
          GH_TOKEN: ${{ github.token }}
        run: aviato drift-report . --file-only

      - name: Settings drift (platform token for issue writes; admin token READ-only for reads)
        shell: bash
        # Two tokens, distinct roles (§5.6/§11.2): GH_TOKEN is the ambient platform token, used
        # for the tracking-issue WRITES (open/comment/revoke). AVIATO_SETTINGS_READ_TOKEN is the
        # operator's admin READ token, scoped by aviato (settings_read_token_scope) to the
        # branch-protection/ruleset READS alone — it mutates nothing, so the stored secret stays
        # read-only in use. Both are scoped to THIS step; neither reaches the file-drift writes or
        # the install step. No admin token ⇒ settings drift skips fail-closed (§5.6).
        env:
          GH_TOKEN: ${{ github.token }}
          AVIATO_SETTINGS_READ_TOKEN: ${{ secrets.settings-token }}
        run: |
          if [ -z "${AVIATO_SETTINGS_READ_TOKEN}" ]; then
            echo "settings drift: skipped — no admin settings-token secret supplied (§5.6)."
            exit 0
          fi
          aviato drift-report . --settings-only
