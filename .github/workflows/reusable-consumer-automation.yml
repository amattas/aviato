name: Reusable Consumer Automation

# Scheduled, low-privilege consumer automation (§5.5/§5.6/§5.14): detect file and
# settings drift and report (open proposals / file tracking issues). It performs
# NO settings mutation — that is the operator-gated reconcile (§5.7). Privileges
# are declared per §11.3; no stored secret (platform token only, §6.6).

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: The Aviato version pin to install and resolve against.
        required: false
        type: string
        default: main
      python-version:
        required: false
        type: string
        default: "3.12"
    secrets:
      settings-token:
        description: >-
          Optional admin-capable token (PAT / GitHub App) used to READ branch
          protection + rulesets for settings drift. The default GITHUB_TOKEN cannot
          (no administration scope). Omit it and settings drift is skipped; file
          drift still runs. Read-only use — settings are never mutated here (§5.6/§5.7).
        required: false

# File-drift proposals push an identity-keyed branch, which needs contents:write
# (opening a PR with file changes cannot be done with read-only contents).
# Settings drift remains report-only and never mutates protected settings.
#
# NOTE (§5.6/§11.3): the platform GITHUB_TOKEN has no `administration` scope — that
# scope does not exist for workflow tokens — so it CANNOT read branch protection or
# rulesets. Full settings-drift detection therefore requires an operator-supplied
# admin-capable token (PAT / GitHub App) passed as the `settings-token` secret
# below; without it, file drift still runs and settings reads degrade (skipped).
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  drift-report:
    name: Drift detection (propose/report only)
    runs-on: ubuntu-latest
    env:
      # Prefer the operator's admin token (enables settings-drift reads); fall back to
      # the platform token (file drift only — settings drift then skips, §5.6).
      GH_TOKEN: ${{ secrets.settings-token || github.token }}
      AVIATO_REF: ${{ inputs.aviato-ref }}
    steps:
      - name: Jitter
        shell: bash
        run: sleep $((RANDOM % 120))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Aviato (pinned)
        shell: bash
        run: python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"

      - name: Report drift
        shell: bash
        run: aviato drift-report .
