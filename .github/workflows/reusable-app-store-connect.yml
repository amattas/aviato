name: Reusable App Store Connect Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      environment-name:
        description: Protected deployment environment for Apple secrets.
        required: false
        type: string
        default: app-store-connect
      xcode-version:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: "."
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      gated-sha:
        description: >-
          The commit SHA the release gate validated (reusable-release-gate.yml's
          gated-sha output). C12-W2: archive from this immutable commit — never the
          mutable tag — and re-verify the tag still points at it before uploading.
        required: true
        type: string
      checkpoint-digest:
        description: Exact canonical checkpoint digest emitted by the nonprivileged release gate.
        required: true
        type: string
      checkpoint-run-id:
        required: true
        type: string
      verified-envelope-digest:
        required: true
        type: string
      scheme:
        required: true
        type: string
      workspace:
        required: false
        type: string
        default: ""
      project:
        required: false
        type: string
        default: ""
      bundle-identifier:
        required: false
        type: string
        default: ""
      team-id:
        description: Exact ten-character Apple Developer Team ID (uppercase ASCII letters or digits).
        required: true
        type: string
      configuration:
        required: false
        type: string
        default: Release
      sdk:
        required: false
        type: string
        default: iphoneos
      archive-path:
        required: false
        type: string
        default: build/App.xcarchive
      export-path:
        description: Deprecated. Trusted signing writes only beneath RUNNER_TEMP.
        required: false
        type: string
        default: build/export
      export-options-plist:
        description: Deprecated. Trusted signing generates options from export-method/team-id.
        required: false
        type: string
        default: ""
      export-method:
        description: Export method (app-store, ad-hoc, or development) used to generate ExportOptions.plist.
        required: false
        type: string
        default: app-store
      version-command:
        description: Optional command to set marketing/build version before archive.
        required: false
        type: string
        default: ""
      submit-for-review:
        required: false
        type: boolean
        default: false
      submit-for-review-command:
        description: >-
          Optional CUSTOM submit command. C12-W6 (breaking): it now runs AFTER the
          signing cleanup and receives NO App Store Connect private key (neither in
          env nor as the on-disk .p8), so a compromised helper cannot exfiltrate it.
          Commands that need ASC auth must migrate to the built-in submit (leave
          this empty and set submit-for-review + bundle-identifier).
        required: false
        type: string
        default: ""
      verifier-app-owner:
        description: GitHub owner whose Aviato verifier App installation is selected.
        required: false
        type: string
        default: ""
    secrets:
      AVIATO_VERIFIER_APP_ID:
        required: true
      AVIATO_VERIFIER_APP_PRIVATE_KEY:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true
      APPLE_CERTIFICATE_P12_BASE64:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      APPLE_PROVISIONING_PROFILE_BASE64:
        required: true

# review #26: serialize App Store uploads per repo for parity with the other deploys — a re-run
# should queue, not race a parallel upload. Bounded anyway by App Store Connect rejecting a
# duplicate build number.
concurrency:
  group: aviato-app-store-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  # second-review fix: GET /repos/{o}/{r}/environments/{name} (the §11.4 reviewer
  # probe) requires the Actions repository permission; without it the called
  # workflow's permissions block zeroes the scope and the probe 403s on EVERY run.
  actions: read

jobs:
  build-unsigned:
    name: Build unsigned App Store archive
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      archive-sha256: ${{ steps.package.outputs.archive-sha256 }}
      release-tag: ${{ steps.release.outputs.tag }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      SCHEME: ${{ inputs.scheme }}
      WORKSPACE: ${{ inputs.workspace }}
      PROJECT: ${{ inputs.project }}
      CONFIGURATION: ${{ inputs.configuration }}
      SDK: ${{ inputs.sdk }}
      ARCHIVE_PATH: ${{ inputs.archive-path }}
    steps:
      - name: Validate untrusted build paths
        working-directory: "."
        shell: bash
        env:
          WORKING_DIRECTORY_INPUT: ${{ inputs.working-directory }}
          ARCHIVE_PATH_INPUT: ${{ inputs.archive-path }}
        run: |
          set -euo pipefail
          /usr/bin/python3 -I - "${WORKING_DIRECTORY_INPUT}" "${ARCHIVE_PATH_INPUT}" <<'PY'
          import pathlib, sys
          for label, raw in zip(("working-directory", "archive-path"), sys.argv[1:]):
              path = pathlib.PurePosixPath(raw)
              if not raw or path.is_absolute() or ".." in path.parts:
                  raise SystemExit(f"{label} must be a non-traversing relative path")
          PY
      - name: Checkout immutable consumer source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ inputs.gated-sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Verify build path containment after checkout
        working-directory: "."
        shell: bash
        env:
          WORKING_DIRECTORY_INPUT: ${{ inputs.working-directory }}
          ARCHIVE_PATH_INPUT: ${{ inputs.archive-path }}
        run: |
          set -euo pipefail
          /usr/bin/python3 -I - "${GITHUB_WORKSPACE}" "${WORKING_DIRECTORY_INPUT}" "${ARCHIVE_PATH_INPUT}" <<'PY'
          import pathlib, sys
          workspace = pathlib.Path(sys.argv[1]).resolve(strict=True)
          working = (workspace / sys.argv[2]).resolve(strict=True)
          archive = (working / sys.argv[3]).resolve(strict=False)
          if not working.is_dir() or not working.is_relative_to(workspace) or not archive.is_relative_to(workspace):
              raise SystemExit("build paths must remain beneath the checked-out workspace")
          PY
      - name: Select Xcode
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: ${{ inputs.xcode-version }}
      - name: Validate release tag against gated commit
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
          GATED_SHA: ${{ inputs.gated-sha }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            RELEASE_TAG="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::App Store publishing requires a tag ref or an explicit release-tag input."
              exit 1
            fi
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${RELEASE_TAG}"
            exit 1
          fi
          [ "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" = "${GATED_SHA}" ]
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
      - name: Apply version command without any release secret
        if: ${{ inputs.version-command != '' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          MARKETING_VERSION: ${{ steps.release.outputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_COMMAND: ${{ inputs.version-command }}
        run: |
          set -euo pipefail
          eval "$VERSION_COMMAND"
      - name: Build unsigned archive without keychain or provisioning material
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${ARCHIVE_PATH}")"
          common=(archive -scheme "${SCHEME}" -configuration "${CONFIGURATION}" -sdk "${SDK}" -archivePath "${ARCHIVE_PATH}" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO)
          if [ -n "${WORKSPACE}" ]; then
            xcodebuild -workspace "${WORKSPACE}" "${common[@]}"
          elif [ -n "${PROJECT}" ]; then
            xcodebuild -project "${PROJECT}" "${common[@]}"
          else
            echo "::error::Either workspace or project must be provided."
            exit 1
          fi
      - name: Package content-addressed unsigned archive
        id: package
        working-directory: .
        shell: bash
        env:
          SOURCE: ${{ inputs.working-directory }}/${{ inputs.archive-path }}
        run: |
          set -euo pipefail
          [ -d "${SOURCE}" ]
          stage="$(mktemp -d "${RUNNER_TEMP}/aviato-build-package.XXXXXX")"
          trap 'rm -rf "${stage}"' EXIT
          /usr/bin/ditto "${SOURCE}" "${stage}/App.xcarchive"
          /usr/bin/ditto -c -k --keepParent "${stage}/App.xcarchive" unsigned-xcarchive.zip
          digest="$(shasum -a 256 unsigned-xcarchive.zip | awk '{print $1}')"
          echo "archive-sha256=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Upload unsigned archive
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: app-store-unsigned-xcarchive
          path: unsigned-xcarchive.zip
          if-no-files-found: error
          retention-days: 1

  attest-unsigned:
    name: Attest exact unsigned archive on an isolated runner
    needs: build-unsigned
    runs-on: macos-latest
    permissions:
      actions: read
      attestations: write
      id-token: write
    steps:
      - name: Download exact unsigned archive for attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: app-store-unsigned-xcarchive
          path: unsigned-attestation-input
      - name: Validate exact unsigned archive digest
        shell: bash
        env:
          EXPECTED_SHA256: ${{ needs.build-unsigned.outputs.archive-sha256 }}
        run: |
          set -euo pipefail
          [[ "${EXPECTED_SHA256}" =~ ^[0-9a-f]{64}$ ]]
          [ "$(shasum -a 256 unsigned-attestation-input/unsigned-xcarchive.zip | awk '{print $1}')" = "${EXPECTED_SHA256}" ]
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Download fixed checkpoint envelope for attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/attest-authority" && mkdir -p "${RUNNER_TEMP}/attest-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/attest-authority"
          [ "$(shasum -a 256 "${RUNNER_TEMP}/attest-authority/verified-checkpoint-envelope.json" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
      - name: Verify full authority immediately before unsigned archive attestation
        id: aviato-verify-app-archive-attestation
        shell: bash
        env:
          AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
          AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/attest-authority/verified-checkpoint-envelope.json
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in a cleared environment.
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C GH_TOKEN="${verifier_token}" VERIFIED_ENVELOPE_DIGEST="${AVIATO_VERIFIED_ENVELOPE_DIGEST}" /usr/bin/python3 -I - "${AVIATO_ENVELOPE_PATH}" "${AVIATO_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, *args, **kwargs): return None
          envelope_path, repository = sys.argv[1:]
          envelope_bytes = open(envelope_path, "rb").read()
          if hashlib.sha256(envelope_bytes).hexdigest() != os.environ.pop("VERIFIED_ENVELOPE_DIGEST"): raise SystemExit("verified envelope digest mismatch")
          envelope = json.loads(envelope_bytes)
          descriptor = envelope["checkpoint"]["authority_snapshot"]["guard"]["verifier"]
          expected = descriptor["blob_sha"]
          repo = urllib.parse.quote(descriptor["repository"], safe="/")
          path = urllib.parse.quote(descriptor["path"], safe="/")
          ref = urllib.parse.quote(descriptor["ref"], safe="")
          url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}"
          token = os.environ.pop("GH_TOKEN")
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Cache-Control": "no-cache",
                  "User-Agent": "aviato-authority-bootstrap",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          opener = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()), NoRedirect())
          with opener.open(request, timeout=30) as response:
              parsed = urllib.parse.urlsplit(response.geturl())
              if not (parsed.scheme == "https" and parsed.netloc == "api.github.com"): raise SystemExit("verifier fetch escaped GitHub API origin")
              raw = response.read(400_001)
          if len(raw) > 400_000: raise SystemExit("verifier response exceeds bounded size")
          payload = json.loads(raw)
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          os.environ["GH_TOKEN"] = token
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
      - name: Attest unsigned archive provenance
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e
        with:
          subject-path: unsigned-attestation-input/unsigned-xcarchive.zip

  app-store-connect:
    name: Publish to App Store Connect
    needs: [build-unsigned, attest-unsigned]
    runs-on: macos-latest
    permissions:
      actions: read
      attestations: read
      contents: read
    outputs:
      release-tag: ${{ needs.build-unsigned.outputs.release-tag }}
      checkpoint-digest: ${{ steps.authorization.outputs.checkpoint-digest }}
      checkpoint-run-id: ${{ inputs.checkpoint-run-id }}
      verified-envelope-digest: ${{ inputs.verified-envelope-digest }}
    environment:
      name: ${{ inputs.environment-name }}
    env:
      BUNDLE_IDENTIFIER: ${{ inputs.bundle-identifier }}
      TEAM_ID: ${{ inputs.team-id }}
      EXPORT_METHOD: ${{ inputs.export-method }}
      # This trusted job starts on a fresh runner and never checks out or executes
      # consumer source.  The unsigned archive is an attested data artifact only.
    steps:
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        env:
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          verifier_token="${AVIATO_VERIFIER_TOKEN}"
          unset AVIATO_VERIFIER_TOKEN
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C \
            GH_TOKEN="${verifier_token}" \
            REPOSITORY="${AVIATO_REPOSITORY}" \
            /usr/bin/python3 -I - <<'PY'
          import json
          import os
          import ssl
          import urllib.parse
          import urllib.request

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  raise RuntimeError(f"GitHub API redirect rejected: {newurl}")

          token = os.environ.pop("GH_TOKEN")
          repository = os.environ.pop("REPOSITORY")
          opener = urllib.request.build_opener(
              urllib.request.ProxyHandler({}),
              urllib.request.HTTPSHandler(context=ssl.create_default_context()),
              NoRedirect(),
          )

          def get(suffix):
              url = f"https://api.github.com/repos/{repository}{suffix}"
              parsed = urllib.parse.urlsplit(url)
              if parsed.scheme != "https" or parsed.netloc != "api.github.com":
                  raise RuntimeError(f"unexpected GitHub API origin: {url}")
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "Cache-Control": "no-cache",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with opener.open(request, timeout=30) as response:
                  payload = response.read(2_000_001)
              if len(payload) > 2_000_000:
                  raise RuntimeError(f"GitHub API response too large: {url}")
              return json.loads(payload)

          branch = get("")["default_branch"]
          get(f"/branches/{urllib.parse.quote(branch, safe='')}/protection")
          get("/rulesets?includes_parents=false&per_page=100")
          get("/environments?per_page=100")
          PY
      - name: Recheck exact authorization outputs before environment secrets
        id: authorization
        working-directory: "."
        shell: bash
        env:
          GATED_SHA: ${{ inputs.gated-sha }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${GATED_SHA}" =~ ^[0-9a-f]{40}$ && "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::invalid authorization outputs"; exit 1; }
          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]
          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          echo "checkpoint-digest=${CHECKPOINT_DIGEST}" >> "${GITHUB_OUTPUT}"

      # §11.4: the six Apple secrets may only materialize behind a reviewer-protected
      # environment. GitHub AUTO-CREATES a referenced-but-undefined environment with NO
      # protection rules, so the job-level `environment:` line alone proves nothing.
      # Fail CLOSED: unreadable protection state is treated as unprotected (§5.14).
      - name: Verify deployment environment requires reviewers (§11.4)
        working-directory: "."
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ENV_NAME: ${{ inputs.environment-name }}
        run: |
          set -euo pipefail
          if ! response="$(gh api "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}" 2>err.txt)"; then
            echo "::error::Could not read environment '${ENV_NAME}' protection rules ($(cat err.txt)); refusing to expose signing secrets (§11.4)."
            exit 1
          fi
          if ! jq -e 'any(.protection_rules[]?; .type == "required_reviewers" and ((.reviewers? | type) == "array") and ((.reviewers | length) > 0))' <<<"${response}" >/dev/null; then
            echo "::error::Environment '${ENV_NAME}' has no required reviewers; configure them (Settings → Environments) before App Store deploys (§11.4)."
            exit 1
          fi
          [ "$(jq -r .can_admins_bypass <<<"${response}")" = "false" ] || { echo "::error::Environment '${ENV_NAME}' permits admin bypass"; exit 1; }
          echo "Environment '${ENV_NAME}' requires reviewers."

      - name: Select Xcode
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Download attested unsigned archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: app-store-unsigned-xcarchive
          path: unsigned-input
      - name: Validate digest, attestation, and safe archive members
        working-directory: .
        shell: bash
        env:
          EXPECTED_SHA256: ${{ needs.build-unsigned.outputs.archive-sha256 }}
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.build-unsigned.outputs.artifact-digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          zip="unsigned-input/unsigned-xcarchive.zip"
          [[ "${EXPECTED_ARTIFACT_DIGEST}" =~ ^[0-9a-f]{64}$ ]]
          [ "$(shasum -a 256 "${zip}" | awk '{print $1}')" = "${EXPECTED_SHA256}" ]
          gh attestation verify "${zip}" --repo "${GITHUB_REPOSITORY}" >/dev/null

      - name: Extract trusted unsigned archive
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          trusted_root="$(mktemp -d "${RUNNER_TEMP}/aviato-app-archive.XXXXXX")"
          /usr/bin/python3 -I - unsigned-input/unsigned-xcarchive.zip "${trusted_root}" <<'PY'
          import os, pathlib, stat, sys, zipfile
          archive = pathlib.Path(sys.argv[1])
          root = pathlib.Path(sys.argv[2]).resolve(strict=True)
          if any(root.iterdir()):
              raise SystemExit("trusted extraction root is not fresh")
          with zipfile.ZipFile(archive) as handle:
              infos = handle.infolist()
              if not infos or len(infos) > 100_000 or sum(item.file_size for item in infos) > 8 * 1024**3:
                  raise SystemExit("unsigned archive inventory is empty or exceeds bounds")
              names = [item.filename for item in infos]
              if len(names) != len(set(names)):
                  raise SystemExit("unsigned archive contains duplicate members")
              directories = set()
              files = []
              for item in infos:
                  path = pathlib.PurePosixPath(item.filename)
                  mode = item.external_attr >> 16
                  file_type = stat.S_IFMT(mode)
                  permissions = stat.S_IMODE(mode)
                  is_directory = item.is_dir() or file_type == stat.S_IFDIR
                  if (
                      not item.filename
                      or "\\" in item.filename
                      or path.is_absolute()
                      or ".." in path.parts
                      or not path.parts
                      or path.parts[0] != "App.xcarchive"
                      or item.flag_bits & 1
                      or file_type not in {0, stat.S_IFREG, stat.S_IFDIR}
                      or permissions & (stat.S_ISUID | stat.S_ISGID | stat.S_ISVTX | 0o022)
                  ):
                      raise SystemExit("unsigned archive contains an unsafe member")
                  if is_directory:
                      directories.add(path)
                  else:
                      safe_mode = 0o755 if permissions & 0o111 else 0o644
                      files.append((item, path, safe_mode))
                      directories.update(pathlib.PurePosixPath(*path.parts[:index]) for index in range(1, len(path.parts)))
