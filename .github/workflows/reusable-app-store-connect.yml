name: Reusable App Store Connect Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      environment-name:
        description: Protected deployment environment for Apple secrets.
        required: false
        type: string
        default: app-store-connect
      xcode-version:
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: "."
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      gated-sha:
        description: >-
          The commit SHA the release gate validated (reusable-release-gate.yml's
          gated-sha output). C12-W2: archive from this immutable commit — never the
          mutable tag — and re-verify the tag still points at it before uploading.
        required: true
        type: string
      checkpoint-digest:
        description: Exact canonical checkpoint digest emitted by the nonprivileged release gate.
        required: true
        type: string
      checkpoint-run-id:
        required: true
        type: string
      verified-envelope-digest:
        required: true
        type: string
      scheme:
        required: true
        type: string
      workspace:
        required: false
        type: string
        default: ""
      project:
        required: false
        type: string
        default: ""
      bundle-identifier:
        required: false
        type: string
        default: ""
      team-id:
        required: false
        type: string
        default: ""
      configuration:
        required: false
        type: string
        default: Release
      sdk:
        required: false
        type: string
        default: iphoneos
      archive-path:
        required: false
        type: string
        default: build/App.xcarchive
      export-path:
        required: false
        type: string
        default: build/export
      export-options-plist:
        description: Path to an ExportOptions.plist. If empty, one is generated from export-method/team-id.
        required: false
        type: string
        default: ""
      export-method:
        description: Export method (app-store, ad-hoc, or development) used to generate ExportOptions.plist.
        required: false
        type: string
        default: app-store
      version-command:
        description: Optional command to set marketing/build version before archive.
        required: false
        type: string
        default: ""
      submit-for-review:
        required: false
        type: boolean
        default: false
      submit-for-review-command:
        description: >-
          Optional CUSTOM submit command. C12-W6 (breaking): it now runs AFTER the
          signing cleanup and receives NO App Store Connect private key (neither in
          env nor as the on-disk .p8), so a compromised helper cannot exfiltrate it.
          Commands that need ASC auth must migrate to the built-in submit (leave
          this empty and set submit-for-review + bundle-identifier).
        required: false
        type: string
        default: ""
      verifier-app-owner:
        description: GitHub owner whose Aviato verifier App installation is selected.
        required: false
        type: string
        default: ""
    secrets:
      AVIATO_VERIFIER_APP_ID:
        required: true
      AVIATO_VERIFIER_APP_PRIVATE_KEY:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_PRIVATE_KEY:
        required: true
      APPLE_CERTIFICATE_P12_BASE64:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      APPLE_PROVISIONING_PROFILE_BASE64:
        required: true

# review #26: serialize App Store uploads per repo for parity with the other deploys — a re-run
# should queue, not race a parallel upload. Bounded anyway by App Store Connect rejecting a
# duplicate build number.
concurrency:
  group: aviato-app-store-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  # second-review fix: GET /repos/{o}/{r}/environments/{name} (the §11.4 reviewer
  # probe) requires the Actions repository permission; without it the called
  # workflow's permissions block zeroes the scope and the probe 403s on EVERY run.
  actions: read

jobs:
  build-unsigned:
    name: Build unsigned App Store archive
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      attestations: write
      id-token: write
    outputs:
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      archive-sha256: ${{ steps.package.outputs.archive-sha256 }}
      release-tag: ${{ steps.release.outputs.tag }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      SCHEME: ${{ inputs.scheme }}
      WORKSPACE: ${{ inputs.workspace }}
      PROJECT: ${{ inputs.project }}
      CONFIGURATION: ${{ inputs.configuration }}
      SDK: ${{ inputs.sdk }}
      ARCHIVE_PATH: ${{ inputs.archive-path }}
    steps:
      - name: Checkout immutable consumer source without credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.gated-sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Select Xcode
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: ${{ inputs.xcode-version }}
      - name: Validate release tag against gated commit
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
          GATED_SHA: ${{ inputs.gated-sha }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            RELEASE_TAG="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::App Store publishing requires a tag ref or an explicit release-tag input."
              exit 1
            fi
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${RELEASE_TAG}"
            exit 1
          fi
          [ "$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")" = "${GATED_SHA}" ]
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
      - name: Apply version command without any release secret
        if: ${{ inputs.version-command != '' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          MARKETING_VERSION: ${{ steps.release.outputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_COMMAND: ${{ inputs.version-command }}
        run: |
          set -euo pipefail
          eval "$VERSION_COMMAND"
      - name: Build unsigned archive without keychain or provisioning material
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${ARCHIVE_PATH}")"
          common=(archive -scheme "${SCHEME}" -configuration "${CONFIGURATION}" -sdk "${SDK}" -archivePath "${ARCHIVE_PATH}" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO)
          if [ -n "${WORKSPACE}" ]; then
            xcodebuild -workspace "${WORKSPACE}" "${common[@]}"
          elif [ -n "${PROJECT}" ]; then
            xcodebuild -project "${PROJECT}" "${common[@]}"
          else
            echo "::error::Either workspace or project must be provided."
            exit 1
          fi
      - name: Package content-addressed unsigned archive
        id: package
        working-directory: .
        shell: bash
        env:
          SOURCE: ${{ inputs.working-directory }}/${{ inputs.archive-path }}
        run: |
          set -euo pipefail
          [ -d "${SOURCE}" ]
          /usr/bin/ditto -c -k --keepParent "${SOURCE}" unsigned-xcarchive.zip
          digest="$(shasum -a 256 unsigned-xcarchive.zip | awk '{print $1}')"
          echo "archive-sha256=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Attest unsigned archive provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: unsigned-xcarchive.zip
      - name: Upload unsigned archive
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: app-store-unsigned-xcarchive
          path: unsigned-xcarchive.zip
          if-no-files-found: error
          retention-days: 1

  app-store-connect:
    name: Publish to App Store Connect
    needs: build-unsigned
    runs-on: macos-latest
    permissions:
      actions: read
      attestations: read
      contents: read
    outputs:
      release-tag: ${{ needs.build-unsigned.outputs.release-tag }}
      checkpoint-digest: ${{ steps.authorization.outputs.checkpoint-digest }}
      checkpoint-run-id: ${{ inputs.checkpoint-run-id }}
      verified-envelope-digest: ${{ inputs.verified-envelope-digest }}
    environment:
      name: ${{ inputs.environment-name }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      SCHEME: ${{ inputs.scheme }}
      WORKSPACE: ${{ inputs.workspace }}
      PROJECT: ${{ inputs.project }}
      BUNDLE_IDENTIFIER: ${{ inputs.bundle-identifier }}
      TEAM_ID: ${{ inputs.team-id }}
      CONFIGURATION: ${{ inputs.configuration }}
      SDK: ${{ inputs.sdk }}
      ARCHIVE_PATH: ${{ inputs.archive-path }}
      EXPORT_PATH: ${{ inputs.export-path }}
      EXPORT_OPTIONS_PLIST: ${{ inputs.export-options-plist }}
      EXPORT_METHOD: ${{ inputs.export-method }}
      # This trusted job starts on a fresh runner and never checks out or executes
      # consumer source.  The unsigned archive is an attested data artifact only.
    steps:
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        env:
          GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=false&per_page=100" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments?per_page=100" >/dev/null
      - name: Recheck exact authorization outputs before environment secrets
        id: authorization
        working-directory: "."
        shell: bash
        env:
          GATED_SHA: ${{ inputs.gated-sha }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${GATED_SHA}" =~ ^[0-9a-f]{40}$ && "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::invalid authorization outputs"; exit 1; }
          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]
          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          echo "checkpoint-digest=${CHECKPOINT_DIGEST}" >> "${GITHUB_OUTPUT}"

      # §11.4: the six Apple secrets may only materialize behind a reviewer-protected
      # environment. GitHub AUTO-CREATES a referenced-but-undefined environment with NO
      # protection rules, so the job-level `environment:` line alone proves nothing.
      # Fail CLOSED: unreadable protection state is treated as unprotected (§5.14).
      - name: Verify deployment environment requires reviewers (§11.4)
        working-directory: "."
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ENV_NAME: ${{ inputs.environment-name }}
        run: |
          set -euo pipefail
          if ! response="$(gh api "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}" 2>err.txt)"; then
            echo "::error::Could not read environment '${ENV_NAME}' protection rules ($(cat err.txt)); refusing to expose signing secrets (§11.4)."
            exit 1
          fi
          if ! jq -e 'any(.protection_rules[]?; .type == "required_reviewers" and ((.reviewers? | type) == "array") and ((.reviewers | length) > 0))' <<<"${response}" >/dev/null; then
            echo "::error::Environment '${ENV_NAME}' has no required reviewers; configure them (Settings → Environments) before App Store deploys (§11.4)."
            exit 1
          fi
          [ "$(jq -r .can_admins_bypass <<<"${response}")" = "false" ] || { echo "::error::Environment '${ENV_NAME}' permits admin bypass"; exit 1; }
          echo "Environment '${ENV_NAME}' requires reviewers."

      - name: Select Xcode
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Download attested unsigned archive
        uses: actions/download-artifact@v8
        with:
          name: app-store-unsigned-xcarchive
          path: unsigned-input
      - name: Validate digest, attestation, and safe archive members
        working-directory: .
        shell: bash
        env:
          EXPECTED_SHA256: ${{ needs.build-unsigned.outputs.archive-sha256 }}
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.build-unsigned.outputs.artifact-digest }}
          ARCHIVE_PATH_INPUT: ${{ inputs.archive-path }}
          WORKING_DIRECTORY_INPUT: ${{ inputs.working-directory }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          zip="unsigned-input/unsigned-xcarchive.zip"
          [[ "${EXPECTED_ARTIFACT_DIGEST}" =~ ^[0-9a-f]{64}$ ]]
          [ "$(shasum -a 256 "${zip}" | awk '{print $1}')" = "${EXPECTED_SHA256}" ]
          gh attestation verify "${zip}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          /usr/bin/python3 -I - "${zip}" "$(basename "${ARCHIVE_PATH_INPUT}")" <<'PY'
          import pathlib, stat, sys, zipfile
          archive, expected_root = sys.argv[1:]
          with zipfile.ZipFile(archive) as handle:
              infos = handle.infolist()
              if not infos or len(infos) > 100_000 or sum(item.file_size for item in infos) > 8 * 1024**3:
                  raise SystemExit("unsigned archive inventory is empty or exceeds bounds")
              for item in infos:
                  path = pathlib.PurePosixPath(item.filename)
                  mode = item.external_attr >> 16
                  if path.is_absolute() or ".." in path.parts or path.parts[0] != expected_root:
                      raise SystemExit("unsigned archive path escapes its declared root")
                  file_type = stat.S_IFMT(mode)
                  if file_type not in {0, stat.S_IFREG, stat.S_IFDIR}:
                      raise SystemExit("unsigned archive contains a non-regular member")
          PY
          destination="${WORKING_DIRECTORY_INPUT}/$(dirname "${ARCHIVE_PATH_INPUT}")"
          mkdir -p "${destination}"
          /usr/bin/ditto -x -k "${zip}" "${destination}"
          [ -d "${WORKING_DIRECTORY_INPUT}/${ARCHIVE_PATH_INPUT}" ]

      - name: Verify full authority before importing signing secrets
        working-directory: "."
        shell: bash
        env:
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${envelope}")"
          ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${envelope}")"
          path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${envelope}")"
          blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${envelope}")"
          payload="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${repo}/contents/${path}" -f "ref=${ref}")"
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: this step must immediately precede Apple-secret import.
          AVIATO_VERIFIER_JSON="${payload}" AVIATO_VERIFIER_BLOB="${blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          body = base64.b64decode(payload["content"], validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY

      - name: Install signing assets
        shell: bash
        env:
          # R7-4-APPSTORE-OIDC: signing-assets-install is the ONE step that consumes the certificate
          # and provisioning material; expose the secrets here, not job-wide.
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          ENV_NAME: ${{ inputs.environment-name }}
        run: |
          set -euo pipefail

          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}" --jq '.status + ":" + .conclusion')" = "completed:success" ]
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          key_id="$(jq -r .key_id "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "([flatten[] | select((.id|tostring) == \"${key_id}\")] | length) == 1" | grep -qx true
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}" --jq .can_admins_bypass)" = "false" ]

          decode_base64() {
            local value="$1" output="$2"
            if ! printf '%s' "${value}" | base64 --decode > "${output}" 2>/dev/null; then
              printf '%s' "${value}" | base64 -D > "${output}"
            fi
          }

          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="${RUNNER_TEMP}/certificate.p12"
          profile_path="${RUNNER_TEMP}/profile.mobileprovision"
          profile_plist="${RUNNER_TEMP}/profile.plist"

          echo "::add-mask::${keychain_password}"
          echo "KEYCHAIN_PATH=${keychain_path}" >> "${GITHUB_ENV}"
          # R9-9: KEYCHAIN_PASSWORD is NOT persisted to $GITHUB_ENV — it is used only within this step
          # (create/unlock the keychain) and nothing downstream reads it (cleanup deletes by path), so
          # exporting it would needlessly expose the unlocked-keychain password to every later step.

          decode_base64 "${APPLE_CERTIFICATE_P12_BASE64}" "${certificate_path}"
          decode_base64 "${APPLE_PROVISIONING_PROFILE_BASE64}" "${profile_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" login.keychain-db

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "${profile_path}" > "${profile_plist}"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "${profile_plist}")"
          cp "${profile_path}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"

          mkdir -p "${HOME}/.appstoreconnect/private_keys"
          printf '%s' "${APP_STORE_CONNECT_API_PRIVATE_KEY}" > "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          chmod 600 "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Resolve export options
        shell: bash
        run: |
          set -euo pipefail
          # Use the caller-supplied plist if given; otherwise generate one from the
          # declared export-method + team-id (§13.4) so the consumer need not hand-author it.
          if [ -n "${EXPORT_OPTIONS_PLIST}" ]; then
            echo "RESOLVED_EXPORT_OPTIONS=${EXPORT_OPTIONS_PLIST}" >> "${GITHUB_ENV}"
            exit 0
          fi
          case "${EXPORT_METHOD}" in
            app-store|ad-hoc|development) ;;
            *) echo "::error::Unsupported export-method '${EXPORT_METHOD}' (app-store, ad-hoc, development)."; exit 1 ;;
          esac
          generated="${RUNNER_TEMP}/ExportOptions.plist"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>method</key>'
            printf '  <string>%s</string>\n' "${EXPORT_METHOD}"
            if [ -n "${TEAM_ID}" ]; then
              echo '  <key>teamID</key>'
              printf '  <string>%s</string>\n' "${TEAM_ID}"
            fi
            echo '</dict>'
            echo '</plist>'
          } > "${generated}"
          echo "RESOLVED_EXPORT_OPTIONS=${generated}" >> "${GITHUB_ENV}"

      - name: Export signed app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${RESOLVED_EXPORT_OPTIONS}"

      - name: Upload to App Store Connect
        shell: bash
        env:
          # R7-4-APPSTORE-OIDC: only altool needs the App Store Connect API key/issuer; expose them
          # here rather than job-wide so the earlier operator `eval "$VERSION_COMMAND"` step ran
          # without these in scope.
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          ENV_NAME: ${{ inputs.environment-name }}
        run: |
          set -euo pipefail
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}" --jq '.status + ":" + .conclusion')" = "completed:success" ]
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          key_id="$(jq -r .key_id "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          public_key="$(gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "[flatten[] | select((.id|tostring) == \"${key_id}\")] | if length == 1 then .[0].key else error(\"signing key must be unique\") end")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${ENV_NAME}" --jq .can_admins_bypass)" = "false" ]
          authority_dir="$(mktemp -d)"
          printf '%s %s\n' "${reviewer}" "${public_key}" > "${authority_dir}/allowed"
          jq -cS .checkpoint "${envelope}" > "${authority_dir}/message"
          jq -r .signature "${envelope}" | python3 -c 'import base64,sys; value=sys.stdin.read().strip(); sys.stdout.buffer.write(base64.urlsafe_b64decode(value + "=" * (-len(value) % 4)))' > "${authority_dir}/signature"
          ssh-keygen -Y verify -f "${authority_dir}/allowed" -I "${reviewer}" -n aviato -s "${authority_dir}/signature" < "${authority_dir}/message"
          repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${envelope}")"
          ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${envelope}")"
          path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${envelope}")"
          blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${envelope}")"
          payload="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${repo}/contents/${path}" -f "ref=${ref}")"
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: fresh full authority immediately before upload.
          AVIATO_VERIFIER_JSON="${payload}" AVIATO_VERIFIER_BLOB="${blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          body = base64.b64decode(payload["content"], validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          ipa_path="$(find "${EXPORT_PATH}" -maxdepth 1 -name '*.ipa' -print | head -n1)"
          if [ -z "${ipa_path}" ]; then
            echo "::error::No .ipa found in ${EXPORT_PATH}."
            exit 1
          fi

          mkdir -p build
          xcrun altool --upload-app \
            --type ios \
            --file "${ipa_path}" \
            --apiKey "${APP_STORE_CONNECT_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_ISSUER_ID}" \
            2>&1 | tee build/app-store-upload.log

      # C12-W6: the built-in DECLARATIVE submit replaces the key-bearing operator eval.
      # It is a bounded fastlane invocation — no arbitrary code runs with the ASC
      # private key in scope. fastlane ships preinstalled on GitHub's macOS runners;
      # fail CLOSED if absent rather than fetching one at run time (§11.3).
      - name: Submit for review (built-in)
        if: ${{ inputs.submit-for-review && inputs.submit-for-review-command == '' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.build-unsigned.outputs.release-tag }}
          # C12-W6: besides the signing install, this bounded step is the ONLY consumer
          # of the ASC private key.
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
          VERIFIED_ENVELOPE_DIGEST: ${{ inputs.verified-envelope-digest }}
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${envelope}")"
          ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${envelope}")"
          path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${envelope}")"
          blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${envelope}")"
          payload="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${repo}/contents/${path}" -f "ref=${ref}")"
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: fresh full authority immediately before built-in submit.
          AVIATO_VERIFIER_JSON="${payload}" AVIATO_VERIFIER_BLOB="${blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          body = base64.b64decode(payload["content"], validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          if ! command -v fastlane >/dev/null 2>&1; then
            echo "::error::fastlane is not available on the runner; cannot run the built-in submit (C12-W6)."
            exit 1
          fi
          if [ -z "${BUNDLE_IDENTIFIER}" ]; then
            echo "::error::The built-in submit requires the bundle-identifier input (deliver targets the app by identifier)."
            exit 1
          fi
          api_key_path="$(mktemp -d)/asc-api-key.json"
          cleanup() { rm -f "${api_key_path}"; }
          trap cleanup EXIT
          jq -n --arg key_id "${APP_STORE_CONNECT_KEY_ID}" \
                --arg issuer_id "${APP_STORE_CONNECT_ISSUER_ID}" \
                --arg key "${APP_STORE_CONNECT_API_PRIVATE_KEY}" \
                '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' > "${api_key_path}"
          # second-review fix: NO explicit --build_number — deliver's explicit-build
          # selection raises immediately when the just-uploaded build is still in ASC
          # processing (a deterministic race: altool returns on receipt, processing
          # takes minutes). Without it, deliver selects the latest build for the app
          # version and WAITS for processing itself.
          fastlane deliver \
            --api_key_path "${api_key_path}" \
            --app_identifier "${BUNDLE_IDENTIFIER}" \
            --app_version "${RELEASE_TAG}" \
            --skip_binary_upload true \
            --skip_screenshots true \
            --skip_metadata true \
            --submit_for_review true \
            --automatic_release false \
            --precheck_include_in_app_purchases false \
            --force true

      # C12-W6: cleanup runs BEFORE any custom submit command, so the on-disk .p8 and
      # the keychain are gone by the time arbitrary operator code executes.
      - name: Cleanup signing assets
        if: ${{ always() }}
        shell: bash
        env:
          # R7-4-APPSTORE-OIDC: cleanup only needs the key id to construct the .p8 filename it deletes.
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
          rm -f "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Upload App Store Connect receipt
        # §13.4.7: the upload receipt is the checkable evidence of the operator-verified
        # deploy. if-no-files-found is ERROR (a publish that produced no receipt must not
        # pass silently); on already-failed runs the extra error line is truthful noise.
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: app-store-connect-upload
          path: ${{ inputs.working-directory }}/build/app-store-upload.log
          if-no-files-found: error
          retention-days: 90

  custom-submit:
    name: Run custom post-upload command without release secrets
    needs: app-store-connect
    if: ${{ inputs.submit-for-review && inputs.submit-for-review-command != '' }}
    runs-on: macos-latest
    permissions: {}
    steps:
      - name: Submit for review (custom command)
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.app-store-connect.outputs.release-tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          SUBMIT_FOR_REVIEW_COMMAND: ${{ inputs.submit-for-review-command }}
        run: |
          set -euo pipefail
          eval "$SUBMIT_FOR_REVIEW_COMMAND"

  release-evidence:
    name: Persist App Store release evidence
    needs: app-store-connect
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        env:
          GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=false&per_page=100" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments?per_page=100" >/dev/null
      - name: Recheck authorization before release mutation
        shell: bash
        env:
          CHECKPOINT_DIGEST: ${{ needs.app-store-connect.outputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ needs.app-store-connect.outputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ needs.app-store-connect.outputs.verified-envelope-digest }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::invalid authorization output"; exit 1; }
          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]
          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${envelope}" | awk '{print $1}')" = "${VERIFIED_ENVELOPE_DIGEST}" ]
          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e '.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1" and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${envelope}" >/dev/null
          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"
          key_id="$(jq -r .key_id "${envelope}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "([flatten[] | select((.id|tostring) == \"${key_id}\")] | length) == 1" | grep -qx true
          public_key="$(gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "[flatten[] | select((.id|tostring) == \"${key_id}\")] | if length == 1 then .[0].key else error(\"signing key must be unique\") end")"
          authority_dir="$(mktemp -d)"
          printf '%s %s\n' "${reviewer}" "${public_key}" > "${authority_dir}/allowed"
          jq -cS .checkpoint "${envelope}" > "${authority_dir}/message"
          jq -r .signature "${envelope}" | python3 -c 'import base64,sys; value=sys.stdin.read().strip(); sys.stdout.buffer.write(base64.urlsafe_b64decode(value + "=" * (-len(value) % 4)))' > "${authority_dir}/signature"
          ssh-keygen -Y verify -f "${authority_dir}/allowed" -I "${reviewer}" -n aviato -s "${authority_dir}/signature" < "${authority_dir}/message"
          while IFS= read -r environment_name; do
            [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${environment_name}" --jq .can_admins_bypass)" = "false" ]
          done < <(jq -r '.checkpoint.authority_snapshot.environments | keys[]' "${envelope}")

      - name: Download App Store Connect receipt
        uses: actions/download-artifact@v8
        with:
          name: app-store-connect-upload
          path: receipt

      - name: Persist receipt asset and release-note evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.app-store-connect.outputs.release-tag }}
          ASSET_NAME: app-store-connect-upload.log
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          downloaded_receipt="receipt/app-store-upload.log"
          asset="receipt/${ASSET_NAME}"
          if [ ! -s "${downloaded_receipt}" ]; then
            echo "::error::App Store Connect upload receipt is missing or empty."
            exit 1
          fi
          cp "${downloaded_receipt}" "${asset}"

          # --clobber makes reruns replace the same durable release asset instead
          # of creating duplicates or failing after an otherwise successful upload.
          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"
          repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${envelope}")"
          ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${envelope}")"
          path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${envelope}")"
          blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${envelope}")"
          payload="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${repo}/contents/${path}" -f "ref=${ref}")"
          aviato_verify_authority() {
            # AVIATO_SECURE_VERIFIER_BOOTSTRAP: fresh full authority before each release write.
            AVIATO_VERIFIER_JSON="${payload}" AVIATO_VERIFIER_BLOB="${blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          body = base64.b64decode(payload["content"], validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          }
          aviato_verify_authority
          gh release upload "${RELEASE_TAG}" "${asset}" --clobber

          start='<!-- aviato:app-store-connect-receipt:start -->'
          end='<!-- aviato:app-store-connect-receipt:end -->'
          current="$(gh release view "${RELEASE_TAG}" --json body --jq '.body // ""')"
          notes="$(mktemp)"
          cleaned="$(mktemp)"
          trap 'rm -f "${notes}" "${cleaned}"' EXIT
          printf '%s\n' "${current}" | awk -v start="${start}" -v end="${end}" '
            $0 == start { replacing = 1; next }
            $0 == end { replacing = 0; next }
            !replacing { print }
          ' > "${cleaned}"
          cat "${cleaned}" > "${notes}"
          cat >> "${notes}" <<EOF

          ${start}
          ## App Store Connect upload receipt

          [Download the durable upload receipt](https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}/${ASSET_NAME}).
          ${end}
          EOF
          aviato_verify_authority
          gh release edit "${RELEASE_TAG}" --notes-file "${notes}"
