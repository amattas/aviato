# CI — lint the kit masters. Keep the job id `ci` — the branch ruleset
# requires a check context named "ci".
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: yamllint
        run: |
          python3 -m pip install --quiet yamllint==1.38.0
          yamllint -s .
      - name: Install actionlint (checksum-verified)
        run: |
          set -euo pipefail
          version="1.7.4"
          sha256="fc0a6886bbb9a23a39eeec4b176193cadb54ddbe77cdbb19b637933919545395"
          tarball="${RUNNER_TEMP:-/tmp}/actionlint.tar.gz"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" -o "${tarball}"
          echo "${sha256}  ${tarball}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "${tarball}" actionlint
      - name: actionlint (this repo + every kit workflow master)
        run: |
          actionlint .github/workflows/*.yml starter/*/ci.yml starter/*/release.yml starter/docs-site/docs.yml
      - name: shellcheck
        run: shellcheck starter/rulesets/apply-rulesets.sh
      - name: Validate ruleset payloads
        run: |
          jq -e .name starter/rulesets/ruleset-branch.json
          jq -e .name starter/rulesets/ruleset-tag.json
