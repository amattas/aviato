# aviato:managed profile=python-library version=0 hash=5b416bda75a05aac385bef88c08766b80cd0b762c53a87f0e901f5e1b79c7578
name: Aviato Drift Detection

# Consumer-side scheduled automation (§5.5/§5.6). Detects file/settings drift and
# reports (proposals + tracking issues); never mutates protected settings. The
# schedule is jittered inside the reusable workflow so a fleet on the same cron
# does not stampede the platform.

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  drift:
    uses: ./.github/workflows/reusable-consumer-automation.yml
    with:
      aviato-ref: 0
      local-install: true
    secrets:
      # Optional: define AVIATO_SETTINGS_TOKEN (admin-capable) to enable settings-drift
      # detection; without it only file drift runs (the platform token cannot read
      # branch protection / rulesets, §5.6).
      settings-token: ${{ secrets.AVIATO_SETTINGS_TOKEN }}
