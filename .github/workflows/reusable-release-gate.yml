name: Reusable Release Gate

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      default-branch:
        description: Branch that release tags must point at.
        required: false
        type: string
        default: main
      require-merged-pr:
        description: Require the tagged commit to be the merge commit of a PR into the default branch.
        required: false
        type: boolean
        default: true
      release-tag:
        description: >-
          The release tag to gate when invoked IN-RUN (branch context) by the release
          job, e.g. 1.2.3 (bare SemVer; the policy rejects a v-prefix). When empty the
          gate runs in the classic tag-ref context and validates GITHUB_REF_NAME.
        required: false
        type: string
        default: ""
      required-workflow:
        description: Optional workflow file name or ID that must have a successful push run for the tagged commit.
        required: false
        type: string
        default: ""
      checkpoint-run-id:
        description: Exact successful managed checkpoint intake run.
        required: false
        type: string
        default: ""
      checkpoint-digest:
        description: SHA-256 of the canonical verified checkpoint.
        required: false
        type: string
        default: ""
      intended-actor:
        description: Exact actor bound by the signed checkpoint.
        required: false
        type: string
        default: ""
      merged-sha:
        description: Exact default-branch commit bound by the checkpoint.
        required: false
        type: string
        default: ""
    outputs:
      gated-sha:
        description: >-
          The immutable release commit this gate validated: the commit peeled from
          release-tag, or from GITHUB_SHA in the classic tag-ref context.
          C12-W2: deploys must check out THIS immutable SHA and re-verify the release
          tag still points at it before publishing — a tag force-moved between gate
          and publish must abort the deploy, never ship.
        value: ${{ jobs.gate.outputs.gated-sha }}
      checkpoint-digest:
        description: Revalidated canonical checkpoint digest for downstream manifests.
        value: ${{ jobs.gate.outputs.checkpoint-digest }}

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      gated-sha: ${{ steps.resolve-gated-sha.outputs.gated-sha }}
      checkpoint-digest: ${{ steps.checkpoint.outputs.checkpoint-digest }}
    steps:
      - name: Verify one exact fresh managed checkpoint before privilege
        id: checkpoint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHECKPOINT_RUN_ID: ${{ inputs.checkpoint-run-id }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          INTENDED_ACTOR: ${{ inputs.intended-actor }}
          MERGED_SHA: ${{ inputs.merged-sha }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          set -euo pipefail
          [[ "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || { echo "::error::missing checkpoint run"; exit 1; }
          [[ "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::invalid checkpoint digest"; exit 1; }
          [ "${GITHUB_ACTOR}" = "${INTENDED_ACTOR}" ] || { echo "::error::actual release actor differs from signed intended actor"; exit 1; }
          run="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}")"
          jq -e --arg branch "${DEFAULT_BRANCH}" --arg actor "${INTENDED_ACTOR}" --arg sha "${MERGED_SHA}" '
            .event == "workflow_dispatch" and .status == "completed" and .conclusion == "success"
            and .head_branch == $branch and .head_sha == $sha and .actor.login != $actor
          ' <<<"${run}" >/dev/null || { echo "::error::checkpoint run binding mismatch"; exit 1; }
          mkdir -p "${RUNNER_TEMP}/checkpoint"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/checkpoint"
          document="${RUNNER_TEMP}/checkpoint/verified-checkpoint.json"
          [ -f "${document}" ] || { echo "::error::verified checkpoint artifact missing"; exit 1; }
          actual="$(shasum -a 256 "${document}" | awk '{print $1}')"
          [ "${actual}" = "${CHECKPOINT_DIGEST}" ] || { echo "::error::checkpoint digest mismatch"; exit 1; }
          jq -e --arg repo "${GITHUB_REPOSITORY}" --arg actor "${INTENDED_ACTOR}" --arg sha "${MERGED_SHA}" '
            .repository == $repo and .intended_actor == $actor and .sha == $sha
            and .reviewer != $actor and (.expires_at | fromdateiso8601) > now
          ' "${document}" >/dev/null || { echo "::error::checkpoint payload is missing, stale, team-only, or mismatched"; exit 1; }
          echo "checkpoint-digest=${CHECKPOINT_DIGEST}" >> "${GITHUB_OUTPUT}"
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          # Two contexts: IN-RUN (release-tag input set, branch ref) or classic tag ref.
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          echo "RESOLVED_TAG=${tag}" >> "${GITHUB_ENV}"

      - name: Resolve gated commit
        id: resolve-gated-sha
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            # workflow_run and in-run callers execute in a branch/event context. The
            # release tag, not that event SHA, is the immutable release identity.
            gated_sha="$(git rev-parse "refs/tags/${RESOLVED_TAG}^{commit}")"
          else
            # A classic tag-triggered workflow already carries the release commit.
            gated_sha="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          fi
          echo "gated-sha=${gated_sha}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag points at default branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
          GATED_SHA: ${{ steps.resolve-gated-sha.outputs.gated-sha }}
        run: |
          set -euo pipefail
          # Checkout deliberately does not persist the token. Scope authentication
          # to this one trusted fetch through process-local git config variables.
          if [ -n "${GH_TOKEN:-}" ]; then
            basic_auth="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"
            GIT_CONFIG_COUNT=1 \
              GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
              GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${basic_auth}" \
              git fetch origin "${DEFAULT_BRANCH}" --tags
          else
            # Supports the executable workflow fixture's local-file remote.
            git fetch origin "${DEFAULT_BRANCH}" --tags
          fi
          # The resolved tag commit must be REACHABLE FROM the default branch. The event
          # SHA may be a later descendant when this gate runs from workflow_run.
          # R6-4-DOCSGATE: the previous strict equality (gated_sha == branch_tip) caused docs deploy
          # (which runs on workflow_run minutes after the main CI) to fail valid releases whenever
          # ANY unrelated push landed on the default branch in that window. The §5.9 invariant is
          # "the gated commit IS on the default branch's history" — is-ancestor is the correct check
          # (handles tip-equality AND the post-CI-push case). Reject only when off the branch.
          gated_commit="$(git rev-parse "${GATED_SHA}^{commit}")"
          branch_sha="$(git rev-parse "origin/${DEFAULT_BRANCH}")"

          if ! git merge-base --is-ancestor "${gated_commit}" "${branch_sha}"; then
            echo "::error::${RESOLVED_TAG} (${gated_commit}) is not reachable from origin/${DEFAULT_BRANCH} (${branch_sha})."
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${RESOLVED_TAG}" >/dev/null; then
            tag_sha="$(git rev-parse "refs/tags/${RESOLVED_TAG}^{commit}")"
            if [ "${tag_sha}" != "${gated_commit}" ]; then
              echo "::error::Tag ${RESOLVED_TAG} (${tag_sha}) does not point at the gated commit ${gated_commit}."
              exit 1
            fi
          fi

      - name: Require merged pull request
        if: ${{ inputs.require-merged-pr }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
          GATED_SHA: ${{ steps.resolve-gated-sha.outputs.gated-sha }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          # $owner/$repo/$sha below are GraphQL variables (bound via -f), NOT shell vars,
          # so they intentionally do not expand in the single-quoted query (SC2016).
          # shellcheck disable=SC2016
          response="$(gh api graphql \
            -f owner="${owner}" \
            -f repo="${repo}" \
            -f sha="${GATED_SHA}" \
            -f query='
              query($owner: String!, $repo: String!, $sha: GitObjectID!) {
                repository(owner: $owner, name: $repo) {
                  object(oid: $sha) {
                    ... on Commit {
                      associatedPullRequests(first: 20) {
                        nodes {
                          number
                          merged
                          baseRefName
                          headRefName
                          mergeCommit {
                            oid
                          }
                        }
                      }
                    }
                  }
                }
              }')"

          pr_json="$(jq -c --arg sha "${GATED_SHA}" --arg base "${DEFAULT_BRANCH}" '
            .data.repository.object.associatedPullRequests.nodes[]
            | select(.merged == true and .baseRefName == $base and ((.mergeCommit.oid // $sha) == $sha))
          ' <<<"${response}" | head -n1)"

          if [ -z "${pr_json}" ]; then
            echo "::error::${RESOLVED_TAG} must point at the ${DEFAULT_BRANCH} tip associated with a merged PR."
            exit 1
          fi

          echo "Release tag is based on PR #$(jq -r '.number' <<<"${pr_json}") from $(jq -r '.headRefName' <<<"${pr_json}")."

      - name: Require successful workflow
        if: ${{ inputs.required-workflow != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRED_WORKFLOW: ${{ inputs.required-workflow }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
          GATED_SHA: ${{ steps.resolve-gated-sha.outputs.gated-sha }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            response="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${REQUIRED_WORKFLOW}/runs?head_sha=${GATED_SHA}&event=push&per_page=20")"
            matching_runs="$(jq --arg branch "${DEFAULT_BRANCH}" '[.workflow_runs[] | select(.head_branch == $branch)]' <<<"${response}")"
            run_count="$(jq 'length' <<<"${matching_runs}")"

            if [ "${run_count}" = "0" ]; then
              echo "Waiting for ${REQUIRED_WORKFLOW} on ${DEFAULT_BRANCH} for ${GATED_SHA}..."
              sleep 15
              continue
            fi

            successful_run="$(jq -r '
              map(select(.status == "completed" and .conclusion == "success"))
              | sort_by(.run_attempt, .created_at)
              | last
            ' <<<"${matching_runs}")"

            if [ "${successful_run}" != "null" ]; then
              run_id="$(jq -r '.id' <<<"${successful_run}")"
              echo "${REQUIRED_WORKFLOW} run ${run_id} succeeded for ${GATED_SHA}."
              exit 0
            fi

            active_runs="$(jq -r '[.[] | select(.status != "completed") | "\(.id):\(.status)"] | join(", ")' <<<"${matching_runs}")"
            if [ -n "${active_runs}" ]; then
              echo "Waiting on ${REQUIRED_WORKFLOW}: ${active_runs}"
              sleep 30
              continue
            fi

            failed_runs="$(jq -r '[.[] | "\(.id):\(.conclusion // "unknown")"] | join(", ")' <<<"${matching_runs}")"
            echo "::error::${REQUIRED_WORKFLOW} did not succeed on ${DEFAULT_BRANCH} for ${GATED_SHA}. Runs: ${failed_runs}"
            exit 1
          done

          echo "::error::Timed out waiting for ${REQUIRED_WORKFLOW} on ${DEFAULT_BRANCH}."
          exit 1
