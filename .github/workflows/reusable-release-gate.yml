name: Reusable Release Gate

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      default-branch:
        description: Branch that release tags must point at.
        required: false
        type: string
        default: main
      require-merged-pr:
        description: Require the tagged commit to be the merge commit of a PR into the default branch.
        required: false
        type: boolean
        default: true
      required-workflow:
        description: Optional workflow file name or ID that must have a successful push run for the tagged commit.
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        shell: bash
        env:
          TAG_PATTERN: '^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'n.n.n, n.n.n-alphaN, or n.n.n-betaN'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Release workflows must run from a tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Verify tag points at default branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          set -euo pipefail
          git fetch origin "${DEFAULT_BRANCH}" --tags
          tag_sha="$(git rev-parse "${GITHUB_SHA}")"
          branch_sha="$(git rev-parse "origin/${DEFAULT_BRANCH}")"

          if [ "${tag_sha}" != "${branch_sha}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must point at origin/${DEFAULT_BRANCH}."
            echo "tag=${tag_sha}"
            echo "branch=${branch_sha}"
            exit 1
          fi

      - name: Require merged pull request
        if: ${{ inputs.require-merged-pr }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          response="$(gh api graphql \
            -f owner="${owner}" \
            -f repo="${repo}" \
            -f sha="${GITHUB_SHA}" \
            -f query='
              query($owner: String!, $repo: String!, $sha: GitObjectID!) {
                repository(owner: $owner, name: $repo) {
                  object(oid: $sha) {
                    ... on Commit {
                      associatedPullRequests(first: 20) {
                        nodes {
                          number
                          merged
                          baseRefName
                          headRefName
                          mergeCommit {
                            oid
                          }
                        }
                      }
                    }
                  }
                }
              }')"

          pr_json="$(jq -c --arg sha "${GITHUB_SHA}" --arg base "${DEFAULT_BRANCH}" '
            .data.repository.object.associatedPullRequests.nodes[]
            | select(.merged == true and .baseRefName == $base and ((.mergeCommit.oid // $sha) == $sha))
          ' <<<"${response}" | head -n1)"

          if [ -z "${pr_json}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must point at the ${DEFAULT_BRANCH} tip associated with a merged PR."
            exit 1
          fi

          echo "Release tag is based on PR #$(jq -r '.number' <<<"${pr_json}") from $(jq -r '.headRefName' <<<"${pr_json}")."

      - name: Require successful workflow
        if: ${{ inputs.required-workflow != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRED_WORKFLOW: ${{ inputs.required-workflow }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            response="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${REQUIRED_WORKFLOW}/runs?head_sha=${GITHUB_SHA}&event=push&per_page=20")"
            matching_runs="$(jq --arg branch "${DEFAULT_BRANCH}" '[.workflow_runs[] | select(.head_branch == $branch)]' <<<"${response}")"
            run_count="$(jq 'length' <<<"${matching_runs}")"

            if [ "${run_count}" = "0" ]; then
              echo "Waiting for ${REQUIRED_WORKFLOW} on ${DEFAULT_BRANCH} for ${GITHUB_SHA}..."
              sleep 15
              continue
            fi

            successful_run="$(jq -r '
              map(select(.status == "completed" and .conclusion == "success"))
              | sort_by(.run_attempt, .created_at)
              | last
            ' <<<"${matching_runs}")"

            if [ "${successful_run}" != "null" ]; then
              run_id="$(jq -r '.id' <<<"${successful_run}")"
              echo "${REQUIRED_WORKFLOW} run ${run_id} succeeded for ${GITHUB_SHA}."
              exit 0
            fi

            active_runs="$(jq -r '[.[] | select(.status != "completed") | "\(.id):\(.status)"] | join(", ")' <<<"${matching_runs}")"
            if [ -n "${active_runs}" ]; then
              echo "Waiting on ${REQUIRED_WORKFLOW}: ${active_runs}"
              sleep 30
              continue
            fi

            failed_runs="$(jq -r '[.[] | "\(.id):\(.conclusion // "unknown")"] | join(", ")' <<<"${matching_runs}")"
            echo "::error::${REQUIRED_WORKFLOW} did not succeed on ${DEFAULT_BRANCH} for ${GITHUB_SHA}. Runs: ${failed_runs}"
            exit 1
          done

          echo "::error::Timed out waiting for ${REQUIRED_WORKFLOW} on ${DEFAULT_BRANCH}."
          exit 1
