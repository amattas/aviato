name: Reusable PyPI Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      python-version:
        required: false
        type: string
        default: "3.12"
      working-directory:
        required: false
        type: string
        default: "."
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        # §11.3: pin the pip-installed build frontend to an exact version (a package
        # index has no commit digest, so an exact version is the strongest pin).
        default: "python -m pip install build==1.2.2"
      build-command:
        required: false
        type: string
        default: "python -m build"
      packages-dir:
        required: false
        type: string
        default: "dist"
      repository-url:
        description: Optional alternate repository URL, for example TestPyPI.
        required: false
        type: string
        default: ""
      twine-version:
        description: Exact twine version to install (§11.3 — package index has no digest).
        required: false
        type: string
        default: "5.1.1"
      pip-audit-version:
        description: Exact pip-audit version to install (§11.3 — package index has no digest).
        required: false
        type: string
        default: "2.7.3"

permissions:
  contents: read
  id-token: write
  # attestations: write lets the publish attach keyless build provenance (§11.7).
  attestations: write

jobs:
  publish:
    name: Publish Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          # Build from the release tag — explicit in-run, or the tag ref otherwise.
          ref: ${{ inputs.release-tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        shell: bash
        env:
          TAG_PATTERN: '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          echo "RESOLVED_TAG=${tag}" >> "${GITHUB_ENV}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tools
        if: ${{ inputs.install-command != '' }}
        shell: bash
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: eval "$INSTALL_COMMAND"

      - name: Build distributions
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: eval "$BUILD_COMMAND"

      # §13.1: verify metadata, scan dependencies (gate on high/critical), generate
      # SBOM + build provenance — before publishing.
      - name: Verify distribution metadata
        shell: bash
        env:
          TWINE_VERSION: ${{ inputs.twine-version }}
          PACKAGES_DIR: ${{ inputs.packages-dir }}
        run: |
          # §11.3: pin the pip-installed tool to an exact version (not a floating latest).
          python -m pip install --quiet "twine==${TWINE_VERSION}"
          python -m twine check "${PACKAGES_DIR}"/*

      # §11.7/§13.1: scan the PROJECT's installed dependency set (the built wheel in
      # an isolated venv), not the workflow environment. Gates the publish.
      - name: Dependency vulnerability scan (gate)
        shell: bash
        env:
          PACKAGES_DIR: ${{ inputs.packages-dir }}
          PIP_AUDIT_VERSION: ${{ inputs.pip-audit-version }}
        run: |
          set -euo pipefail
          python -m venv /tmp/audit-venv
          # §11.3: pin the pip-installed scanner to an exact version (not a floating latest).
          /tmp/audit-venv/bin/python -m pip install --quiet "pip-audit==${PIP_AUDIT_VERSION}"
          # Install the built wheel so pip-audit sees the project's resolved deps.
          /tmp/audit-venv/bin/python -m pip install --quiet "${PACKAGES_DIR}"/*.whl
          /tmp/audit-venv/bin/python -m pip_audit --strict --progress-spinner off || {
            echo "::error::pip-audit found vulnerabilities in the project's dependencies (gating publish, §11.7).";
            exit 1;
          }

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ inputs.working-directory }}
          format: cyclonedx-json
          output-file: "${{ inputs.working-directory }}/sbom.cyclonedx.json"

      # §11.7: build provenance AND the SBOM are attested to the published artifacts
      # (keyless OIDC), not just generated as loose files.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "${{ inputs.working-directory }}/${{ inputs.packages-dir }}/*"

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-path: "${{ inputs.working-directory }}/${{ inputs.packages-dir }}/*"
          sbom-path: "${{ inputs.working-directory }}/sbom.cyclonedx.json"

      - name: Publish distributions
        if: ${{ inputs.repository-url == '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ inputs.working-directory }}/${{ inputs.packages-dir }}

      - name: Publish distributions to alternate repository
        if: ${{ inputs.repository-url != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: ${{ inputs.working-directory }}/${{ inputs.packages-dir }}
          repository-url: ${{ inputs.repository-url }}

      # §13.1: confirm the published version is resolvable on the index.
      - name: Confirm version resolvable
        shell: bash
        env:
          INDEX_URL: ${{ inputs.repository-url }}
        run: |
          set -euo pipefail
          # Package version is the bare SemVer (strip the leading v from the tag).
          version="${RESOLVED_TAG#v}"
          name="$(python -c 'import tomllib,glob; print(tomllib.load(open("pyproject.toml","rb"))["project"]["name"])')"
          extra=()
          if [ -n "${INDEX_URL}" ]; then extra=(--index-url "${INDEX_URL%/}/simple/"); fi
          for attempt in 1 2 3 4 5; do
            if python -m pip download --no-deps --no-binary :all: "${extra[@]}" "${name}==${version}" -d /tmp/confirm 2>/dev/null; then
              echo "Confirmed ${name}==${version} resolvable."; exit 0
            fi
            echo "Not yet resolvable (attempt ${attempt}); waiting..."; sleep 15
          done
          echo "::warning::Could not confirm ${name}==${version} resolvable (index propagation delay)."
