name: Reusable PyPI Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      python-version:
        required: false
        type: string
        default: "3.12"
      working-directory:
        required: false
        type: string
        default: "."
      install-command:
        required: false
        type: string
        default: "python -m pip install build"
      build-command:
        required: false
        type: string
        default: "python -m build"
      packages-dir:
        required: false
        type: string
        default: "dist"
      repository-url:
        description: Optional alternate repository URL, for example TestPyPI.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write
  # attestations: write lets the publish attach keyless build provenance (§11.7).
  attestations: write

jobs:
  publish:
    name: Publish Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: bash
        env:
          TAG_PATTERN: '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'n.n.n, n.n.n-alphaN, or n.n.n-betaN'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Release workflows must run from a tag ref. Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tools
        if: ${{ inputs.install-command != '' }}
        shell: bash
        run: ${{ inputs.install-command }}

      - name: Build distributions
        shell: bash
        run: ${{ inputs.build-command }}

      # §13.1: verify metadata, scan dependencies (gate on high/critical), generate
      # SBOM + build provenance — before publishing.
      - name: Verify distribution metadata
        shell: bash
        run: |
          python -m pip install --quiet twine
          python -m twine check ${{ inputs.packages-dir }}/*

      # §11.7/§13.1: scan the PROJECT's installed dependency set (the built wheel in
      # an isolated venv), not the workflow environment. Gates the publish.
      - name: Dependency vulnerability scan (gate)
        shell: bash
        env:
          PACKAGES_DIR: ${{ inputs.packages-dir }}
        run: |
          set -euo pipefail
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/python -m pip install --quiet pip-audit
          # Install the built wheel so pip-audit sees the project's resolved deps.
          /tmp/audit-venv/bin/python -m pip install --quiet "${PACKAGES_DIR}"/*.whl
          /tmp/audit-venv/bin/python -m pip_audit --strict --progress-spinner off || {
            echo "::error::pip-audit found vulnerabilities in the project's dependencies (gating publish, §11.7).";
            exit 1;
          }

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.working-directory }}
          format: cyclonedx-json
          output-file: "${{ inputs.working-directory }}/sbom.cyclonedx.json"

      # §11.7: build provenance AND the SBOM are attested to the published artifacts
      # (keyless OIDC), not just generated as loose files.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "${{ inputs.working-directory }}/${{ inputs.packages-dir }}/*"

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-path: "${{ inputs.working-directory }}/${{ inputs.packages-dir }}/*"
          sbom-path: "${{ inputs.working-directory }}/sbom.cyclonedx.json"

      - name: Publish distributions
        if: ${{ inputs.repository-url == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.working-directory }}/${{ inputs.packages-dir }}

      - name: Publish distributions to alternate repository
        if: ${{ inputs.repository-url != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.working-directory }}/${{ inputs.packages-dir }}
          repository-url: ${{ inputs.repository-url }}

      # §13.1: confirm the published version is resolvable on the index.
      - name: Confirm version resolvable
        shell: bash
        env:
          INDEX_URL: ${{ inputs.repository-url }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="$(python -c 'import tomllib,glob; print(tomllib.load(open("pyproject.toml","rb"))["project"]["name"])')"
          extra=""
          if [ -n "${INDEX_URL}" ]; then extra="--index-url ${INDEX_URL%/}/simple/"; fi
          for attempt in 1 2 3 4 5; do
            if python -m pip download --no-deps --no-binary :all: ${extra} "${name}==${version}" -d /tmp/confirm 2>/dev/null; then
              echo "Confirmed ${name}==${version} resolvable."; exit 0
            fi
            echo "Not yet resolvable (attempt ${attempt}); waiting..."; sleep 15
          done
          echo "::warning::Could not confirm ${name}==${version} resolvable (index propagation delay)."
