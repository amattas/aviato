name: Reusable PyPI Publish

on:
  workflow_call:
    outputs:
      resolved-tag:
        description: Validated release tag built into the artifact.
        value: ${{ jobs.build.outputs.resolved-tag }}
      artifact-name:
        description: Fixed name of the vetted distribution and SBOM artifact.
        value: ${{ jobs.build.outputs.artifact-name }}
      distribution-name:
        description: Distribution name read from every built archive's core metadata.
        value: ${{ jobs.build.outputs.distribution-name }}
      package-version:
        description: Package version proven to match the release tag.
        value: ${{ jobs.build.outputs.package-version }}
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      python-version:
        required: false
        type: string
        default: "3.12"
      working-directory:
        required: false
        type: string
        default: "."
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      gated-sha:
        description: >-
          The commit SHA the release gate validated (reusable-release-gate.yml's
          gated-sha output). C12-W2: the build/publish jobs check out this immutable
          commit — never the mutable tag — and re-verify the tag still points at it
          before publishing, so a tag moved between gate and publish aborts.
        required: true
        type: string
      consumer-publisher-present:
        description: >-
          Compatibility marker set only by callers that include the consumer-local
          trusted-publisher job. Run `aviato sync` if this guard fails.
        required: false
        type: boolean
        default: false
      install-command:
        required: false
        type: string
        # §11.3: pin the pip-installed build frontend to an exact version (a package
        # index has no commit digest, so an exact version is the strongest pin).
        default: "python -m pip install build==1.2.2"
      build-command:
        required: false
        type: string
        default: "python -m build"
      packages-dir:
        required: false
        type: string
        default: "dist"
      twine-version:
        description: Exact twine version to install (§11.3 — package index has no digest).
        required: false
        type: string
        # twine < 6 hardcodes supported Metadata-Version <= 2.3 and rejects the 2.4
        # metadata current setuptools emits (PEP 639 license fields) as "missing
        # Name/Version" — observed live on the 0.1.0 publish. 6.x parses 2.4.
        default: "6.2.0"
      pip-audit-version:
        description: Exact pip-audit version to install (§11.3 — package index has no digest).
        required: false
        type: string
        default: "2.7.3"

# review #26: serialize publishes per repo for parity with the GHCR/Pages deploys — a re-run or
# two near-simultaneous in-run deploys for the same tag should queue, not race. Bounded anyway by
# PyPI rejecting a duplicate version upload.
concurrency:
  group: aviato-pypi-${{ github.repository }}
  cancel-in-progress: false

# This reusable half can only build and vet artifacts. PyPI requires the OIDC token's
# workflow identity to be the registered consumer workflow, so publishing lives there.
permissions:
  contents: read

jobs:
  require-consumer-publisher:
    name: Require consumer-local PyPI publisher
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reject stale caller without trusted publisher
        if: ${{ inputs.consumer-publisher-present != true }}
        run: |
          echo "::error::This caller predates the required consumer-local PyPI trusted publisher. Run 'aviato sync .' and commit the updated workflow."
          exit 1

  build:
    name: Build Python package
    needs: require-consumer-publisher
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      resolved-tag: ${{ steps.tag.outputs.resolved-tag }}
      artifact-name: aviato-pypi-dist
      distribution-name: ${{ steps.metadata.outputs.distribution-name }}
      package-version: ${{ steps.metadata.outputs.package-version }}
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          # C12-W2: build from the IMMUTABLE gated commit, not the mutable tag.
          ref: ${{ inputs.gated-sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: tag
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          # resolved-tag crosses the job boundary to the publish job's "confirm resolvable" step.
          echo "resolved-tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag still points at the gated commit (C12-W2)
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.resolved-tag }}
          GATED_SHA: ${{ inputs.gated-sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}" 2>/dev/null || true)"
          if [ -z "${actual}" ] || [ "${actual}" != "${GATED_SHA}" ]; then
            echo "::error::Tag ${RELEASE_TAG} no longer points at the gated commit ${GATED_SHA} (now: ${actual:-missing}) — the tag moved between gate and build; refusing (C12-W2)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}

      # The operator-supplied install/build commands run HERE, in the unprivileged build job —
      # arbitrary build-time dependencies execute with contents:read only, never near the OIDC token.
      - name: Install build tools
        if: ${{ inputs.install-command != '' }}
        shell: bash
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: eval "$INSTALL_COMMAND"

      - name: Build distributions
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: eval "$BUILD_COMMAND"

      - name: Verify archive name and version contract
        id: metadata
        shell: bash
        env:
          PACKAGES_DIR: ${{ inputs.packages-dir }}
          RELEASE_TAG: ${{ steps.tag.outputs.resolved-tag }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import email.parser
          import os
          import pathlib
          import re
          import tarfile
          import zipfile

          dist = pathlib.Path(os.environ["PACKAGES_DIR"])
          archives = sorted(path for path in dist.iterdir() if path.is_file())
          if not archives:
              raise SystemExit("no distribution archives were built")

          def core_metadata(path: pathlib.Path) -> bytes:
              if path.suffix == ".whl" or path.suffix == ".zip":
                  with zipfile.ZipFile(path) as archive:
                      candidates = [name for name in archive.namelist() if name.endswith(".dist-info/METADATA") or (name.endswith("/PKG-INFO") and name.count("/") == 1)]
                      if len(candidates) != 1:
                          raise SystemExit(f"{path.name}: expected exactly one core metadata file")
                      return archive.read(candidates[0])
              if path.name.endswith((".tar.gz", ".tar.bz2", ".tar.xz")):
                  with tarfile.open(path, "r:*") as archive:
                      candidates = [member for member in archive.getmembers() if member.isfile() and member.name.endswith("/PKG-INFO") and member.name.count("/") == 1]
                      if len(candidates) != 1:
                          raise SystemExit(f"{path.name}: expected exactly one PKG-INFO")
                      handle = archive.extractfile(candidates[0])
                      if handle is None:
                          raise SystemExit(f"{path.name}: could not read PKG-INFO")
                      return handle.read()
              raise SystemExit(f"unsupported distribution archive: {path.name}")

          expected_version = re.sub(r"-(alpha|beta)([0-9]+)$", lambda m: {"alpha": "a", "beta": "b"}[m.group(1)] + m.group(2), os.environ["RELEASE_TAG"])
          identities = set()
          for path in archives:
              metadata = email.parser.BytesParser().parsebytes(core_metadata(path))
              name, version = metadata.get("Name"), metadata.get("Version")
              if not name or not version:
                  raise SystemExit(f"{path.name}: core metadata is missing Name or Version")
              identities.add((name, version))
          if len(identities) != 1:
              raise SystemExit(f"distribution archives disagree on name/version: {sorted(identities)}")
          name, version = identities.pop()
          if version != expected_version:
              raise SystemExit(f"package version {version!r} does not match release tag {os.environ['RELEASE_TAG']!r} (expected {expected_version!r})")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"distribution-name={name}", file=output)
              print(f"package-version={version}", file=output)
          PY

      # §13.1: verify metadata + scan dependencies (gate on high/critical) + generate the SBOM
      # before the artifacts ever leave this job. The attestation/publish (which need the OIDC
      # token) happen in the separate publish job below, against these built artifacts.
      - name: Verify distribution metadata
        shell: bash
        env:
          TWINE_VERSION: ${{ inputs.twine-version }}
          PACKAGES_DIR: ${{ inputs.packages-dir }}
        run: |
          # §11.3: pin the pip-installed tool to an exact version (not a floating latest).
          python -m pip install --quiet "twine==${TWINE_VERSION}"
          python -m twine check "${PACKAGES_DIR}"/*

      # §11.7/§13.1: scan the PROJECT's installed dependency set (the built wheel in
      # an isolated venv), not the workflow environment. Gates the publish.
      - name: Dependency vulnerability scan (gate)
        shell: bash
        env:
          PACKAGES_DIR: ${{ inputs.packages-dir }}
          PIP_AUDIT_VERSION: ${{ inputs.pip-audit-version }}
        run: |
          set -euo pipefail
          # AUDIT-SCOPE: scan EXACTLY the project's resolved dependency closure — nothing more.
          # Two live publish failures proved environment-mode auditing gates the publish on
          # things that never ship: on 0.2.0 the project ITSELF (absent from the index on a
          # first publish, its "could not be audited" skip is fatal under --strict, so a first
          # publish could never pass its own gate); on 0.2.1 the venv's runner-seeded pip
          # 25.0.1 (PYSEC-2026-196 et al.) — venv tooling, not a project dependency. So:
          #  - /tmp/project-venv holds the built wheel + its resolved deps (what ships);
          #  - /tmp/audit-venv holds the pip-audit scanner, so the scanner's own dependencies
          #    are never co-audited (or co-resolved) with the project's;
          #  - the audited set is `pip freeze` of the project venv (freeze omits venv tooling —
          #    pip/setuptools/wheel — by design) minus the project's own distribution(s),
          #    excluded by name: wheel filename fields are hyphen-separated with the name part
          #    underscore-normalized, so the first `-` field is exactly the distribution name.
          python -m venv /tmp/audit-venv
          python -m venv /tmp/project-venv
          # §11.3: pin the pip-installed scanner to an exact version (not a floating latest).
          /tmp/audit-venv/bin/python -m pip install --quiet "pip-audit==${PIP_AUDIT_VERSION}"
          # Install the built wheel so the project's dependency closure resolves exactly as shipped.
          /tmp/project-venv/bin/python -m pip install --quiet "${PACKAGES_DIR}"/*.whl
          exclude_args=()
          for wheel in "${PACKAGES_DIR}"/*.whl; do
            exclude_args+=(--exclude "$(basename "${wheel}" | cut -d- -f1)")
          done
          /tmp/project-venv/bin/python -m pip freeze "${exclude_args[@]}" > /tmp/project-reqs.txt
          # R7-1-PIPAUDIT-NOOP: REVERT to `--strict` (the prior fail-closed posture). The R6-2-PIPAUDIT
          # attempt at a "HIGH/CRITICAL only" gate (mirroring the GHCR `trivy --severity ...` pattern)
          # was structurally a NO-OP — pip-audit's OSV/PyPA service does NOT emit per-vuln severity in
          # its --format json output (each vuln carries only id/fix_versions/aliases/description),
          # verified empirically against jinja2==2.10 (10 known HIGH-severity CVEs, all gating-checked
          # to "no severity"). So substring-matching "critical"/"high" against aliases (which are
          # GHSA/CVE/PYSEC identifiers) never fires regardless of actual severity, and a previously
          # fail-closed control silently became fail-open. The pessimistic-but-correct posture is
          # `--strict` — any reported finding blocks the publish — until/unless we switch to a scanner
          # that does expose severity (e.g. osv-scanner, or a separate OSV/NVD lookup). See §11.7/§2.13.
          # `--no-deps` because the freeze output already IS the fully-pinned closure — no
          # resolution wanted; pip-audit warns about unhashed pins, which is acceptable here
          # (the set is generated in-job from the wheel install, not operator-supplied).
          /tmp/audit-venv/bin/python -m pip_audit --strict --no-deps --progress-spinner off -r /tmp/project-reqs.txt || {
            echo "::error::pip-audit found vulnerabilities in the project's dependencies (gating publish, §11.7/§2.13).";
            exit 1;
          }

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ${{ inputs.working-directory }}
          format: cyclonedx-json
          output-file: "${{ inputs.working-directory }}/sbom.cyclonedx.json"

      # Hand the built distributions + SBOM back to the consumer-local publisher.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: aviato-pypi-dist
          path: |
            ${{ inputs.working-directory }}/${{ inputs.packages-dir }}/
            ${{ inputs.working-directory }}/sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 1
