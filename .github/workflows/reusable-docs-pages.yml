name: Reusable Zensical Docs Publish

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: Deprecated. Release validation is embedded in this pinned workflow.
        required: false
        type: string
        default: ""
      working-directory:
        required: false
        type: string
        default: "."
      release-tag:
        description: >-
          Tag to build/publish when invoked IN-RUN (branch context) by the release
          job. When empty the workflow runs in the classic tag-ref context.
        required: false
        type: string
        default: ""
      docs-emit-command:
        description: >-
          §12 language docs emission: a command that writes API/narrative markdown
          into the docs source tree (e.g. pydoc-markdown for Python) before the
          mike version deploy. Empty = narrative-only (Swift).
        required: false
        type: string
        default: ""
      docs-source-directory:
        required: false
        type: string
        default: "."
      docs-requirements:
        description: >-
          Exact-pinned pip requirements for the docs toolchain (zensical + the mike
          fork), relative to working-directory. Missing file fails closed (§11.3).
        required: false
        type: string
        default: "requirements.txt"
      docs-branch:
        description: >-
          Branch the versioned site is committed to and, when serve-pages is true,
          exported as the exact Pages artifact tree.
        required: false
        type: string
        default: "gh-pages"
      serve-pages:
        description: >-
          Deploy the exact docs-branch tree through GitHub Pages Actions after its
          archival branch push succeeds. False still builds and pushes docs-branch.
        required: false
        type: boolean
        default: false
      gated-sha:
        description: >-
          The commit SHA the release gate validated (reusable-release-gate.yml's
          gated-sha output). C12-W2: build docs from this immutable commit — never
          the mutable tag — and re-verify the tag still points at it.
        required: true
        type: string
      docs-retention:
        description: >-
          Optional retention cap (§13.3). 0 — the default — keeps EVERY released
          version's docs; set N>0 to prune to the newest N versions on each release.
        required: false
        type: number
        default: 0

# C12-W4 (adapted for branch deploys): permissions are PER-JOB. The build job runs the
# consumer's emit `eval` and holds only read scopes (`contents` and Pages configuration);
# mike commits land on a LOCAL
# branch handed off as a git bundle artifact. Only the separate push job — which runs
# no consumer code — holds `contents: write`.
permissions: {}

concurrency:
  group: pages-latest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    name: Build versioned docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    outputs:
      highest: ${{ steps.guard.outputs.highest }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          # C12-W2: build from the IMMUTABLE gated commit, not the mutable tag.
          ref: ${{ inputs.gated-sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG_PATTERN: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta)[0-9]+)?$'
          TAG_FORMAT_DESCRIPTION: 'N.N.N, N.N.N-alphaN, or N.N.N-betaN'
          RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            tag="${RELEASE_TAG_INPUT}"
          else
            if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
              echo "::error::Release workflows must run from a tag ref (or pass release-tag). Got ${GITHUB_REF_TYPE}:${GITHUB_REF_NAME}."
              exit 1
            fi
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ${TAG_PATTERN} ]]; then
            echo "::error::Tag must match ${TAG_FORMAT_DESCRIPTION}. Got: ${tag}"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag still points at the gated commit (C12-W2)
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GATED_SHA: ${{ inputs.gated-sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}" 2>/dev/null || true)"
          if [ -z "${actual}" ] || [ "${actual}" != "${GATED_SHA}" ]; then
            echo "::error::Tag ${RELEASE_TAG} no longer points at the gated commit ${GATED_SHA} (now: ${actual:-missing}) — the tag moved between gate and deploy; refusing (C12-W2)."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs toolchain (exact pins, §11.3)
        shell: bash
        env:
          DOCS_REQUIREMENTS: ${{ inputs.docs-requirements }}
        run: |
          set -euo pipefail
          if [ ! -f "${DOCS_REQUIREMENTS}" ]; then
            echo "::error::docs requirements file ${DOCS_REQUIREMENTS} is missing; refusing an unpinned toolchain install (§11.3)."
            exit 1
          fi
          python3 -m pip install --quiet -r "${DOCS_REQUIREMENTS}"

      - name: Fetch existing docs branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DOCS_BRANCH: ${{ inputs.docs-branch }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          set +e
          git ls-remote --exit-code --heads "${remote}" "refs/heads/${DOCS_BRANCH}" >/dev/null
          status=$?
          set -e
          if [ "${status}" -eq 0 ]; then
            git fetch "${remote}" "+refs/heads/${DOCS_BRANCH}:refs/heads/${DOCS_BRANCH}"
          elif [ "${status}" -eq 2 ]; then
            echo "No existing ${DOCS_BRANCH} branch (first docs deploy)."
          else
            echo "::error::could not query origin for ${DOCS_BRANCH} (exit ${status}); refusing to build an orphan docs branch (fail closed)."
            exit 1
          fi

      # §12: emit language API docs BEFORE the mike deploy so the generated reference
      # is captured in this version's snapshot. Runs with a read-only token (C12-W4).
      - name: Emit language API docs
        if: ${{ inputs.docs-emit-command != '' }}
        shell: bash
        working-directory: ${{ inputs.docs-source-directory }}
        env:
          DOCS_EMIT_COMMAND: ${{ inputs.docs-emit-command }}
        run: eval "$DOCS_EMIT_COMMAND"

      # §8.14 monotonic guard (fail-closed): determine whether this release is the
      # highest. When it is NOT (or the tag listing fails), the version STILL deploys,
      # but the `latest` alias/set-default do not move — so an older release cannot
      # regress the published site / `latest` alias. Mirrors aviato.core.versioning.is_highest, and
      # `aviato validate` (_check_monotonic_alias_parity) fails if this inline copy
      # drifts from it.
      - name: Monotonic guard
        id: guard
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cat > /tmp/highest.py <<'PY'
          import sys, re
          rel = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta)(\d+))?$")
          rank = {None: 2, "beta": 1, "alpha": 0}
          def key(t):
              m = rel.match(t.strip())
              if not m:
                  return None
              a, b, c, pre, pren = m.groups()
              return (int(a), int(b), int(c), rank[pre], int(pren or 0))
          cand = sys.argv[1]
          ck = key(cand)
          keys = [k for k in (key(t) for t in sys.stdin) if k]
          print("true" if ck and max(keys + [ck]) == ck else "false")
          PY
          if ! gh api --paginate "repos/${GITHUB_REPOSITORY}/tags" --jq '.[].name' > /tmp/tags.txt; then
            echo "::warning::Could not list tags; skipping docs deploy (fail-closed, §8.14)."
            echo "highest=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "highest=$(python3 /tmp/highest.py "${RELEASE_TAG}" < /tmp/tags.txt)" >> "${GITHUB_OUTPUT}"

      - name: Refuse to target the default branch
        shell: bash
        env:
          DOCS_BRANCH: ${{ inputs.docs-branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ -n "${DEFAULT_BRANCH}" ] && [ "${DOCS_BRANCH}" = "${DEFAULT_BRANCH}" ]; then
            echo "::error::docs-branch (${DOCS_BRANCH}) must not be the repository default branch."
            exit 1
          fi

      - name: Deploy version onto the local docs branch (mike)
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DOCS_BRANCH: ${{ inputs.docs-branch }}
          HIGHEST: ${{ steps.guard.outputs.highest }}
          RETENTION: ${{ inputs.docs-retention }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # §8.14: EVERY policy-conformant release deploys its own version directory, but the
          # `latest` alias (and default) moves ONLY when this tag is the highest release.
          if [ "${HIGHEST}" = "true" ]; then
            mike deploy --branch "${DOCS_BRANCH}" --update-aliases "${RELEASE_TAG}" latest
            mike set-default --branch "${DOCS_BRANCH}" latest
          else
            echo "::warning::${RELEASE_TAG} is not the highest release; deploying its docs without moving latest (§8.14)."
            mike deploy --branch "${DOCS_BRANCH}" "${RELEASE_TAG}"
          fi
          if [ "${RETENTION}" -gt 0 ]; then
            python3 - "${RETENTION}" "${DOCS_BRANCH}" <<'PY'
          import re, subprocess, sys
          cap, branch = int(sys.argv[1]), sys.argv[2]
          rel = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-(alpha|beta)(\d+))?$")
          rank = {None: 2, "beta": 1, "alpha": 0}
          def key(t):
              m = rel.match(t)
              return (int(m[1]), int(m[2]), int(m[3]), rank[m[4]], int(m[5] or 0)) if m else None
          out = subprocess.run(["mike", "list", "--branch", branch], check=True, capture_output=True, text=True).stdout
          versions = [line.split()[0] for line in out.splitlines() if line.strip()]
          keyed = sorted((v for v in versions if key(v)), key=key, reverse=True)
          for v in keyed[cap:]:
              subprocess.run(["mike", "delete", "--branch", branch, v], check=True)
              print(f"pruned {v}")
          PY
          fi

      - name: Bundle the docs branch for the push job
        shell: bash
        env:
          DOCS_BRANCH: ${{ inputs.docs-branch }}
        run: git bundle create /tmp/docs.bundle "refs/heads/${DOCS_BRANCH}"

      - name: Hand off docs branch bundle
        uses: actions/upload-artifact@v7
        with:
          name: aviato-docs-branch
          path: /tmp/docs.bundle
          retention-days: 1
          if-no-files-found: error

      - name: Materialize exact docs branch tree
        if: ${{ inputs.serve-pages }}
        shell: bash
        env:
          DOCS_BRANCH: ${{ inputs.docs-branch }}
          PAGES_ROOT: /tmp/aviato-pages-site
        run: |
          set -euo pipefail
          rm -rf "${PAGES_ROOT}"
          mkdir -p "${PAGES_ROOT}"
          # `git archive` with no explicit pathspec, invoked from a subdirectory of the
          # checkout (this job's working-directory may be e.g. "website" per profile),
          # implicitly restricts the archive to that subdirectory WITHIN the target
          # tree-ish. docs-branch is an orphan branch with a flat layout (version dirs,
          # `latest`, `versions.json` at the top level) that has no such subdirectory,
          # so archiving from a subdirectory silently produces an EMPTY archive — no
          # error, no non-zero exit. Always archive from the repository root so the
          # full docs-branch tree is materialized regardless of the docs layout.
          git -C "${GITHUB_WORKSPACE}" archive "refs/heads/${DOCS_BRANCH}" | tar -x -C "${PAGES_ROOT}"
          python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["PAGES_ROOT"]).resolve()
          for path in root.rglob("*"):
              if not path.is_symlink():
                  continue
              try:
                  target = (path.parent / os.readlink(path)).resolve(strict=False)
                  target.relative_to(root)
              except (OSError, RuntimeError, ValueError):
                  raise SystemExit(f"refusing escaping symlink in Pages tree: {path.relative_to(root)}")
          PY

      - name: Configure GitHub Pages
        if: ${{ inputs.serve-pages }}
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.serve-pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: /tmp/aviato-pages-site
          # v4+ excludes dotfiles by default; keep v3 semantics so a built site's
          # dotfiles (e.g. .nojekyll) are never silently dropped from the artifact.
          include-hidden-files: true

  # C12-W4: the ONLY job with contents:write. Runs no consumer code — it verifies the
  # bundle and fast-forward-pushes the docs branch. Enabling Pages to SERVE this branch
  # is a separate operator toggle; this job neither reads nor mutates Pages settings.
  push:
    name: Push docs branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Fetch docs branch bundle
        uses: actions/download-artifact@v8
        with:
          name: aviato-docs-branch
          path: /tmp

      - name: Verify and fast-forward push
        shell: bash
        env:
          DOCS_BRANCH: ${{ inputs.docs-branch }}
        run: |
          set -euo pipefail
          git bundle verify /tmp/docs.bundle
          git fetch /tmp/docs.bundle "refs/heads/${DOCS_BRANCH}:refs/remotes/bundle/${DOCS_BRANCH}"
          if git fetch origin "+refs/heads/${DOCS_BRANCH}:refs/remotes/origin/${DOCS_BRANCH}" 2>/dev/null; then
            # Never rewrite published history: the bundle must extend what is on origin.
            if ! git merge-base --is-ancestor "refs/remotes/origin/${DOCS_BRANCH}" "refs/remotes/bundle/${DOCS_BRANCH}"; then
              echo "::error::bundle does not fast-forward origin/${DOCS_BRANCH}; refusing to push (concurrent deploy or rewritten history)."
              exit 1
            fi
          fi
          git push origin "refs/remotes/bundle/${DOCS_BRANCH}:refs/heads/${DOCS_BRANCH}"

  # The Pages/OIDC token is isolated from all consumer commands. It consumes only
  # the read-only build job's exact branch artifact after the archival push succeeds.
  deploy:
    name: Deploy GitHub Pages
    needs: [build, push]
    if: ${{ inputs.serve-pages && success() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
