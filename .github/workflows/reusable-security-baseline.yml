name: Reusable Security Baseline

on:
  workflow_call:
    inputs:
      ref:
        description: >-
          Commit/tag to scan. Empty uses the triggering ref. Set this when the caller
          runs out-of-band (e.g. the docs workflow_run path) so the release-ref
          security baseline (§5.14) scans the released commit, not a later default-branch tip.
        required: false
        type: string
        default: ""
      codeql-languages:
        description: Comma-separated CodeQL languages, for example python or javascript-typescript.
        required: false
        type: string
        default: ""
      run-codeql:
        required: false
        type: boolean
        default: true
      run-dependency-review:
        required: false
        type: boolean
        default: true
      dependency-review-fail-on-severity:
        required: false
        type: string
        default: high
      codeql-runner:
        description: Runner used for CodeQL.
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  # §8.16/§5.14: probe the findings-upload privilege at runtime and HARD-FAIL if a
  # caller did not grant it — a missing scope must fail loud, never pass silently.
  privilege-probe:
    name: Probe findings-upload privilege
    runs-on: ubuntu-latest
    steps:
      # §5.14/§5.5: scheduled scans are jittered so a fleet of consumers on the same weekly
      # cron does not stampede the platform. Gated to schedule only — PR and release-ref runs
      # must stay immediate (no added latency on the deploy gate or PR feedback). This is the
      # single chokepoint: every scan job `needs: privilege-probe`, so delaying it here defers
      # the whole baseline by one random window.
      - name: Jitter (scheduled runs only)
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: sleep $((RANDOM % 120))

      - name: Verify security-events scope
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          if gh api "repos/${REPO}/code-scanning/analyses?per_page=1" >/dev/null 2>err.txt; then
            echo "security-events scope present."
          elif grep -qiE '403|resource not accessible|forbidden|must have' err.txt; then
            echo "::error::Missing security-events privilege required for SARIF upload (§8.16)."
            cat err.txt
            exit 1
          elif grep -qiE 'HTTP 404' err.txt && grep -qiE 'no analysis|code scanning|not enabled|not set up' err.txt; then
            # Genuine first-run absence (code scanning has produced no analyses yet) is
            # the ONE tolerated failure shape — the scope itself is fine.
            echo "No analyses yet / code scanning not initialized; scope check passes."
          else
            # finding 8: an UNRECOGNIZED failure (5xx, rate limit, novel wording) must not
            # read as "scope appears present" — fail closed here rather than letting the
            # real failure surface later at SARIF upload (§5.14).
            echo "::error::Could not determine security-events scope (unexpected API failure); failing closed (§5.14)."
            cat err.txt
            exit 1
          fi

  codeql:
    name: CodeQL
    needs: privilege-probe
    if: ${{ inputs.run-codeql && inputs.codeql-languages != '' }}
    runs-on: ${{ inputs.codeql-runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql-languages }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      # §2.13 SAST gate (note): `analyze` uploads SARIF and SUCCEEDS even with high/critical
      # alerts — CodeQL has no in-workflow fail-on-severity input. The high/critical SAST gate
      # is therefore realized by the platform's **code-scanning check** (configured to fail PR
      # checks at the high/critical threshold), a §17 operator prerequisite ("enable code
      # scanning", probeable by §5.4). The heartbeat gate below only proves CodeQL RAN (not that
      # it found nothing); severity gating for SAST is the platform check, unlike the dependency/
      # secret scans which gate in-workflow via Trivy exit-code.
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  # PR-only diff-based review (richer signal on pull requests).
  dependency-review:
    name: Dependency Review
    needs: privilege-probe
    if: ${{ inputs.run-dependency-review && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: ${{ inputs.dependency-review-fail-on-severity }}

  # Dependency vulnerability scan on PRs, schedule, AND the release ref (§2.13/§5.14):
  # gates high/critical and uploads SARIF to the Security surface.
  dependency-scan:
    name: Dependency vulnerability scan
    needs: privilege-probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      # §2.13 report/gate split: REPORT all severities to the Security surface (no gate), then
      # GATE separately on high/critical. A single `severity: HIGH,CRITICAL` step would filter
      # the SARIF too, so medium/low would be neither blocked NOR reported — the §2.13 policy
      # requires medium/low to be reported (without blocking).
      - name: Report dependency findings (all severities, no gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-deps.sarif

      - name: Upload dependency findings
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-deps.sarif
          category: aviato-dependency-scan

      - name: Gate on high/critical dependencies (§2.13)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          format: table

  # Secret scan (defense-in-depth alongside platform secret scanning + push
  # protection, §2.13): any detected secret fails the pipeline; findings upload as SARIF.
  secret-scan:
    name: Secret scan
    needs: privilege-probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - name: Scan for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          exit-code: "1"
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif

      - name: Upload secret findings
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: aviato-secret-scan

  # Per-run heartbeat (§5.14): emit a durable artifact (even on zero findings) so
  # diagnosis (§5.4) can distinguish "ran clean" from "never ran" by reading the
  # artifact — not a stale CodeQL analysis. The required scans (SAST + dependency +
  # secret) MUST have actually run; a skipped scan is treated as broken.
  heartbeat:
    name: Security baseline heartbeat
    needs: [codeql, dependency-review, dependency-scan, secret-scan]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      CODEQL_RESULT: ${{ needs.codeql.result }}
      DEPSCAN_RESULT: ${{ needs.dependency-scan.result }}
      SECRET_RESULT: ${{ needs.secret-scan.result }}
      DEPREVIEW_RESULT: ${{ needs.dependency-review.result }}
      RUN_CODEQL: ${{ inputs.run-codeql }}
      CODEQL_LANGUAGES: ${{ inputs.codeql-languages }}
    steps:
      - name: Emit heartbeat
        shell: bash
        run: |
          mkdir -p heartbeat
          printf '{"tool":"aviato-security-baseline","sast":"%s","dependency":"%s","secret":"%s","review":"%s","completed":true}\n' \
            "${CODEQL_RESULT}" "${DEPSCAN_RESULT}" "${SECRET_RESULT}" "${DEPREVIEW_RESULT}" \
            > heartbeat/aviato-security-heartbeat.json
          cat heartbeat/aviato-security-heartbeat.json

      # GATE BEFORE UPLOAD (§5.14/§8.16): the heartbeat artifact must mean "the baseline RAN
      # CLEAN", so it is uploaded ONLY when the gate passes. A broken/skipped scan fails the gate
      # here, the upload step (default `if: success()`) is skipped, and §5.4 then correctly reads
      # the ABSENT heartbeat as "broken" — not "clean". Were upload to run unconditionally, a red
      # run would still leave a present heartbeat and read clean (the §8.16 fail-open).
      - name: Gate on required scans
        shell: bash
        run: |
          # The gating scans must have SUCCEEDED (skipped/failed/cancelled = broken, §5.14).
          for name in DEPSCAN SECRET; do
            eval "result=\${${name}_RESULT}"
            if [ "${result}" != "success" ]; then
              echo "::error::${name} scan did not run successfully (result=${result}); broken (§5.14)."
              exit 1
            fi
          done
          # SAST must not silently no-op: if CodeQL is enabled (run-codeql=true) it MUST
          # have succeeded. A skipped CodeQL (e.g. run-codeql=true but codeql-languages
          # left empty) is broken, not clean — absence reads as broken (§5.14/§8.16).
          if [ "${RUN_CODEQL}" = "true" ]; then
            if [ -z "${CODEQL_LANGUAGES}" ]; then
              echo "::error::run-codeql is true but codeql-languages is empty; SAST cannot run. Set codeql-languages (§5.14/§8.16)."
              exit 1
            fi
            if [ "${CODEQL_RESULT}" != "success" ]; then
              echo "::error::CodeQL SAST was enabled but did not succeed (result=${CODEQL_RESULT}); broken (§5.14/§8.16)."
              exit 1
            fi
          else
            # §2.13/§5.14: SAST is an ALWAYS-ON baseline — no profile may turn it off. A caller
            # passing run-codeql=false would skip SAST and (previously) pass the gate silently.
            # That is the §8.16 fail-open the baseline forbids: reject it.
            echo "::error::SAST is disabled (run-codeql=${RUN_CODEQL}); the §2.13 security baseline is always-on and cannot be turned off (§5.14/§8.16)."
            exit 1
          fi

      # Only reached when the gate above passed (default step success-gating) → the heartbeat
      # signals a CLEAN run. A broken run skips this, leaving no fresh artifact (absent = broken).
      - name: Upload heartbeat
        uses: actions/upload-artifact@v7
        with:
          name: aviato-security-heartbeat
          path: heartbeat/aviato-security-heartbeat.json
          retention-days: 30
