name: Reusable Security Baseline

on:
  workflow_call:
    inputs:
      ref:
        description: >-
          Commit/tag to scan. Empty uses the triggering ref. Set this when the caller
          runs out-of-band (e.g. the docs workflow_run path) so the release-ref
          security baseline (§5.14) scans the released commit, not a later default-branch tip.
        required: false
        type: string
        default: ""
      sha:
        description: >-
          Exact commit expected for ref. Empty is permitted for ordinary event-driven runs;
          out-of-band release/docs callers must supply the gated commit SHA.
        required: false
        type: string
        default: ""
      codeql-languages:
        description: Comma-separated CodeQL languages, for example python or javascript-typescript.
        required: false
        type: string
        default: ""
      run-codeql:
        required: false
        type: boolean
        default: true
      run-dependency-review:
        required: false
        type: boolean
        default: true
      dependency-review-fail-on-severity:
        required: false
        type: string
        default: high
      codeql-runner:
        description: Runner used for CodeQL.
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  # Resolve the requested target exactly once before any scanner initializes. The checkout action
  # performs the authenticated ref resolution (including annotated-tag peeling); every scan then
  # checks out the emitted commit and every SARIF producer uploads against the emitted ref/SHA.
  resolve-target:
    name: Resolve analyzed target
    runs-on: ubuntu-latest
    outputs:
      canonical-ref: ${{ steps.canonicalize.outputs.canonical-ref }}
      analyzed-sha: ${{ steps.resolve.outputs.analyzed-sha }}
    steps:
      # Canonicalize BEFORE checkout. Passing a bare release tag directly to checkout lets a
      # same-named branch win Git's ambiguous DWIM resolution while later evidence claims a tag.
      - name: Canonicalize requested ref
        id: canonicalize
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.ref }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          canonical_ref="${REQUESTED_REF:-${EVENT_REF}}"
          if [[ -n "${REQUESTED_REF}" && "${REQUESTED_REF}" != refs/* ]]; then
            canonical_ref="refs/tags/${REQUESTED_REF}"
          fi
          echo "canonical-ref=${canonical_ref}" >> "${GITHUB_OUTPUT}"

      - name: Fetch requested ref and tags
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ steps.canonicalize.outputs.canonical-ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve canonical ref and commit
        id: resolve
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.sha }}
          EVENT_SHA: ${{ github.sha }}
          CUSTOM_REF: ${{ inputs.ref }}
          CANONICAL_REF: ${{ steps.canonicalize.outputs.canonical-ref }}
        run: |
          set -euo pipefail
          # actions/checkout resolved CANONICAL_REF and fetched tags. Peeling
          # HEAD^{commit} makes annotated and lightweight tags converge on the commit scanners use.
          analyzed_sha="$(git rev-parse 'HEAD^{commit}')"
          expected_sha="${REQUESTED_SHA}"
          if [[ -z "${CUSTOM_REF}" && -z "${expected_sha}" ]]; then
            expected_sha="${EVENT_SHA}"
          fi
          if [[ -n "${expected_sha}" && "${analyzed_sha}" != "${expected_sha}" ]]; then
            echo "::error::Requested ref ${CANONICAL_REF} resolved to ${analyzed_sha}, expected ${expected_sha}."
            exit 1
          fi
          echo "analyzed-sha=${analyzed_sha}" >> "${GITHUB_OUTPUT}"

  # §8.16/§5.14: probe the findings-upload privilege at runtime and HARD-FAIL if a
  # caller did not grant it — a missing scope must fail loud, never pass silently.
  privilege-probe:
    name: Probe findings-upload privilege
    needs: resolve-target
    runs-on: ubuntu-latest
    steps:
      # §5.14/§5.5: scheduled scans are jittered so a fleet of consumers on the same weekly
      # cron does not stampede the platform. Gated to schedule only — PR and release-ref runs
      # must stay immediate (no added latency on the deploy gate or PR feedback). This is the
      # single chokepoint: every scan job `needs: privilege-probe`, so delaying it here defers
      # the whole baseline by one random window.
      - name: Jitter (scheduled runs only)
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: sleep $((RANDOM % 120))

      - name: Verify security-events scope
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          if gh api "repos/${REPO}/code-scanning/analyses?per_page=1" >/dev/null 2>err.txt; then
            echo "security-events scope present."
          elif grep -qiE '403|resource not accessible|forbidden|must have' err.txt; then
            echo "::error::Missing security-events privilege required for SARIF upload (§8.16)."
            cat err.txt
            exit 1
          elif grep -qiE 'HTTP 404' err.txt && grep -qiE 'no analysis|code scanning|not enabled|not set up' err.txt; then
            # Genuine first-run absence (code scanning has produced no analyses yet) is
            # the ONE tolerated failure shape — the scope itself is fine.
            echo "No analyses yet / code scanning not initialized; scope check passes."
          else
            # finding 8: an UNRECOGNIZED failure (5xx, rate limit, novel wording) must not
            # read as "scope appears present" — fail closed here rather than letting the
            # real failure surface later at SARIF upload (§5.14).
            echo "::error::Could not determine security-events scope (unexpected API failure); failing closed (§5.14)."
            cat err.txt
            exit 1
          fi

  codeql:
    name: CodeQL
    needs: [privilege-probe, resolve-target]
    if: ${{ inputs.run-codeql && inputs.codeql-languages != '' }}
    runs-on: ${{ inputs.codeql-runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-target.outputs.analyzed-sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql-languages }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          ref: ${{ needs.resolve-target.outputs.canonical-ref }}
          sha: ${{ needs.resolve-target.outputs.analyzed-sha }}
          wait-for-processing: true

      # Defense in depth with the branch ruleset's CodeQL threshold: analyze has finished
      # processing before this exact-ref/tool query runs. The API response is paginated and
      # validated before an empty result is accepted; auth, rate-limit, schema, or JSON ambiguity
      # fails closed. Do not print alert bodies or source-bearing instances.
      - name: Gate CodeQL high/critical alerts
        env:
          GH_TOKEN: ${{ github.token }}
          ANALYZED_REF: ${{ needs.resolve-target.outputs.canonical-ref }}
        shell: bash
        run: |
          set -euo pipefail
          endpoint="$(python - <<'PY'
          import os
          from urllib.parse import quote

          repo = os.environ["GITHUB_REPOSITORY"]
          ref = quote(os.environ["ANALYZED_REF"], safe="")
          print(f"repos/{repo}/code-scanning/alerts?state=open&ref={ref}&tool_name=CodeQL&per_page=100")
          PY
          )"
          response="$(mktemp)"
          trap 'rm -f "${response}"' EXIT
          if ! gh api --paginate --slurp "${endpoint}" > "${response}"; then
            echo "::error::CodeQL alert query failed; refusing to treat an ambiguous result as clean."
            exit 1
          fi
          python - "${response}" <<'PY'
          import json
          import sys

          try:
              pages = json.load(open(sys.argv[1], encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as exc:
              print(f"::error::CodeQL alert response was unreadable: {exc}")
              raise SystemExit(1) from exc
          if not pages or not isinstance(pages, list) or not all(isinstance(page, list) for page in pages):
              print("::error::CodeQL alert response did not contain an unambiguous paginated result.")
              raise SystemExit(1)

          blocking = []
          for page in pages:
              for alert in page:
                  if not isinstance(alert, dict) or not isinstance(alert.get("rule"), dict):
                      print("::error::CodeQL alert response contained an invalid alert shape.")
                      raise SystemExit(1)
                  rule = alert["rule"]
                  if "security_severity_level" not in rule:
                      print("::error::CodeQL alert response omitted security_severity_level.")
                      raise SystemExit(1)
                  severity = rule.get("security_severity_level")
                  if severity not in (None, "low", "medium", "high", "critical"):
                      print("::error::CodeQL alert response contained an unknown security severity.")
                      raise SystemExit(1)
                  number = alert.get("number")
                  rule_id = rule.get("id")
                  url = alert.get("html_url")
                  if (
                      not isinstance(number, int)
                      or isinstance(number, bool)
                      or not isinstance(rule_id, str)
                      or not rule_id
                      or "\n" in rule_id
                      or "\r" in rule_id
                      or not isinstance(url, str)
                      or not url.startswith(("https://", "http://"))
                      or "\n" in url
                      or "\r" in url
                  ):
                      print("::error::CodeQL alert response contained unsafe or missing display fields.")
                      raise SystemExit(1)
                  if severity in ("high", "critical"):
                      blocking.append((number, rule_id, severity, url))

          for number, rule_id, severity, url in blocking:
              print(f"::error::CodeQL alert #{number}: rule={rule_id} severity={severity} url={url}")
          if blocking:
              print(f"::error::{len(blocking)} open high/critical CodeQL alert(s) block this ref.")
              raise SystemExit(1)
          print("No open high/critical CodeQL alerts for the analyzed ref and CodeQL tool.")
          PY

  # PR-only diff-based review (richer signal on pull requests).
  dependency-review:
    name: Dependency Review
    needs: [privilege-probe, resolve-target]
    if: ${{ inputs.run-dependency-review && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-target.outputs.analyzed-sha }}

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: ${{ inputs.dependency-review-fail-on-severity }}

  # Dependency vulnerability scan on PRs, schedule, AND the release ref (§2.13/§5.14):
  # gates high/critical and uploads SARIF to the Security surface.
  dependency-scan:
    name: Dependency vulnerability scan
    needs: [privilege-probe, resolve-target]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-target.outputs.analyzed-sha }}

      # §2.13 report/gate split: REPORT all severities to the Security surface (no gate), then
      # GATE separately on high/critical. A single `severity: HIGH,CRITICAL` step would filter
      # the SARIF too, so medium/low would be neither blocked NOR reported — the §2.13 policy
      # requires medium/low to be reported (without blocking).
      - name: Report dependency findings (all severities, no gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-deps.sarif

      - name: Upload dependency findings
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-deps.sarif
          category: aviato-dependency-scan
          ref: ${{ needs.resolve-target.outputs.canonical-ref }}
          sha: ${{ needs.resolve-target.outputs.analyzed-sha }}

      - name: Gate on high/critical dependencies (§2.13)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          format: table

  # Secret scan (defense-in-depth alongside platform secret scanning + push
  # protection, §2.13): any detected secret fails the pipeline; findings upload as SARIF.
  secret-scan:
    name: Secret scan
    needs: [privilege-probe, resolve-target]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-target.outputs.analyzed-sha }}

      - name: Scan for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          exit-code: "1"
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif

      - name: Upload secret findings
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: aviato-secret-scan
          ref: ${{ needs.resolve-target.outputs.canonical-ref }}
          sha: ${{ needs.resolve-target.outputs.analyzed-sha }}

  # Per-run heartbeat (§5.14): emit a durable artifact (even on zero findings) so
  # diagnosis (§5.4) can distinguish "ran clean" from "never ran" by reading the
  # artifact — not a stale CodeQL analysis. The required scans (SAST + dependency +
  # secret) MUST have actually run; a skipped scan is treated as broken.
  heartbeat:
    name: Security baseline heartbeat
    needs: [resolve-target, codeql, dependency-review, dependency-scan, secret-scan]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      CODEQL_RESULT: ${{ needs.codeql.result }}
      DEPSCAN_RESULT: ${{ needs.dependency-scan.result }}
      SECRET_RESULT: ${{ needs.secret-scan.result }}
      DEPREVIEW_RESULT: ${{ needs.dependency-review.result }}
      RUN_CODEQL: ${{ inputs.run-codeql }}
      CODEQL_LANGUAGES: ${{ inputs.codeql-languages }}
      ANALYZED_REF: ${{ needs.resolve-target.outputs.canonical-ref }}
      ANALYZED_SHA: ${{ needs.resolve-target.outputs.analyzed-sha }}
    steps:
      - name: Emit heartbeat
        shell: bash
        run: |
          mkdir -p heartbeat
          printf '{"tool":"aviato-security-baseline","analyzed_ref":"%s","analyzed_sha":"%s","sast":"%s","dependency":"%s","secret":"%s","review":"%s","completed":true}\n' \
            "${ANALYZED_REF}" "${ANALYZED_SHA}" "${CODEQL_RESULT}" "${DEPSCAN_RESULT}" "${SECRET_RESULT}" "${DEPREVIEW_RESULT}" \
            > heartbeat/aviato-security-heartbeat.json
          cat heartbeat/aviato-security-heartbeat.json

      # GATE BEFORE UPLOAD (§5.14/§8.16): the heartbeat artifact must mean "the baseline RAN
      # CLEAN", so it is uploaded ONLY when the gate passes. A broken/skipped scan fails the gate
      # here, the upload step (default `if: success()`) is skipped, and §5.4 then correctly reads
      # the ABSENT heartbeat as "broken" — not "clean". Were upload to run unconditionally, a red
      # run would still leave a present heartbeat and read clean (the §8.16 fail-open).
      - name: Gate on required scans
        shell: bash
        run: |
          # The gating scans must have SUCCEEDED (skipped/failed/cancelled = broken, §5.14).
          for name in DEPSCAN SECRET; do
            eval "result=\${${name}_RESULT}"
            if [ "${result}" != "success" ]; then
              echo "::error::${name} scan did not run successfully (result=${result}); broken (§5.14)."
              exit 1
            fi
          done
          # SAST must not silently no-op: if CodeQL is enabled (run-codeql=true) it MUST
          # have succeeded. A skipped CodeQL (e.g. run-codeql=true but codeql-languages
          # left empty) is broken, not clean — absence reads as broken (§5.14/§8.16).
          if [ "${RUN_CODEQL}" = "true" ]; then
            if [ -z "${CODEQL_LANGUAGES}" ]; then
              echo "::error::run-codeql is true but codeql-languages is empty; SAST cannot run. Set codeql-languages (§5.14/§8.16)."
              exit 1
            fi
            if [ "${CODEQL_RESULT}" != "success" ]; then
              echo "::error::CodeQL SAST was enabled but did not succeed (result=${CODEQL_RESULT}); broken (§5.14/§8.16)."
              exit 1
            fi
          else
            # §2.13/§5.14: SAST is an ALWAYS-ON baseline — no profile may turn it off. A caller
            # passing run-codeql=false would skip SAST and (previously) pass the gate silently.
            # That is the §8.16 fail-open the baseline forbids: reject it.
            echo "::error::SAST is disabled (run-codeql=${RUN_CODEQL}); the §2.13 security baseline is always-on and cannot be turned off (§5.14/§8.16)."
            exit 1
          fi

      # Only reached when the gate above passed (default step success-gating) → the heartbeat
      # signals a CLEAN run. A broken run skips this, leaving no fresh artifact (absent = broken).
      - name: Upload heartbeat
        uses: actions/upload-artifact@v7
        with:
          name: aviato-security-heartbeat-${{ needs.resolve-target.outputs.analyzed-sha }}
          path: heartbeat/aviato-security-heartbeat.json
          retention-days: 30
