# aviato:managed profile=aviato-library version=0 hash=dbc947baabf63708da5bfaaab02e39c8ca9370a08df32bebab789698dae3cff1 inputs=76bd944abbcf93c5fc7686f5fdcf3b001c230442c29d97d4a07c86f5d0cc7232
name: Aviato Python Library
'on':
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: 23 5 * * 1
  workflow_dispatch:
    inputs:
      checkpoint-digest:
        default: ''
        description: Canonical checkpoint digest
        required: false
        type: string
      intended-actor:
        default: ''
        description: Exact signed release actor
        required: false
        type: string
      intended-tag:
        default: ''
        description: Exact SemVer tag
        required: false
        type: string
      merged-sha:
        default: ''
        description: Exact merged default-branch SHA
        required: false
        type: string
      promotion:
        default: false
        description: Closed release promotion mode
        required: true
        type: boolean
permissions:
  contents: read
jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: ./.github/workflows/reusable-python-ci.yml
    permissions:
      contents: read
    with:
      python-version: '3.12'
      install-command: python -m pip install -e .[dev]
      lint-command: python -m ruff check .
      test-command: python -m pytest --cov --cov-report=term-missing
      build-command: python -m build
      typecheck-command: python -m mypy --strict aviato tests
      run-typecheck: true
      run-build: true
  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: ./.github/workflows/reusable-common-lint.yml
    permissions:
      contents: read
    with:
      aviato-ref: '0'
      local-install: true
  pypi:
    needs:
      - release
      - release-gate
      - security
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result
      == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: ./.github/workflows/reusable-pypi-publish.yml
    permissions:
      contents: read
    with:
      python-version: '3.12'
      working-directory: .
      packages-dir: dist
      release-tag: ${{ needs.release.outputs.tag }}
      gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
      consumer-publisher-present: true
  pypi-publish:
    name: Publish Python package
    needs:
      - release-gate
      - pypi
    if: ${{ always() && needs.release-gate.result == 'success' && needs.pypi.result
      == 'success' && needs.release-gate.outputs.gated-sha != '' && needs.release-gate.outputs.checkpoint-digest
      != '' && needs.release-gate.outputs.verified-envelope-digest != '' }}
    runs-on: ubuntu-latest
    environment: pypi
    concurrency:
      group: aviato-pypi-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Recheck managed checkpoint before OIDC
        shell: bash
        env:
          CHECKPOINT_DIGEST: ${{ needs.release-gate.outputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ needs.release-gate.outputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          GH_TOKEN: ${{ github.token }}
        run: 'set -euo pipefail

          [[ "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~
          ^[1-9][0-9]*$ ]] || { echo "::error::managed checkpoint is absent"; exit
          1; }

          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]

          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"

          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name
          verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"

          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"

          [ "$(shasum -a 256 "${envelope}" | awk ''{print $1}'')" = "${VERIFIED_ENVELOPE_DIGEST}"
          ]

          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null

          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"

          key_id="$(jq -r .key_id "${envelope}")"

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission"
          --jq .permission)" = "admin" ]

          gh api -H ''Cache-Control: no-cache'' "users/${reviewer}/ssh_signing_keys"
          --jq "any(.[]; (.id|tostring) == \"${key_id}\")" | grep -qx true

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/environments/pypi"
          --jq .can_admins_bypass)" = "false" ]

          '
      - name: Download vetted build artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.pypi.outputs.artifact-name }}
          path: .
      - name: Verify fresh remote tag after artifact download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
          GATED_SHA: ${{ needs.release-gate.outputs.gated-sha }}
        run: "set -euo pipefail\nread -r object_type actual < <(gh api -H \"Cache-Control:\
          \ no-cache\" \"repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}\"\
          \ --jq '.object.type + \" \" + .object.sha')\nfor _ in 1 2 3 4 5; do\n \
          \ [ \"${object_type}\" = \"tag\" ] || break\n  read -r object_type actual\
          \ < <(gh api -H \"Cache-Control: no-cache\" \"repos/${GITHUB_REPOSITORY}/git/tags/${actual}\"\
          \ --jq '.object.type + \" \" + .object.sha')\ndone\nif [ \"${object_type}\"\
          \ != \"commit\" ] || [ \"${actual}\" != \"${GATED_SHA}\" ]; then\n  echo\
          \ \"::error::Fresh remote tag ${RELEASE_TAG} does not peel to gated commit\
          \ ${GATED_SHA} (type=${object_type}, sha=${actual}).\"\n  exit 1\nfi\n"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*
      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: dist/*
          sbom-path: sbom.cyclonedx.json
      - name: Resolve simple index endpoint
        id: index
        shell: bash
        env:
          REPOSITORY_URL: ${{ vars.PYPI_REPOSITORY_URL }}
          SIMPLE_INDEX_URL: ${{ vars.PYPI_SIMPLE_INDEX_URL }}
        run: "set -euo pipefail\nresolved=\"$(python - \"${REPOSITORY_URL}\" \"${SIMPLE_INDEX_URL}\"\
          \ <<'PY'\nimport sys\nimport urllib.parse\nupload, explicit_simple = sys.argv[1:3]\n\
          def validated(url: str, suffix: str) -> urllib.parse.SplitResult:\n    try:\n\
          \        parsed = urllib.parse.urlsplit(url)\n        _ = parsed.port\n\
          \    except ValueError as exc:\n        raise SystemExit(f\"invalid PyPI\
          \ endpoint: {exc}\") from exc\n    if parsed.scheme != \"https\" or not\
          \ parsed.hostname:\n        raise SystemExit(\"PyPI endpoints must use HTTPS\
          \ and include a hostname\")\n    if parsed.username is not None or parsed.password\
          \ is not None:\n        raise SystemExit(\"credentials are forbidden in\
          \ PyPI endpoint URLs\")\n    if parsed.query or parsed.fragment or not parsed.path.endswith(suffix):\n\
          \        raise SystemExit(f\"PyPI endpoint must end in {suffix!r} with no\
          \ query or fragment\")\n    return parsed\nif upload:\n    upload_parts\
          \ = validated(upload, \"/legacy/\")\n    derived_path = upload_parts.path[:\
          \ -len(\"legacy/\")] + \"simple/\"\n    derived = urllib.parse.urlunsplit((\"\
          https\", upload_parts.netloc, derived_path, \"\", \"\"))\nelse:\n    derived\
          \ = \"https://pypi.org/simple/\"\nif explicit_simple:\n    validated(explicit_simple,\
          \ \"/simple/\")\n    resolved = explicit_simple\nelse:\n    resolved = derived\n\
          print(resolved)\nPY\n)\"\necho \"simple-index-url=${resolved}\" >> \"${GITHUB_OUTPUT}\"\
          \n"
      - name: Final fresh remote tag verification
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
          GATED_SHA: ${{ needs.release-gate.outputs.gated-sha }}
        run: "set -euo pipefail\nread -r object_type actual < <(gh api -H \"Cache-Control:\
          \ no-cache\" \"repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}\"\
          \ --jq '.object.type + \" \" + .object.sha')\nfor _ in 1 2 3 4 5; do\n \
          \ [ \"${object_type}\" = \"tag\" ] || break\n  read -r object_type actual\
          \ < <(gh api -H \"Cache-Control: no-cache\" \"repos/${GITHUB_REPOSITORY}/git/tags/${actual}\"\
          \ --jq '.object.type + \" \" + .object.sha')\ndone\nif [ \"${object_type}\"\
          \ != \"commit\" ] || [ \"${actual}\" != \"${GATED_SHA}\" ]; then\n  echo\
          \ \"::error::Fresh remote tag ${RELEASE_TAG} does not peel to gated commit\
          \ ${GATED_SHA} (type=${object_type}, sha=${actual}).\"\n  exit 1\nfi\n"
      - name: Final checkpoint recheck immediately before PyPI mutation
        shell: bash
        env:
          CHECKPOINT_RUN_ID: ${{ needs.release-gate.outputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          GH_TOKEN: ${{ github.token }}
        run: 'set -euo pipefail

          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"

          [ "$(shasum -a 256 "${envelope}" | awk ''{print $1}'')" = "${VERIFIED_ENVELOPE_DIGEST}"
          ]

          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null

          jq -e ''.checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1"
          and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now''
          "${envelope}" >/dev/null

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}"
          --jq ''.status + ":" + .conclusion'')" = "completed:success" ]

          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"

          key_id="$(jq -r .key_id "${envelope}")"

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission"
          --jq .permission)" = "admin" ]

          gh api -H ''Cache-Control: no-cache'' "users/${reviewer}/ssh_signing_keys"
          --jq "any(.[]; (.id|tostring) == \"${key_id}\")" | grep -qx true

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/environments/pypi"
          --jq .can_admins_bypass)" = "false" ]

          public_key="$(gh api -H ''Cache-Control: no-cache'' "users/${reviewer}/ssh_signing_keys"
          --jq ".[] | select((.id|tostring) == \"${key_id}\") | .key")"

          authority_dir="$(mktemp -d)"

          printf ''%s %s\n'' "${reviewer}" "${public_key}" > "${authority_dir}/allowed"

          jq -cS .checkpoint "${envelope}" > "${authority_dir}/message"

          jq -r .signature "${envelope}" | python3 -c ''import base64,sys; value=sys.stdin.read().strip();
          sys.stdout.buffer.write(base64.urlsafe_b64decode(value + "=" * (-len(value)
          % 4)))'' > "${authority_dir}/signature"

          ssh-keygen -Y verify -f "${authority_dir}/allowed" -I "${reviewer}" -n aviato
          -s "${authority_dir}/signature" < "${authority_dir}/message"

          '
      - name: Publish distributions
        if: ${{ vars.PYPI_REPOSITORY_URL == '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
      - name: Publish distributions to alternate repository
        if: ${{ vars.PYPI_REPOSITORY_URL != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
          repository-url: ${{ vars.PYPI_REPOSITORY_URL }}
      - name: Confirm published artifacts
        shell: bash
        env:
          SIMPLE_INDEX_URL: ${{ steps.index.outputs.simple-index-url }}
          DISTRIBUTION_NAME: ${{ needs.pypi.outputs.distribution-name }}
          EXPECTED_VERSION: ${{ needs.pypi.outputs.package-version }}
          RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
          DIST_DIR: dist
        run: "set -euo pipefail\npython - <<'PY'\nimport hashlib\nimport json\nimport\
          \ os\nimport pathlib\nimport re\nimport time\nimport urllib.error\nimport\
          \ urllib.parse\nimport urllib.request\nrelease_tag = os.environ[\"RELEASE_TAG\"\
          ]\nexpected_from_tag = re.sub(r\"-(alpha|beta)([0-9]+)$\", lambda m: {\"\
          alpha\": \"a\", \"beta\": \"b\"}[m.group(1)] + m.group(2), release_tag)\n\
          if os.environ[\"EXPECTED_VERSION\"] != expected_from_tag:\n    raise SystemExit(f\"\
          builder version {os.environ['EXPECTED_VERSION']!r} does not match release\
          \ tag {release_tag!r}\")\ndist = pathlib.Path(os.environ[\"DIST_DIR\"])\n\
          local = {path.name: hashlib.sha256(path.read_bytes()).hexdigest() for path\
          \ in sorted(dist.iterdir()) if path.is_file()}\nif not local:\n    raise\
          \ SystemExit(\"no local distribution artifacts to confirm\")\nnormalized_name\
          \ = re.sub(r\"[-_.]+\", \"-\", os.environ[\"DISTRIBUTION_NAME\"]).lower()\n\
          url = urllib.parse.urljoin(os.environ[\"SIMPLE_INDEX_URL\"], urllib.parse.quote(normalized_name)\
          \ + \"/\")\nrequest = urllib.request.Request(url, headers={\"Accept\": \"\
          application/vnd.pypi.simple.v1+json\"})\nlast_error = \"index returned no\
          \ matching files\"\nfor attempt in range(1, 11):\n    try:\n        with\
          \ urllib.request.urlopen(request, timeout=30) as response:\n           \
          \ payload = json.load(response)\n        remote = {}\n        for entry\
          \ in payload.get(\"files\", []):\n            filename = entry.get(\"filename\"\
          )\n            sha256 = (entry.get(\"hashes\") or {}).get(\"sha256\")\n\
          \            if isinstance(filename, str) and isinstance(sha256, str):\n\
          \                remote[filename] = sha256.lower()\n        mismatches =\
          \ [name for name, digest in local.items() if remote.get(name) != digest]\n\
          \        if not mismatches:\n            print(f\"Confirmed {len(local)}\
          \ published artifact(s) for {os.environ['DISTRIBUTION_NAME']}=={os.environ['EXPECTED_VERSION']}\
          \ via PEP 691 metadata.\")\n            raise SystemExit(0)\n        last_error\
          \ = f\"missing or hash-mismatched files: {mismatches}\"\n    except (OSError,\
          \ ValueError, json.JSONDecodeError, urllib.error.URLError) as exc:\n   \
          \     last_error = str(exc)\n    print(f\"PEP 691 confirmation attempt {attempt}/10\
          \ failed: {last_error}\")\n    if attempt < 10:\n        time.sleep(30)\n\
          raise SystemExit(f\"published artifacts did not become verifiable: {last_error}\"\
          )\nPY\n"
  release:
    if: ${{ github.ref_type != 'tag' && (github.event_name == 'push' || (github.event_name
      == 'workflow_dispatch' && inputs.promotion)) }}
    needs:
      - ci
      - security
      - common-lint
    uses: ./.github/workflows/reusable-release.yml
    permissions:
      contents: write
      pull-requests: write
      actions: write
      issues: read
    with:
      aviato-ref: '0'
      local-install: true
      promotion: ${{ inputs.promotion || false }}
      merged-sha: ${{ inputs.merged-sha || '' }}
      intended-tag: ${{ inputs.intended-tag || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
  release-gate:
    needs:
      - release
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: ./.github/workflows/reusable-release-gate.yml
    permissions:
      actions: read
      contents: read
      pull-requests: read
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}
      required-workflow: aviato-ci.yml
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      merged-sha: ${{ inputs.merged-sha || '' }}
  security:
    uses: ./.github/workflows/reusable-security-baseline.yml
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    with:
      codeql-languages: python
      codeql-runner: ubuntu-latest
  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - ci
      - security
      - common-lint
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish verify status
        env:
          STATUS_CONTEXT: ci / Python CI
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: security / Security baseline heartbeat
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: common-lint / Common lint
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' ||
            'failure' }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
