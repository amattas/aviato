# aviato:managed profile=aviato-library version=0 hash=4433826e6438f307ce26cdd19e0fcb27025b989a195d64329b68c640926f44bc inputs=76bd944abbcf93c5fc7686f5fdcf3b001c230442c29d97d4a07c86f5d0cc7232
name: Aviato Python Library
'on':
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: 23 5 * * 1
  workflow_dispatch:
    inputs:
      checkpoint-digest:
        default: ''
        description: Canonical checkpoint digest
        required: false
        type: string
      intended-actor:
        default: ''
        description: Exact signed release actor
        required: false
        type: string
      intended-tag:
        default: ''
        description: Exact SemVer tag
        required: false
        type: string
      merged-sha:
        default: ''
        description: Exact merged default-branch SHA
        required: false
        type: string
      promotion:
        default: false
        description: Closed release promotion mode
        required: true
        type: boolean
permissions:
  contents: read
jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: ./.github/workflows/reusable-python-ci.yml
    permissions:
      contents: read
    with:
      python-version: '3.12'
      install-command: python -m pip install -e .[dev]
      lint-command: python -m ruff check .
      test-command: python -m pytest --cov --cov-report=term-missing
      build-command: python -m build
      typecheck-command: python -m mypy --strict aviato tests
      run-typecheck: true
      run-build: true
  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: ./.github/workflows/reusable-common-lint.yml
    permissions:
      contents: read
    with:
      aviato-ref: '0'
      local-install: true
  pypi:
    needs:
      - release
      - release-gate
      - security
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result
      == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: ./.github/workflows/reusable-pypi-publish.yml
    permissions:
      contents: read
    with:
      python-version: '3.12'
      working-directory: .
      packages-dir: dist
      release-tag: ${{ needs.release.outputs.tag }}
      gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
      consumer-publisher-present: true
  pypi-publish:
    name: Publish Python package
    needs:
      - release-gate
      - pypi
    if: ${{ always() && needs.release-gate.result == 'success' && needs.pypi.result
      == 'success' && needs.release-gate.outputs.gated-sha != '' && needs.release-gate.outputs.checkpoint-digest
      != '' && needs.release-gate.outputs.verified-envelope-digest != '' }}
    runs-on: ubuntu-latest
    environment: pypi
    concurrency:
      group: aviato-pypi-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Recheck managed checkpoint before OIDC
        shell: bash
        env:
          CHECKPOINT_DIGEST: ${{ needs.release-gate.outputs.checkpoint-digest }}
          CHECKPOINT_RUN_ID: ${{ needs.release-gate.outputs.checkpoint-run-id }}
          VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          GH_TOKEN: ${{ github.token }}
        run: 'set -euo pipefail

          [[ "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ && "${CHECKPOINT_RUN_ID}" =~
          ^[1-9][0-9]*$ ]] || { echo "::error::managed checkpoint is absent"; exit
          1; }

          [ "${VERIFIED_ENVELOPE_DIGEST}" = "${CHECKPOINT_DIGEST}" ]

          rm -rf "${RUNNER_TEMP}/fresh-authority" && mkdir -p "${RUNNER_TEMP}/fresh-authority"

          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name
          verified-checkpoint --dir "${RUNNER_TEMP}/fresh-authority"

          envelope="${RUNNER_TEMP}/fresh-authority/verified-checkpoint-envelope.json"

          [ "$(shasum -a 256 "${envelope}" | awk ''{print $1}'')" = "${VERIFIED_ENVELOPE_DIGEST}"
          ]

          gh attestation verify "${envelope}" --repo "${GITHUB_REPOSITORY}" >/dev/null

          reviewer="$(jq -r .checkpoint.reviewer "${envelope}")"

          key_id="$(jq -r .key_id "${envelope}")"

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission"
          --jq .permission)" = "admin" ]

          gh api --paginate --slurp -H ''Cache-Control: no-cache'' "users/${reviewer}/ssh_signing_keys?per_page=100"
          --jq "([flatten[] | select((.id|tostring) == \"${key_id}\")] | length) ==
          1" | grep -qx true

          [ "$(gh api -H ''Cache-Control: no-cache'' "repos/${GITHUB_REPOSITORY}/environments/pypi"
          --jq .can_admins_bypass)" = "false" ]

          '
      - name: Download vetted build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.pypi.outputs.artifact-name }}
          path: .
      - name: Verify fresh remote tag after artifact download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
          GATED_SHA: ${{ needs.release-gate.outputs.gated-sha }}
        run: "set -euo pipefail\nread -r object_type actual < <(gh api -H \"Cache-Control:\
          \ no-cache\" \"repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}\"\
          \ --jq '.object.type + \" \" + .object.sha')\nfor _ in 1 2 3 4 5; do\n \
          \ [ \"${object_type}\" = \"tag\" ] || break\n  read -r object_type actual\
          \ < <(gh api -H \"Cache-Control: no-cache\" \"repos/${GITHUB_REPOSITORY}/git/tags/${actual}\"\
          \ --jq '.object.type + \" \" + .object.sha')\ndone\nif [ \"${object_type}\"\
          \ != \"commit\" ] || [ \"${actual}\" != \"${GATED_SHA}\" ]; then\n  echo\
          \ \"::error::Fresh remote tag ${RELEASE_TAG} does not peel to gated commit\
          \ ${GATED_SHA} (type=${object_type}, sha=${actual}).\"\n  exit 1\nfi\n"
      - name: Mint verifier-only read token
        id: verifier-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Verify full authority immediately before provenance attestation
        id: aviato-verify-pypi-provenance
        shell: bash
        env:
          AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
          AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/fresh-authority/verified-checkpoint-envelope.json
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: "# AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in\
          \ a cleared environment.\nverifier_token=\"${AVIATO_VERIFIER_TOKEN}\"\n\
          unset AVIATO_VERIFIER_TOKEN\n/usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C\
          \ GH_TOKEN=\"${verifier_token}\" VERIFIED_ENVELOPE_DIGEST=\"${AVIATO_VERIFIED_ENVELOPE_DIGEST}\"\
          \ /usr/bin/python3 -I - \"${AVIATO_ENVELOPE_PATH}\" \"${AVIATO_REPOSITORY}\"\
          \ <<'PY'\nimport base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request\n\
          class NoRedirect(urllib.request.HTTPRedirectHandler):\n    def redirect_request(self,\
          \ *args, **kwargs): return None\nenvelope_path, repository = sys.argv[1:]\n\
          envelope_bytes = open(envelope_path, \"rb\").read()\nif hashlib.sha256(envelope_bytes).hexdigest()\
          \ != os.environ.pop(\"VERIFIED_ENVELOPE_DIGEST\"): raise SystemExit(\"verified\
          \ envelope digest mismatch\")\nenvelope = json.loads(envelope_bytes)\ndescriptor\
          \ = envelope[\"checkpoint\"][\"authority_snapshot\"][\"guard\"][\"verifier\"\
          ]\nexpected = descriptor[\"blob_sha\"]\nrepo = urllib.parse.quote(descriptor[\"\
          repository\"], safe=\"/\")\npath = urllib.parse.quote(descriptor[\"path\"\
          ], safe=\"/\")\nref = urllib.parse.quote(descriptor[\"ref\"], safe=\"\"\
          )\nurl = f\"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}\"\
          \ntoken = os.environ.pop(\"GH_TOKEN\")\nrequest = urllib.request.Request(\n\
          \    url,\n    headers={\n        \"Accept\": \"application/vnd.github+json\"\
          ,\n        \"Authorization\": f\"Bearer {token}\",\n        \"Cache-Control\"\
          : \"no-cache\",\n        \"User-Agent\": \"aviato-authority-bootstrap\"\
          ,\n        \"X-GitHub-Api-Version\": \"2022-11-28\",\n    },\n)\nopener\
          \ = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()),\
          \ NoRedirect())\nwith opener.open(request, timeout=30) as response:\n  \
          \  parsed = urllib.parse.urlsplit(response.geturl())\n    if not (parsed.scheme\
          \ == \"https\" and parsed.netloc == \"api.github.com\"): raise SystemExit(\"\
          verifier fetch escaped GitHub API origin\")\n    raw = response.read(400_001)\n\
          if len(raw) > 400_000: raise SystemExit(\"verifier response exceeds bounded\
          \ size\")\npayload = json.loads(raw)\nif payload.get(\"encoding\") != \"\
          base64\" or not isinstance(payload.get(\"content\"), str): raise SystemExit(\"\
          invalid verifier encoding\")\ncontent = payload[\"content\"]\nif any(character.isspace()\
          \ and character not in \"\\r\\n\" for character in content): raise SystemExit(\"\
          invalid verifier whitespace\")\nencoded = content.replace(\"\\r\", \"\"\
          ).replace(\"\\n\", \"\")\nif len(encoded) > 349_528: raise SystemExit(\"\
          invalid verifier size\")\nbody = base64.b64decode(encoded, validate=True)\n\
          if not 1 <= len(body) <= 262_144: raise SystemExit(\"invalid verifier size\"\
          )\nactual = hashlib.sha1(b\"blob \" + str(len(body)).encode(\"ascii\") +\
          \ b\"\\0\" + body).hexdigest()\nif actual != expected or payload.get(\"\
          sha\") != expected: raise SystemExit(\"verifier blob mismatch\")\nos.environ[\"\
          GH_TOKEN\"] = token\nsys.argv = [\"authority_verifier.py\", \"--envelope\"\
          , sys.argv[1], \"--repository\", sys.argv[2]]\nexec(compile(body, \"<checkpoint-bound-authority-verifier>\"\
          , \"exec\"), {\"__name__\": \"__main__\", \"__file__\": \"<memory>\"})\n\
