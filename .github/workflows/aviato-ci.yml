          )\nPY\n"
      - name: Final checkpoint recheck immediately before PyPI mutation
        id: aviato-verify-pypi-publish
        shell: bash
        env:
          AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
          AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/fresh-authority/verified-checkpoint-envelope.json
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: "# AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in\
          \ a cleared environment.\nverifier_token=\"${AVIATO_VERIFIER_TOKEN}\"\n\
          unset AVIATO_VERIFIER_TOKEN\n/usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C\
          \ GH_TOKEN=\"${verifier_token}\" VERIFIED_ENVELOPE_DIGEST=\"${AVIATO_VERIFIED_ENVELOPE_DIGEST}\"\
          \ /usr/bin/python3 -I - \"${AVIATO_ENVELOPE_PATH}\" \"${AVIATO_REPOSITORY}\"\
          \ <<'PY'\nimport base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request\n\
          class NoRedirect(urllib.request.HTTPRedirectHandler):\n    def redirect_request(self,\
          \ *args, **kwargs): return None\nenvelope_path, repository = sys.argv[1:]\n\
          envelope_bytes = open(envelope_path, \"rb\").read()\nif hashlib.sha256(envelope_bytes).hexdigest()\
          \ != os.environ.pop(\"VERIFIED_ENVELOPE_DIGEST\"): raise SystemExit(\"verified\
          \ envelope digest mismatch\")\nenvelope = json.loads(envelope_bytes)\ndescriptor\
          \ = envelope[\"checkpoint\"][\"authority_snapshot\"][\"guard\"][\"verifier\"\
          ]\nexpected = descriptor[\"blob_sha\"]\nrepo = urllib.parse.quote(descriptor[\"\
