          ,\n        \"Authorization\": f\"Bearer {token}\",\n        \"Cache-Control\"\
          : \"no-cache\",\n        \"User-Agent\": \"aviato-authority-bootstrap\"\
          ,\n        \"X-GitHub-Api-Version\": \"2022-11-28\",\n    },\n)\nopener\
          \ = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()),\
          \ NoRedirect())\nwith opener.open(request, timeout=30) as response:\n  \
          \  parsed = urllib.parse.urlsplit(response.geturl())\n    if not (parsed.scheme\
          \ == \"https\" and parsed.netloc == \"api.github.com\"): raise SystemExit(\"\
          verifier fetch escaped GitHub API origin\")\n    raw = response.read(400_001)\n\
          if len(raw) > 400_000: raise SystemExit(\"verifier response exceeds bounded\
          \ size\")\npayload = json.loads(raw)\nif payload.get(\"encoding\") != \"\
          base64\" or not isinstance(payload.get(\"content\"), str): raise SystemExit(\"\
          invalid verifier encoding\")\ncontent = payload[\"content\"]\nif any(character.isspace()\
          \ and character not in \"\\r\\n\" for character in content): raise SystemExit(\"\
          invalid verifier whitespace\")\nencoded = content.replace(\"\\r\", \"\"\
          ).replace(\"\\n\", \"\")\nif len(encoded) > 349_528: raise SystemExit(\"\
          invalid verifier size\")\nbody = base64.b64decode(encoded, validate=True)\n\
          if not 1 <= len(body) <= 262_144: raise SystemExit(\"invalid verifier size\"\
          )\nactual = hashlib.sha1(b\"blob \" + str(len(body)).encode(\"ascii\") +\
          \ b\"\\0\" + body).hexdigest()\nif actual != expected or payload.get(\"\
          sha\") != expected: raise SystemExit(\"verifier blob mismatch\")\nos.environ[\"\
          GH_TOKEN\"] = token\nsys.argv = [\"authority_verifier.py\", \"--envelope\"\
          , sys.argv[1], \"--repository\", sys.argv[2]]\nexec(compile(body, \"<checkpoint-bound-authority-verifier>\"\
          , \"exec\"), {\"__name__\": \"__main__\", \"__file__\": \"<memory>\"})\n\
          PY\n"
      - name: Publish distributions
        if: ${{ vars.PYPI_REPOSITORY_URL == '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
      - name: Final checkpoint recheck immediately before alternate PyPI mutation
        id: aviato-verify-pypi-alternate
        shell: bash
        env:
          AVIATO_AUTHORITY_VERIFIER_CONTRACT: aviato-full-authority-verifier/v1
          AVIATO_ENVELOPE_PATH: ${{ runner.temp }}/fresh-authority/verified-checkpoint-envelope.json
          AVIATO_REPOSITORY: ${{ github.repository }}
          AVIATO_VERIFIED_ENVELOPE_DIGEST: ${{ needs.release-gate.outputs.verified-envelope-digest
            }}
          AVIATO_VERIFIER_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: "# AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute checkpoint-bound bytes in\
          \ a cleared environment.\nverifier_token=\"${AVIATO_VERIFIER_TOKEN}\"\n\
          unset AVIATO_VERIFIER_TOKEN\n/usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C\
          \ GH_TOKEN=\"${verifier_token}\" VERIFIED_ENVELOPE_DIGEST=\"${AVIATO_VERIFIED_ENVELOPE_DIGEST}\"\
          \ /usr/bin/python3 -I - \"${AVIATO_ENVELOPE_PATH}\" \"${AVIATO_REPOSITORY}\"\
          \ <<'PY'\nimport base64, hashlib, json, os, ssl, sys, urllib.parse, urllib.request\n\
          class NoRedirect(urllib.request.HTTPRedirectHandler):\n    def redirect_request(self,\
          \ *args, **kwargs): return None\nenvelope_path, repository = sys.argv[1:]\n\
          envelope_bytes = open(envelope_path, \"rb\").read()\nif hashlib.sha256(envelope_bytes).hexdigest()\
          \ != os.environ.pop(\"VERIFIED_ENVELOPE_DIGEST\"): raise SystemExit(\"verified\
          \ envelope digest mismatch\")\nenvelope = json.loads(envelope_bytes)\ndescriptor\
          \ = envelope[\"checkpoint\"][\"authority_snapshot\"][\"guard\"][\"verifier\"\
          ]\nexpected = descriptor[\"blob_sha\"]\nrepo = urllib.parse.quote(descriptor[\"\
          repository\"], safe=\"/\")\npath = urllib.parse.quote(descriptor[\"path\"\
          ], safe=\"/\")\nref = urllib.parse.quote(descriptor[\"ref\"], safe=\"\"\
          )\nurl = f\"https://api.github.com/repos/{repo}/contents/{path}?ref={ref}\"\
          \ntoken = os.environ.pop(\"GH_TOKEN\")\nrequest = urllib.request.Request(\n\
          \    url,\n    headers={\n        \"Accept\": \"application/vnd.github+json\"\
          ,\n        \"Authorization\": f\"Bearer {token}\",\n        \"Cache-Control\"\
          : \"no-cache\",\n        \"User-Agent\": \"aviato-authority-bootstrap\"\
          ,\n        \"X-GitHub-Api-Version\": \"2022-11-28\",\n    },\n)\nopener\
          \ = urllib.request.build_opener(urllib.request.ProxyHandler({}), urllib.request.HTTPSHandler(context=ssl.create_default_context()),\
          \ NoRedirect())\nwith opener.open(request, timeout=30) as response:\n  \
          \  parsed = urllib.parse.urlsplit(response.geturl())\n    if not (parsed.scheme\
          \ == \"https\" and parsed.netloc == \"api.github.com\"): raise SystemExit(\"\
          verifier fetch escaped GitHub API origin\")\n    raw = response.read(400_001)\n\
          if len(raw) > 400_000: raise SystemExit(\"verifier response exceeds bounded\
          \ size\")\npayload = json.loads(raw)\nif payload.get(\"encoding\") != \"\
          base64\" or not isinstance(payload.get(\"content\"), str): raise SystemExit(\"\
          invalid verifier encoding\")\ncontent = payload[\"content\"]\nif any(character.isspace()\
          \ and character not in \"\\r\\n\" for character in content): raise SystemExit(\"\
          invalid verifier whitespace\")\nencoded = content.replace(\"\\r\", \"\"\
          ).replace(\"\\n\", \"\")\nif len(encoded) > 349_528: raise SystemExit(\"\
          invalid verifier size\")\nbody = base64.b64decode(encoded, validate=True)\n\
          if not 1 <= len(body) <= 262_144: raise SystemExit(\"invalid verifier size\"\
          )\nactual = hashlib.sha1(b\"blob \" + str(len(body)).encode(\"ascii\") +\
          \ b\"\\0\" + body).hexdigest()\nif actual != expected or payload.get(\"\
          sha\") != expected: raise SystemExit(\"verifier blob mismatch\")\nos.environ[\"\
          GH_TOKEN\"] = token\nsys.argv = [\"authority_verifier.py\", \"--envelope\"\
          , sys.argv[1], \"--repository\", sys.argv[2]]\nexec(compile(body, \"<checkpoint-bound-authority-verifier>\"\
          , \"exec\"), {\"__name__\": \"__main__\", \"__file__\": \"<memory>\"})\n\
          PY\n"
        if: ${{ vars.PYPI_REPOSITORY_URL != '' }}
      - name: Publish distributions to alternate repository
        if: ${{ vars.PYPI_REPOSITORY_URL != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
          repository-url: ${{ vars.PYPI_REPOSITORY_URL }}
      - name: Confirm published artifacts
        shell: bash
        env:
          SIMPLE_INDEX_URL: ${{ steps.index.outputs.simple-index-url }}
          DISTRIBUTION_NAME: ${{ needs.pypi.outputs.distribution-name }}
          EXPECTED_VERSION: ${{ needs.pypi.outputs.package-version }}
          RELEASE_TAG: ${{ needs.pypi.outputs.resolved-tag }}
          DIST_DIR: dist
        run: "set -euo pipefail\npython - <<'PY'\nimport hashlib\nimport json\nimport\
          \ os\nimport pathlib\nimport re\nimport time\nimport urllib.error\nimport\
          \ urllib.parse\nimport urllib.request\nrelease_tag = os.environ[\"RELEASE_TAG\"\
          ]\nexpected_from_tag = re.sub(r\"-(alpha|beta)([0-9]+)$\", lambda m: {\"\
          alpha\": \"a\", \"beta\": \"b\"}[m.group(1)] + m.group(2), release_tag)\n\
          if os.environ[\"EXPECTED_VERSION\"] != expected_from_tag:\n    raise SystemExit(f\"\
          builder version {os.environ['EXPECTED_VERSION']!r} does not match release\
          \ tag {release_tag!r}\")\ndist = pathlib.Path(os.environ[\"DIST_DIR\"])\n\
          local = {path.name: hashlib.sha256(path.read_bytes()).hexdigest() for path\
          \ in sorted(dist.iterdir()) if path.is_file()}\nif not local:\n    raise\
          \ SystemExit(\"no local distribution artifacts to confirm\")\nnormalized_name\
          \ = re.sub(r\"[-_.]+\", \"-\", os.environ[\"DISTRIBUTION_NAME\"]).lower()\n\
          url = urllib.parse.urljoin(os.environ[\"SIMPLE_INDEX_URL\"], urllib.parse.quote(normalized_name)\
          \ + \"/\")\nrequest = urllib.request.Request(url, headers={\"Accept\": \"\
          application/vnd.pypi.simple.v1+json\"})\nlast_error = \"index returned no\
          \ matching files\"\nfor attempt in range(1, 11):\n    try:\n        with\
          \ urllib.request.urlopen(request, timeout=30) as response:\n           \
          \ payload = json.load(response)\n        remote = {}\n        for entry\
          \ in payload.get(\"files\", []):\n            filename = entry.get(\"filename\"\
          )\n            sha256 = (entry.get(\"hashes\") or {}).get(\"sha256\")\n\
          \            if isinstance(filename, str) and isinstance(sha256, str):\n\
          \                remote[filename] = sha256.lower()\n        mismatches =\
          \ [name for name, digest in local.items() if remote.get(name) != digest]\n\
          \        if not mismatches:\n            print(f\"Confirmed {len(local)}\
          \ published artifact(s) for {os.environ['DISTRIBUTION_NAME']}=={os.environ['EXPECTED_VERSION']}\
          \ via PEP 691 metadata.\")\n            raise SystemExit(0)\n        last_error\
          \ = f\"missing or hash-mismatched files: {mismatches}\"\n    except (OSError,\
          \ ValueError, json.JSONDecodeError, urllib.error.URLError) as exc:\n   \
          \     last_error = str(exc)\n    print(f\"PEP 691 confirmation attempt {attempt}/10\
          \ failed: {last_error}\")\n    if attempt < 10:\n        time.sleep(30)\n\
          raise SystemExit(f\"published artifacts did not become verifiable: {last_error}\"\
          )\nPY\n"
  release:
    if: ${{ github.ref_type != 'tag' && (github.event_name == 'push' || (github.event_name
      == 'workflow_dispatch' && inputs.promotion)) }}
    needs:
      - ci
      - security
      - common-lint
    uses: ./.github/workflows/reusable-release.yml
    permissions:
      contents: write
      pull-requests: write
      actions: write
      issues: read
    with:
      aviato-ref: '0'
      local-install: true
      promotion: ${{ inputs.promotion || false }}
      merged-sha: ${{ inputs.merged-sha || '' }}
      intended-tag: ${{ inputs.intended-tag || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
    secrets:
      AVIATO_VERIFIER_APP_ID: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
      AVIATO_VERIFIER_APP_PRIVATE_KEY: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY
        }}
  release-gate:
    needs:
      - release
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: ./.github/workflows/reusable-release-gate.yml
    permissions:
      actions: read
      contents: read
      pull-requests: read
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}
      required-workflow: aviato-ci.yml
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      merged-sha: ${{ inputs.merged-sha || '' }}
  security:
    uses: ./.github/workflows/reusable-security-baseline.yml
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    with:
      codeql-languages: python
      codeql-runner: ubuntu-latest
  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - ci
      - security
      - common-lint
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish verify status
        env:
          STATUS_CONTEXT: ci / Python CI
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: security / Security baseline heartbeat
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: common-lint / Common lint
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' ||
            'failure' }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
