name: Reusable Common Lint

# Language-agnostic common verify lint, blocking on every profile (§12 intro):
# actionlint + yamllint always; hadolint/shellcheck/helm-lint are no-ops when their
# files are absent.

on:
  workflow_call:
    inputs:
      actionlint-version:
        required: false
        type: string
        default: "1.7.4"
      actionlint-sha256:
        description: >-
          SHA256 of actionlint_<version>_linux_amd64.tar.gz. The download is verified
          against this checksum (§11.3 tool pinning) before execution; bump it with
          the version.
        required: false
        type: string
        default: "fc0a6886bbb9a23a39eeec4b176193cadb54ddbe77cdbb19b637933919545395"
      yamllint-version:
        description: Exact yamllint version to install (§11.3 — a package index has no
          commit digest, so an exact version is the strongest reproducible pin here).
        required: false
        type: string
        default: "1.35.1"
      aviato-ref:
        description: >-
          Pinned Aviato Library ref (version X.Y.Z, a prerelease, or floating major N) to install
          the matching `aviato` CLI from for the §11.3 supply-chain pin gate. Passed by the caller.
        required: false
        type: string
        default: ""
      local-install:
        description: Install Aviato from the checked-out repository for Library bootstrap.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  common-lint:
    name: Common lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: yamllint (blocking)
        shell: bash
        env:
          YAMLLINT_VERSION: ${{ inputs.yamllint-version }}
        run: |
          # §11.3: pin the pip-installed tool to an exact version (not a floating latest).
          python -m pip install --quiet "yamllint==${YAMLLINT_VERSION}"
          # Honor the repo's own yamllint config when present; otherwise fall back to a
          # baseline that accepts the Aviato-generated caller workflows (long `if:`
          # expressions, GitHub's truthy `on:` key) without disabling syntax checks.
          if [ -f .yamllint ] || [ -f .yamllint.yaml ] || [ -f .yamllint.yml ]; then
            yamllint -s .
          else
            yamllint -s -d '{extends: default, rules: {braces: disable, comments: disable, comments-indentation: disable, document-start: disable, truthy: disable, empty-lines: {max: 2, max-end: 1}, line-length: {max: 240}}}' .
          fi

      - name: actionlint (blocking)
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ inputs.actionlint-version }}
          ACTIONLINT_SHA256: ${{ inputs.actionlint-sha256 }}
        run: |
          set -euo pipefail
          if [ ! -d .github/workflows ]; then
            echo "No workflows to lint."; exit 0
          fi
          # §11.3: pin the shell-fetched tool by checksum, not by mutable version alone.
          tarball="${RUNNER_TEMP:-/tmp}/actionlint.tar.gz"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o "${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "${tarball}" actionlint
          actionlint

      # §11.3 (blocking): ONE implementation, shared with `aviato validate`. Installs the pinned
      # Aviato CLI (which brings the pinned zizmor) and runs the single detector — zizmor
      # (unpinned-uses/unpinned-images) + fail-closed fetch-execute + pip exact-version. Replaces
      # the former grep mirror that drifted from the Python detector (cycle-9 R9-5).
      - name: Supply-chain pins (blocking)
        shell: bash
        env:
          AVIATO_REF: ${{ inputs.aviato-ref }}
          AVIATO_LOCAL_INSTALL: ${{ inputs.local-install }}
        run: |
          set -euo pipefail
          if [ ! -d .github/workflows ]; then
            echo "No workflows to check."; exit 0
          fi
          if [ "${AVIATO_LOCAL_INSTALL}" = "true" ]; then
            # §5.10: the Library's own bootstrap caller runs the gate off the checked-out
            # source — valid only for a structural Library checkout (mirrors reusable-release).
            required_anchors=(
              "aviato/core/__init__.py"
              "aviato/library/bundles"
              "aviato/library/scaffold"
              "aviato/library/policy.yml"
              ".github/aviato.yaml"
            )
            for anchor in "${required_anchors[@]}"; do
              if [ ! -e "${anchor}" ]; then
                echo "::error::local-install is only valid for Library bootstrap; missing structural anchor ${anchor} (§5.10)."
                exit 1
              fi
            done
            if ! sed 's/#.*$//' .github/aviato.yaml | grep -Eiq '^[[:space:]]*bootstrap:[[:space:]]*true[[:space:]]*$'; then
              echo "::error::local-install requires .github/aviato.yaml to declare bootstrap: true (§5.10)."
              exit 1
            fi
            python -m pip install -e .
          else
            # §11.3: never run the gate off unpinned Library code.
            if [[ ! "${AVIATO_REF}" =~ ^[0-9]+(\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?)?$ ]]; then
              echo "::error::aviato-ref '${AVIATO_REF}' is not a pinned version (expected X.Y.Z, X.Y.Z-alphaN/-betaN, or a floating major N)."
              exit 1
            fi
            # library.repository copy; aviato validate binds this URL to packaged policy.yml.
            python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"
          fi
          aviato lint-actions .

      - name: hadolint (blocking, where a Dockerfile exists)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find . -name 'Dockerfile' -not -path './node_modules/*')
          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfile."; exit 0
          fi
          # §11.3: pin the tool image by digest, not a mutable tag.
          for dockerfile in "${dockerfiles[@]}"; do
            echo "Linting ${dockerfile}"
            docker run --rm -i hadolint/hadolint@sha256:30a8fd2e785ab6176eed53f74769e04f125afb2f74a6c52aef7d463583b6d45e hadolint - < "${dockerfile}"
          done

      - name: shellcheck (blocking, where shell scripts exist)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t scripts < <(find . -name '*.sh' -not -path './node_modules/*')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts."; exit 0
          fi
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck "${scripts[@]}"

      - name: helm lint (blocking, where a Chart.yaml exists)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t charts < <(find . -name 'Chart.yaml' -not -path './node_modules/*')
          if [ "${#charts[@]}" -eq 0 ]; then
            echo "No Helm charts."; exit 0
          fi
          for chart in "${charts[@]}"; do
            helm lint "$(dirname "${chart}")"
          done
