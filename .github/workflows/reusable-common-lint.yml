name: Reusable Common Lint

# Language-agnostic common verify lint, blocking on every profile (§12 intro):
# actionlint + yamllint always; hadolint/shellcheck/helm-lint are no-ops when their
# files are absent.

on:
  workflow_call:
    inputs:
      actionlint-version:
        required: false
        type: string
        default: "1.7.4"
      actionlint-sha256:
        description: >-
          SHA256 of actionlint_<version>_linux_amd64.tar.gz. The download is verified
          against this checksum (§11.3 tool pinning) before execution; bump it with
          the version.
        required: false
        type: string
        default: "fc0a6886bbb9a23a39eeec4b176193cadb54ddbe77cdbb19b637933919545395"
      yamllint-version:
        description: Exact yamllint version to install (§11.3 — a package index has no
          commit digest, so an exact version is the strongest reproducible pin here).
        required: false
        type: string
        default: "1.35.1"

permissions:
  contents: read

jobs:
  common-lint:
    name: Common lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: yamllint (blocking)
        shell: bash
        env:
          YAMLLINT_VERSION: ${{ inputs.yamllint-version }}
        run: |
          # §11.3: pin the pip-installed tool to an exact version (not a floating latest).
          python -m pip install --quiet "yamllint==${YAMLLINT_VERSION}"
          yamllint -s .

      - name: actionlint (blocking)
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ inputs.actionlint-version }}
          ACTIONLINT_SHA256: ${{ inputs.actionlint-sha256 }}
        run: |
          set -euo pipefail
          if [ ! -d .github/workflows ]; then
            echo "No workflows to lint."; exit 0
          fi
          # §11.3: pin the shell-fetched tool by checksum, not by mutable version alone.
          tarball="${RUNNER_TEMP:-/tmp}/actionlint.tar.gz"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o "${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "${tarball}" actionlint
          actionlint

      # §11.3 (blocking): third-party actions MUST be pinned by 40-hex commit digest.
      # Exempt: first-party (actions/*, github/*), local (./...), and the consumer's own
      # Aviato Library reusable refs (amattas/aviato/.github/workflows/*) — the one sanctioned
      # mutable ref. A NON-Library reusable workflow is third-party and must be digest-pinned.
      # Mirrors aviato.plugins.actionpins so the convention is ENFORCED in every consumer's CI.
      - name: Third-party action digest pin (blocking)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .github/workflows ]; then
            echo "No workflows to check."; exit 0
          fi
          violations=0
          while IFS= read -r line; do
            ref="$(printf '%s' "${line}" | sed -E 's/^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*//; s/[[:space:]#].*$//')"
            case "${ref}" in
              ""|./*|actions/*|github/*) continue ;;
              # The consumer's pinned Aviato Library reference is the one sanctioned mutable
              # ref (§6.1/§11.3); a NON-Library reusable workflow is third-party and must be
              # digest-pinned like an action (a blanket */.github/workflows/* exemption would
              # let other-org/repo/.github/workflows/x.yml@main through).
              amattas/aviato/.github/workflows/*) continue ;;
            esac
            case "${ref}" in *@*) ;; *) continue ;; esac
            version="${ref#*@}"
            if ! printf '%s' "${version}" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::error::Unpinned third-party action (§11.3): ${ref} — pin to a 40-hex commit SHA (Dependabot keeps it current)."
              violations=$((violations + 1))
            fi
          done < <(grep -rEh '^[[:space:]]*-?[[:space:]]*uses:' .github/workflows || true)
          if [ "${violations}" -gt 0 ]; then
            echo "::error::${violations} third-party action(s) not digest-pinned."
            exit 1
          fi
          echo "All third-party actions are digest-pinned."

      # §11.3: the in-CI gate enforces the digest-pinned classes — actions (above), container
      # IMAGES, and curl-fetched BINARIES. (Exact pip/tool-version pins are carried as workflow
      # inputs, e.g. yamllint-version/actionlint-version, not greppable here.) Mirrors the
      # remaining aviato.plugins.actionpins.unpinned_tool_invocations checks so a consumer's own
      # workflow cannot run an unpinned image or pipe a download straight into a shell.
      - name: Container image + fetched-binary pin (blocking)
        shell: bash
        run: |
          set -uo pipefail
          if [ ! -d .github/workflows ]; then
            echo "No workflows to check."; exit 0
          fi
          violations=0
          # A `docker run`/`docker pull` image MUST be digest-pinned (@sha256:…).
          while IFS= read -r line; do
            case "${line}" in *@sha256:*) continue ;; esac
            echo "::error::Container image not digest-pinned (§11.3): ${line# } — pin to @sha256:<digest>."
            violations=$((violations + 1))
          done < <(grep -rhE '\bdocker[[:space:]]+(run|pull)\b' .github/workflows || true)
          # A network download piped straight into a shell/extractor has no checksum gate.
          if grep -rqE '\b(curl|wget)\b[^|]*\|[^|]*\b(sh|bash|tar)\b' .github/workflows; then
            echo "::error::Fetch-and-execute without a checksum (§11.3): download to a file, verify with sha256sum -c, then run."
            grep -rnE '\b(curl|wget)\b[^|]*\|[^|]*\b(sh|bash|tar)\b' .github/workflows
            violations=$((violations + 1))
          fi
          if [ "${violations}" -gt 0 ]; then
            echo "::error::${violations} unpinned image/fetch invocation(s) (§11.3)."
            exit 1
          fi
          echo "Container images digest-pinned; no unchecked fetch-and-execute."

      - name: hadolint (blocking, where a Dockerfile exists)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find . -name 'Dockerfile' -not -path './node_modules/*')
          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfile."; exit 0
          fi
          # §11.3: pin the tool image by digest, not a mutable tag.
          docker run --rm -i hadolint/hadolint@sha256:30a8fd2e785ab6176eed53f74769e04f125afb2f74a6c52aef7d463583b6d45e hadolint - < "${dockerfiles[0]}"

      - name: shellcheck (blocking, where shell scripts exist)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t scripts < <(find . -name '*.sh' -not -path './node_modules/*')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts."; exit 0
          fi
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck "${scripts[@]}"

      - name: helm lint (blocking, where a Chart.yaml exists)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t charts < <(find . -name 'Chart.yaml' -not -path './node_modules/*')
          if [ "${#charts[@]}" -eq 0 ]; then
            echo "No Helm charts."; exit 0
          fi
          for chart in "${charts[@]}"; do
            helm lint "$(dirname "${chart}")"
          done
