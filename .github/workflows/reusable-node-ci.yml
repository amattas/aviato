name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "24"
      working-directory:
        required: false
        type: string
        default: "."
      install-command:
        required: false
        type: string
        # Reproducible install when a lockfile is committed; falls back to a plain
        # install on a freshly-scaffolded repo that has none yet (then commit the lock).
        default: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
      lint-command:
        required: false
        type: string
        # finding 29: no --if-present — a consumer deleting the script from the
        # operator-owned manifest must fail the gate loudly, not silently skip it.
        default: "npm run lint"
      format-command:
        required: false
        type: string
        # R4-8: --no-install so npx uses the locally-installed (npm ci) tool and FAILS rather than
        # silently fetching a floating-latest from the registry (§11.3).
        default: "npx --no-install prettier --check ."
      typecheck-command:
        description: TypeScript type-check. Set empty for JavaScript projects (language-variant=javascript).
        required: false
        type: string
        default: "npx --no-install tsc --noEmit"
      test-command:
        required: false
        type: string
        # finding 29: no --if-present (same loud-failure rationale as lint-command).
        default: "npm test"
      build-command:
        required: false
        type: string
        default: "npm run build --if-present"
      run-install:
        required: false
        type: boolean
        default: true
      run-lint:
        required: false
        type: boolean
        default: true
      run-format:
        required: false
        type: boolean
        default: true
      run-typecheck:
        description: Enable for TypeScript; disable for JavaScript (§12.2).
        required: false
        type: boolean
        default: true
      run-tests:
        required: false
        type: boolean
        default: true
      run-build:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  node-ci:
    name: Node CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Harden npm install behavior
        shell: bash
        run: |
          set -euo pipefail
          npm_version="$(npm --version)"
          npm_major="${npm_version%%.*}"
          npm_minor="$(printf '%s' "${npm_version}" | cut -d. -f2)"
          # finding 13 (verified empirically against the registry): min-release-age is
          # DEFINED from npm 11.10.0 — npm 11.0–11.9 silently IGNORE the key, leaving
          # the §11.7 release-age cooldown inert while looking configured.
          if ! [[ "${npm_major}" =~ ^[0-9]+$ && "${npm_minor}" =~ ^[0-9]+$ ]] || \
             [ "${npm_major}" -lt 11 ] || { [ "${npm_major}" -eq 11 ] && [ "${npm_minor}" -lt 10 ]; }; then
            echo "::error::npm ${npm_version} does not support min-release-age (requires npm >=11.10). Update Node/npm before running installs."
            exit 1
          fi
          npm config set ignore-scripts true --location=user
          npm config set engine-strict true --location=user
          {
            echo "NPM_CONFIG_IGNORE_SCRIPTS=true"
            echo "NPM_CONFIG_ENGINE_STRICT=true"
            echo "NPM_CONFIG_MIN_RELEASE_AGE=7"
          } >> "${GITHUB_ENV}"
          npm config set min-release-age 7 --location=user

      - name: Install
        if: ${{ inputs.run-install && inputs.install-command != '' }}
        shell: bash
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: eval "$INSTALL_COMMAND"

      - name: Lint
        if: ${{ inputs.run-lint && inputs.lint-command != '' }}
        shell: bash
        env:
          LINT_COMMAND: ${{ inputs.lint-command }}
        run: eval "$LINT_COMMAND"

      - name: Format check
        if: ${{ inputs.run-format && inputs.format-command != '' }}
        shell: bash
        env:
          FORMAT_COMMAND: ${{ inputs.format-command }}
        run: eval "$FORMAT_COMMAND"

      # TypeScript type-check is a blocking gate for TS projects and auto-skips for
      # JavaScript projects (language-variant=javascript), detected by the absence of
      # tsconfig.json (§12.2). Set run-typecheck:false to disable explicitly.
      - name: Type check
        if: ${{ inputs.run-typecheck && inputs.typecheck-command != '' }}
        shell: bash
        env:
          TYPECHECK_COMMAND: ${{ inputs.typecheck-command }}
        run: |
          if [ -f tsconfig.json ]; then
            eval "$TYPECHECK_COMMAND"
          else
            echo "No tsconfig.json (JavaScript project); skipping type-check."
          fi

      - name: Test
        if: ${{ inputs.run-tests && inputs.test-command != '' }}
        shell: bash
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
        run: eval "$TEST_COMMAND"

      - name: Build
        if: ${{ inputs.run-build && inputs.build-command != '' }}
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: eval "$BUILD_COMMAND"
