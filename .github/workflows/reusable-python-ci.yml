name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      working-directory:
        required: false
        type: string
        default: "."
      install-command:
        required: false
        type: string
        default: "python -m pip install -e .[dev]"
      lint-command:
        required: false
        type: string
        default: "python -m ruff check ."
      format-command:
        required: false
        type: string
        default: "python -m ruff format --check ."
      typecheck-command:
        required: false
        type: string
        default: "python -m mypy --strict ."
      test-command:
        required: false
        type: string
        default: "python -m pytest --cov --cov-report=term-missing"
      build-command:
        required: false
        type: string
        default: ""
      run-install:
        required: false
        type: boolean
        default: true
      run-lint:
        required: false
        type: boolean
        default: true
      run-format:
        required: false
        type: boolean
        default: true
      run-typecheck:
        required: false
        type: boolean
        default: true
      run-tests:
        required: false
        type: boolean
        default: true
      run-build:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install
        if: ${{ inputs.run-install && inputs.install-command != '' }}
        shell: bash
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: eval "$INSTALL_COMMAND"

      - name: Lint
        if: ${{ inputs.run-lint && inputs.lint-command != '' }}
        shell: bash
        env:
          LINT_COMMAND: ${{ inputs.lint-command }}
        run: eval "$LINT_COMMAND"

      - name: Format check
        if: ${{ inputs.run-format && inputs.format-command != '' }}
        shell: bash
        env:
          FORMAT_COMMAND: ${{ inputs.format-command }}
        run: eval "$FORMAT_COMMAND"

      - name: Type check
        if: ${{ inputs.run-typecheck && inputs.typecheck-command != '' }}
        shell: bash
        env:
          TYPECHECK_COMMAND: ${{ inputs.typecheck-command }}
        run: eval "$TYPECHECK_COMMAND"

      - name: Test
        if: ${{ inputs.run-tests && inputs.test-command != '' }}
        shell: bash
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
        run: eval "$TEST_COMMAND"

      - name: Build
        if: ${{ inputs.run-build && inputs.build-command != '' }}
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: eval "$BUILD_COMMAND"

