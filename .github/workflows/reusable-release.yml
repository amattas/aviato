name: Reusable Release

# §5.9 library/consumer release: derive the next SemVer from Conventional Commit
# history, write it via the profile's version-source, tag, and publish a GitHub
# release. Runs on the default branch; the resulting version tag is what triggers
# the deploy pipelines (§11.1) — this job is the human-gated release cut.
#
# OPERATOR NOTE: a tag pushed with the default GITHUB_TOKEN does NOT trigger other
# workflows (GitHub's recursive-trigger guard). To have the version tag trigger the
# tag-gated deploy/CI, supply a deploy PAT/app token as the checkout token here, or
# trigger deploys on `release: { types: [published] }` instead of `push: tags`.

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: The Aviato version pin to install.
        required: false
        type: string
        default: main
      python-version:
        required: false
        type: string
        default: "3.12"

permissions:
  contents: write

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      AVIATO_REF: ${{ inputs.aviato-ref }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Aviato (pinned)
        shell: bash
        run: python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"

      - name: Derive next version
        id: derive
        shell: bash
        run: |
          set -euo pipefail
          last="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          range="${last}..HEAD"
          if [ "${last}" = "v0.0.0" ] && ! git rev-parse "v0.0.0" >/dev/null 2>&1; then range="HEAD"; fi
          # Commit messages are piped (never interpolated into a command) to aviato.
          # next-version returns a v-prefixed tag (vX.Y.Z), matching the §6.1 pin format.
          next="$(git log "${range}" --format=%B%x00 | aviato next-version --current "${last}")"
          echo "last=${last}" >> "${GITHUB_OUTPUT}"
          echo "next=${next}" >> "${GITHUB_OUTPUT}"
          if [ "${next}" = "${last}" ]; then
            echo "release=false" >> "${GITHUB_OUTPUT}"
            echo "No version change implied by commit history; skipping release."
          else
            echo "release=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Bump version-source, tag, advance floating major, and release
        if: ${{ steps.derive.outputs.release == 'true' }}
        shell: bash
        env:
          NEXT: ${{ steps.derive.outputs.next }}
        run: |
          set -euo pipefail
          aviato bump-version "${NEXT}" . || echo "no version-source files to bump"
          git config user.name aviato-bot
          git config user.email aviato-bot@users.noreply.github.com
          git commit -am "chore(release): ${NEXT}" || echo "nothing to commit"
          git tag "${NEXT}"
          # §5.9: advance the floating major reference (e.g. v1) to this release,
          # unconditionally — it is a published pointer consumers pin with @vN.
          major="$(printf '%s' "${NEXT}" | sed -E 's/^(v[0-9]+).*/\1/')"
          git tag -f "${major}"
          git push origin HEAD "${NEXT}"
          git push -f origin "${major}"
          prev="$(git describe --tags --abbrev=0 "${NEXT}^" 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          git log "${prev}..HEAD" --pretty=format:'- %s' > /tmp/changelog.md || true
          gh release create "${NEXT}" --title "${NEXT}" --notes-file /tmp/changelog.md
