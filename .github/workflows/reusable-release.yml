name: Reusable Release

# §5.9 library/consumer release: derive the next SemVer from Conventional Commit
# history, write it via the profile's version-source, tag the exact version, and
# advance the floating major. Runs on the default branch (the human-gated release
# cut is merging the release-bearing change).
#
# DEPLOY TRIGGER: the tag is pushed with the platform GITHUB_TOKEN — NO stored
# secret (§11.2 forbids stored secrets outside App Store Connect). A tag pushed by
# GITHUB_TOKEN does not auto-trigger the tag-gated deploy workflows, so the operator
# starts the deploy by either (a) re-pushing the tag with their own credentials /
# a GitHub App (§17 out-of-band), or (b) running the tag-gated workflow manually.
# This avoids modeling a forbidden stored secret.

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: The Aviato version pin to install.
        required: false
        type: string
        default: main
      python-version:
        required: false
        type: string
        default: "3.12"

permissions:
  contents: write

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      AVIATO_REF: ${{ inputs.aviato-ref }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Aviato (pinned)
        shell: bash
        run: python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"

      - name: Derive next version
        id: derive
        shell: bash
        run: |
          set -euo pipefail
          # Latest EXACT version tag only (vX.Y.Z) — never the floating major (vX),
          # which would crash next-version and is not a release point.
          last="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo v0.0.0)"
          range="${last}..HEAD"
          if ! git rev-parse "${last}" >/dev/null 2>&1; then range="HEAD"; fi
          # Commit messages are piped (never interpolated into a command) to aviato.
          next="$(git log "${range}" --format=%B%x00 | aviato next-version --current "${last}")"
          echo "last=${last}" >> "${GITHUB_OUTPUT}"
          echo "next=${next}" >> "${GITHUB_OUTPUT}"
          if [ "${next}" = "${last}" ]; then
            echo "release=false" >> "${GITHUB_OUTPUT}"
            echo "No releasable change in commit history; skipping release (no loop)."
          else
            echo "release=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Bump version-source, tag, advance floating major, and release
        if: ${{ steps.derive.outputs.release == 'true' }}
        shell: bash
        env:
          NEXT: ${{ steps.derive.outputs.next }}
        run: |
          set -euo pipefail
          # §5.9: writing the version through the version-source MUST succeed before
          # cutting release artifacts — a failure aborts (no release without a bump).
          aviato bump-version "${NEXT}" .
          git config user.name aviato-bot
          git config user.email aviato-bot@users.noreply.github.com
          git commit -am "chore(release): ${NEXT}" || echo "nothing to commit"
          git tag "${NEXT}"
          # §5.9: advance the floating major (e.g. v1) to this release — a mutable
          # published pointer consumers pin with @vN (§6.1/§11.3).
          major="$(printf '%s' "${NEXT}" | sed -E 's/^(v[0-9]+).*/\1/')"
          git tag -f "${major}"
          git push origin HEAD "${NEXT}"
          git push -f origin "${major}"
          prev="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' "${NEXT}^" 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          git log "${prev}..HEAD" --pretty=format:'- %s' > /tmp/changelog.md || true
          gh release create "${NEXT}" --title "${NEXT}" --notes-file /tmp/changelog.md
