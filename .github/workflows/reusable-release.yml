name: Reusable Release

# §5.9 release with propose -> merge -> tag (-> in-run deploy). Runs on the default
# branch. Two phases, chosen automatically:
#
#   PROPOSE: when the version-source has NOT yet been bumped to the derived next
#     version, open/update a release PR that bumps the version-source + changelog.
#     The version bump lands through a reviewed PR, so it never bypasses branch
#     protection (requires_pull_request). No tag, no deploy this run.
#
#   TAG: when the latest commit IS the merged release bump (version-source already
#     equals next), tag the exact version, advance the floating major, and publish
#     the GitHub release. Emits outputs.released=true + outputs.tag so the caller can
#     run deploy as IN-RUN downstream jobs.
#
# WHY IN-RUN DEPLOY: a tag pushed with GITHUB_TOKEN does NOT trigger a new
# workflow run (GitHub suppresses events from the platform token to prevent
# recursion), and §11.2 forbids a stored PAT/App token to re-trigger. So deploy
# cannot be a separate tag-triggered workflow without a forbidden secret. Instead
# the caller chains deploy off this job's outputs in the SAME run — fully
# automatic, secret-free, and still gated by the release gate (merged-PR check).
#
# C12-W1 (privilege split): the DERIVE phase — install Aviato and run it over the
# full commit history, the largest third-party-execution surface in the release
# path — runs in a `contents: read` job with no GH_TOKEN and no persisted checkout
# credentials. Only the propose/tag job holds `contents: write` +
# `pull-requests: write`. RESIDUAL (documented, accepted): the write job still
# installs the pinned Aviato with the write token ambient — a step cannot drop job
# permissions — so the split is defense-in-depth for the heavy phase, not complete
# token elimination; AVIATO_REF stays pin-validated (R4-6) in both jobs.

on:
  workflow_call:
    inputs:
      aviato-ref:
        description: The Aviato version pin to install (X.Y.Z, X.Y.Z-alphaN/-betaN, or floating major N).
        # R4-6: required, no `main` default. A privileged release run must install a PINNED
        # Aviato, never a moving branch (§11.3); a caller omitting it fails closed at config time.
        required: true
        type: string
      local-install:
        description: Install Aviato from the checked-out repository for Library bootstrap.
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: "3.12"
      build-number:
        description: Strictly-increasing build number for app-bundle version sources (§13.4).
        required: false
        type: string
        default: ""
      promotion:
        description: Closed mutation phase; false runs proposal only.
        required: false
        type: boolean
        default: false
      merged-sha:
        required: false
        type: string
        default: ""
      intended-tag:
        required: false
        type: string
        default: ""
      intended-actor:
        required: false
        type: string
        default: ""
      checkpoint-digest:
        required: false
        type: string
        default: ""
      verifier-app-owner:
        description: GitHub owner whose Aviato verifier App installation is selected.
        required: false
        type: string
        default: ""
    secrets:
      AVIATO_VERIFIER_APP_ID:
        required: true
      AVIATO_VERIFIER_APP_PRIVATE_KEY:
        required: true
    outputs:
      released:
        description: Set to true when this run cut a release (tagged + published).
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: The released tag (X.Y.Z), set only when released is true.
        value: ${{ jobs.release.outputs.tag }}

# §5.9 (review #4): serialize release runs per repo. Two near-simultaneous default-branch runs
# (a release-bump merge + a follow-on push, or a re-run) could both reach the TAG phase and race
# the floating-major `git push -f`, briefly regressing the major pointer. Queue, never cancel.
concurrency:
  group: aviato-release-${{ github.repository }}
  cancel-in-progress: false

# C12-W1: no workflow-level grants — each job declares exactly what it needs.
permissions: {}

jobs:
  derive:
    name: Derive next version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      last: ${{ steps.derive.outputs.last }}
      next: ${{ inputs.promotion && inputs.intended-tag || steps.derive.outputs.next }}
      release: ${{ inputs.promotion && 'true' || steps.derive.outputs.release }}
      phase: ${{ steps.phase.outputs.phase }}
    env:
      AVIATO_REF: ${{ inputs.aviato-ref }}
      AVIATO_LOCAL_INSTALL: ${{ inputs.local-install }}
    steps:
      - name: Checkout proposal source (full history)
        if: ${{ !inputs.promotion }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          # The derive job never pushes; do not leave the job token in .git/config
          # while third-party code (pip install, aviato over full history) runs.
          persist-credentials: false

      - name: Set up Python
        if: ${{ !inputs.promotion }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}

      - name: Verify Aviato ref is pinned (§11.3 fail-closed)
        if: ${{ !inputs.promotion }}
        shell: bash
        run: |
          set -euo pipefail
          # R4-6: a privileged release run must install a PINNED Aviato, never a moving branch.
          # Accept an exact version (X.Y.Z[-alphaN|-betaN]) or a floating-major alias (N); reject
          # empty or any branch-like ref (e.g. main) so a mis-wired caller cannot silently run
          # release logic off unpinned Library code (§11.3). AVIATO_REF is the workflow env var.
          if [[ ! "${AVIATO_REF}" =~ ^[0-9]+(\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?)?$ ]]; then
            echo "::error::aviato-ref '${AVIATO_REF}' is not a pinned version (expected X.Y.Z, X.Y.Z-alphaN/-betaN, or a floating major N)."
            exit 1
          fi

      - name: Install Aviato (pinned)
        if: ${{ !inputs.promotion }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${AVIATO_LOCAL_INSTALL}" = "true" ]; then
            required_anchors=(
              "aviato/core/__init__.py"
              "aviato/library/bundles"
              "aviato/library/scaffold"
              "aviato/library/policy.yml"
              ".github/aviato.yaml"
            )
            for anchor in "${required_anchors[@]}"; do
              if [ ! -e "${anchor}" ]; then
                echo "::error::local-install is only valid for Library bootstrap; missing structural anchor ${anchor} (§5.10)."
                exit 1
              fi
            done
            if ! sed 's/#.*$//' .github/aviato.yaml | grep -Eiq '^[[:space:]]*bootstrap:[[:space:]]*true[[:space:]]*$'; then
              echo "::error::local-install requires .github/aviato.yaml to declare bootstrap: true (§5.10)."
              exit 1
            fi
            python -m pip install -e .
          else
            # library.repository copy; aviato validate binds this URL to packaged policy.yml.
            python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"
          fi

      - name: Derive next version
        id: derive
        if: ${{ !inputs.promotion }}
        shell: bash
        run: |
          set -euo pipefail
          # Latest EXACT final version tag only (X.Y.Z) — never the floating major (N)
          # and never a pre-release (X.Y.Z-alphaN/-betaN), which are not release points.
          # (next-version tolerates a pre-release base, but the bump baseline is the
          # last FINAL release.)
          last="$(git describe --tags --abbrev=0 --match '[0-9]*.[0-9]*.[0-9]*' --exclude '*-*' 2>/dev/null || echo 0.0.0)"
          range="${last}..HEAD"
          if ! git rev-parse "${last}" >/dev/null 2>&1; then range="HEAD"; fi
          # Commit messages are piped (never interpolated into a command) to aviato.
          next="$(git log "${range}" --format=%B%x00 | aviato next-version --current "${last}")"
          echo "last=${last}" >> "${GITHUB_OUTPUT}"
          echo "next=${next}" >> "${GITHUB_OUTPUT}"
          if [ "${next}" = "${last}" ]; then
            echo "release=false" >> "${GITHUB_OUTPUT}"
            echo "No releasable change in commit history; nothing to propose or tag."
          else
            echo "release=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Choose closed proposal or promotion phase
        id: phase
        if: ${{ inputs.promotion || steps.derive.outputs.release == 'true' }}
        shell: bash
        env:
          NEXT: ${{ steps.derive.outputs.next }}
          PROMOTION: ${{ inputs.promotion }}
        run: |
          set -euo pipefail
          if [ "${PROMOTION}" = "true" ]; then
            echo "phase=promotion" >> "${GITHUB_OUTPUT}"
          else
            echo "phase=propose" >> "${GITHUB_OUTPUT}"
          fi

  authority:
    name: Revalidate release authority
    runs-on: ubuntu-latest
    needs: derive
    if: ${{ needs.derive.outputs.release == 'true' }}
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    outputs:
      authorized: ${{ steps.proposal.outputs.authorized || steps.promotion.outputs.authorized }}
      checkpoint-run-id: ${{ steps.promotion.outputs.checkpoint-run-id }}
    steps:
      - name: Admit nonprivileged proposal phase
        id: proposal
        if: ${{ needs.derive.outputs.phase == 'propose' }}
        run: echo "authorized=true" >> "${GITHUB_OUTPUT}"

      - name: Mint verifier-only read token
        id: verifier-token
        if: ${{ needs.derive.outputs.phase == 'promotion' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        if: ${{ needs.derive.outputs.phase == 'promotion' }}
        env:
          GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=false&per_page=100" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments?per_page=100" >/dev/null

      - name: Revalidate exact signed authority and full live protection
        id: promotion
        if: ${{ needs.derive.outputs.phase == 'promotion' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT: ${{ inputs.intended-tag }}
          MERGED_SHA: ${{ inputs.merged-sha }}
          INTENDED_ACTOR: ${{ inputs.intended-actor }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          [[ "${NEXT}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "${MERGED_SHA}" =~ ^[0-9a-f]{40}$ && "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ ]]
          [ "${GITHUB_ACTOR}" = "${INTENDED_ACTOR}" ] || { echo "::error::executing actor mismatch"; exit 1; }
          repository="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}")"
          default_branch="$(jq -r .default_branch <<<"${repository}")"
          [ "${GITHUB_REF}" = "refs/heads/${default_branch}" ] || { echo "::error::promotion must execute from protected default-branch ref"; exit 1; }
          caller_path="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq .path)"
          [ "${caller_path}" = ".github/workflows/aviato-ci.yml" ] || { echo "::error::untrusted executing caller workflow"; exit 1; }
          caller_blob="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/contents/${caller_path}?ref=${default_branch}" --jq .sha)"
          [ "${caller_blob}" = "${GITHUB_WORKFLOW_SHA}" ] || { echo "::error::executing caller blob is not current default-branch code"; exit 1; }
          intake_path=".github/workflows/aviato-protection-checkpoint.yml"
          intake_blob="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/contents/${intake_path}?ref=${default_branch}" --jq .sha)"
          runs="$(gh api --paginate --slurp -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/workflows/aviato-protection-checkpoint.yml/runs?event=workflow_dispatch&branch=${default_branch}&status=success&per_page=100")"
          mapfile -t run_ids < <(jq -r --arg branch "${default_branch}" --arg sha "${MERGED_SHA}" '.[]?.workflow_runs[]? | select(.path == ".github/workflows/aviato-protection-checkpoint.yml" and .event == "workflow_dispatch" and .status == "completed" and .conclusion == "success" and .head_branch == $branch and .head_sha == $sha) | .id' <<<"${runs}")
          matches=()
          rm -rf "${RUNNER_TEMP}/promotion-checkpoints"
          mkdir -p "${RUNNER_TEMP}/promotion-checkpoints"
          for run_id in "${run_ids[@]}"; do
            directory="${RUNNER_TEMP}/promotion-checkpoints/${run_id}"
            mkdir -p "${directory}"
            gh run download "${run_id}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${directory}" >/dev/null 2>&1 || continue
            candidate="${directory}/verified-checkpoint-envelope.json"
            [ -f "${candidate}" ] || continue
            [ "$(shasum -a 256 "${candidate}" | awk '{print $1}')" = "${CHECKPOINT_DIGEST}" ] || continue
            gh attestation verify "${candidate}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || continue
            jq -e --arg repo "${GITHUB_REPOSITORY}" --arg tag "${NEXT}" --arg sha "${MERGED_SHA}" --arg actor "${INTENDED_ACTOR}" --arg path "${intake_path}" --arg blob "${intake_blob}" --arg ref "refs/heads/${default_branch}" '.checkpoint.repository == $repo and .checkpoint.tag == $tag and .checkpoint.sha == $sha and .checkpoint.intended_actor == $actor and .checkpoint.reviewer != $actor and .checkpoint.workflow_path == $path and .checkpoint.workflow_blob_sha == $blob and .checkpoint.workflow_ref == $ref and (.checkpoint.expires_at - .checkpoint.issued_at) <= 900 and .checkpoint.issued_at <= (now + 30) and .checkpoint.expires_at > now' "${candidate}" >/dev/null || continue
            matches+=("${run_id}:${candidate}")
          done
          [ "${#matches[@]}" -eq 1 ] || { echo "::error::promotion requires exactly one current attested checkpoint; found ${#matches[@]}"; exit 1; }
          selected_run="${matches[0]%%:*}"
          envelope="${matches[0]#*:}"
          verifier_repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${envelope}")"
          verifier_ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${envelope}")"
          verifier_path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${envelope}")"
          verifier_blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${envelope}")"
          verifier_json="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${verifier_repo}/contents/${verifier_path}" -f "ref=${verifier_ref}")"
          # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute the locally Git-hash-bound verifier only in memory.
          /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C AVIATO_VERIFIER_JSON="${verifier_json}" AVIATO_VERIFIER_BLOB="${verifier_blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          echo "checkpoint-run-id=${selected_run}" >> "${GITHUB_OUTPUT}"
          echo "authorized=true" >> "${GITHUB_OUTPUT}"

  release:
    name: Cut release
    runs-on: ubuntu-latest
    needs: [derive, authority]
    if: ${{ needs.derive.outputs.release == 'true' && needs.authority.outputs.authorized == 'true' }}
    permissions:
      contents: write
      pull-requests: write
      # §5.9 release-PR checks: lets the propose phase `gh workflow run` the caller at
      # the release branch (workflow_dispatch is exempt from GITHUB_TOKEN event
      # suppression), so required status checks can report on the release PR.
      actions: write
    outputs:
      released: ${{ steps.promote.outputs.released }}
      # R2-1-REL-TAG: sourced from the TAG-phase step (set only when a tag was cut), so it is empty
      # on a propose/no-release run — matching the `tag` output's documented "set only when released".
      tag: ${{ steps.promote.outputs.tag }}
    env:
      GH_TOKEN: ${{ github.token }}
      AVIATO_REF: ${{ inputs.aviato-ref }}
      AVIATO_LOCAL_INSTALL: ${{ inputs.local-install }}
      BUILD_NUMBER: ${{ inputs.build-number || github.run_number }}
    steps:
      - name: Checkout proposal source (full history)
        if: ${{ !inputs.promotion }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          # This job pushes (release branch, tags, floating major) — credentials persist.
          persist-credentials: true

      - name: Set up Python
        if: ${{ !inputs.promotion }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}

      - name: Verify Aviato ref is pinned (§11.3 fail-closed)
        if: ${{ !inputs.promotion }}
        shell: bash
        run: |
          set -euo pipefail
          # R4-6 (re-asserted in the WRITE job): each privileged job is self-contained — a future
          # edit cannot detach the write job from the pin guard by reordering jobs.
          if [[ ! "${AVIATO_REF}" =~ ^[0-9]+(\.[0-9]+\.[0-9]+(-(alpha|beta)[0-9]+)?)?$ ]]; then
            echo "::error::aviato-ref '${AVIATO_REF}' is not a pinned version (expected X.Y.Z, X.Y.Z-alphaN/-betaN, or a floating major N)."
            exit 1
          fi

      - name: Install Aviato (pinned)
        if: ${{ !inputs.promotion }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${AVIATO_LOCAL_INSTALL}" = "true" ]; then
            required_anchors=(
              "aviato/core/__init__.py"
              "aviato/library/bundles"
              "aviato/library/scaffold"
              "aviato/library/policy.yml"
              ".github/aviato.yaml"
            )
            for anchor in "${required_anchors[@]}"; do
              if [ ! -e "${anchor}" ]; then
                echo "::error::local-install is only valid for Library bootstrap; missing structural anchor ${anchor} (§5.10)."
                exit 1
              fi
            done
            if ! sed 's/#.*$//' .github/aviato.yaml | grep -Eiq '^[[:space:]]*bootstrap:[[:space:]]*true[[:space:]]*$'; then
              echo "::error::local-install requires .github/aviato.yaml to declare bootstrap: true (§5.10)."
              exit 1
            fi
            python -m pip install -e .
          else
            # library.repository copy; aviato validate binds this URL to packaged policy.yml.
            python -m pip install "git+https://github.com/amattas/aviato@${AVIATO_REF}"
          fi

      - name: Mint verifier-only read token
        id: verifier-token
        if: ${{ inputs.promotion }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.AVIATO_VERIFIER_APP_ID }}
          private-key: ${{ secrets.AVIATO_VERIFIER_APP_PRIVATE_KEY }}
          owner: ${{ inputs.verifier-app-owner || github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          skip-token-revoke: false
          permission-administration: read
          permission-actions: read
          permission-contents: read
          permission-metadata: read
      - name: Fail-closed verifier capability probe
        if: ${{ inputs.promotion }}
        env:
          GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/branches/${branch}/protection" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=false&per_page=100" >/dev/null
          gh api --paginate -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments?per_page=100" >/dev/null

      - name: Propose release PR
        if: ${{ needs.derive.outputs.phase == 'propose' }}
        shell: bash
        env:
          NEXT: ${{ needs.derive.outputs.next }}
          LAST: ${{ needs.derive.outputs.last }}
        run: |
          set -euo pipefail
          branch="release/${NEXT}"
          git config user.name aviato-bot
          git config user.email aviato-bot@users.noreply.github.com
          git checkout -B "${branch}"
          # §5.9: the version-source bump MUST succeed before proposing — no release PR
          # without a bump. The strictly-increasing build number is the run number.
          aviato bump-version "${NEXT}" . --build-number "${BUILD_NUMBER}"
          range="${LAST}..HEAD"
          if ! git rev-parse "${LAST}" >/dev/null 2>&1; then range="HEAD"; fi
          git log "${range}" --pretty=format:'- %s' > /tmp/changelog.md || true
          # §5.9 bootstrap: a version-source ALREADY at NEXT (seeded before the first
          # release existed — a fresh onboard, or the Library's own first cut) makes the
          # bump a no-op; the release PR then carries an empty marker commit instead of
          # dying on `git commit` with nothing staged. Safe: the TAG phase keys on the
          # commit SUBJECT and independently re-proves the manifest equals NEXT.
          if git diff --quiet; then
            git commit --allow-empty -m "chore(release): ${NEXT}"
          else
            git commit -am "chore(release): ${NEXT}"
          fi
          git push -f origin "${branch}"
          body="$(printf 'Automated release PR (§5.9). Merging this bumps the version-source to %s; the merge to the default branch then tags %s and runs deploy in the same run.\n\n## Changes\n' "${NEXT}" "${NEXT}"; cat /tmp/changelog.md)"
          if existing="$(gh pr list --head "${branch}" --base "${GITHUB_REF_NAME}" --state open --json number --jq '.[0].number' 2>/dev/null)" && [ -n "${existing}" ]; then
            gh pr edit "${existing}" --title "chore(release): ${NEXT}" --body "${body}"
            echo "Updated release PR #${existing} for ${NEXT}."
          else
            gh pr create --base "${GITHUB_REF_NAME}" --head "${branch}" --title "chore(release): ${NEXT}" --body "${body}"
            echo "Opened release PR for ${NEXT}."
          fi
          # §5.9 release-PR checks: every event from this job's GITHUB_TOKEN push is
          # suppressed EXCEPT workflow_dispatch/repository_dispatch, so the release
          # branch never triggers CI on its own and required status checks could never
          # report on the release PR — under a required_status_checks ruleset (which
          # has no admin override unless bypass actors are configured) that would make
          # release PRs permanently unmergeable. Dispatch this run's own caller at the
          # release branch so the PR carries the same check contexts a human branch
          # would. WARN (not fail) on dispatch errors: a caller not yet re-synced to
          # declare workflow_dispatch keeps its previous behavior — visibly pending
          # checks on the PR, never a silent wrong state.
          workflow_path="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.path')"
          if ! gh workflow run "${workflow_path##*/}" --ref "${branch}"; then
            echo "::warning::Could not dispatch ${workflow_path##*/} at ${branch}; release-PR status checks will be missing until the caller declares workflow_dispatch (re-run aviato sync)."
          fi

      - name: Verify checkpoint and perform closed promotion
        id: promote
        if: ${{ needs.derive.outputs.phase == 'promotion' }}
        shell: bash
        env:
          NEXT: ${{ inputs.intended-tag }}
          MERGED_SHA: ${{ inputs.merged-sha }}
          INTENDED_ACTOR: ${{ inputs.intended-actor }}
          CHECKPOINT_RUN_ID: ${{ needs.authority.outputs.checkpoint-run-id }}
          CHECKPOINT_DIGEST: ${{ inputs.checkpoint-digest }}
          VERIFIER_GH_TOKEN: ${{ steps.verifier-token.outputs.token }}
        run: |
          set -euo pipefail
          [[ "${NEXT}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || { echo "::error::invalid intended tag"; exit 1; }
          [[ "${MERGED_SHA}" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::invalid merged SHA"; exit 1; }
          [[ "${CHECKPOINT_RUN_ID}" =~ ^[1-9][0-9]*$ && "${CHECKPOINT_DIGEST}" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::missing independently selected checkpoint"; exit 1; }
          [ "${GITHUB_ACTOR}" = "${INTENDED_ACTOR}" ] || { echo "::error::actual actor mismatch"; exit 1; }
          default_branch="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          branch_sha="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/git/ref/heads/${default_branch}" --jq .object.sha)"
          compare="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/compare/${MERGED_SHA}...${branch_sha}" --jq .status)"
          [ "${compare}" = "ahead" ] || [ "${compare}" = "identical" ] || { echo "::error::merged SHA is not reachable from default branch"; exit 1; }
          run="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/runs/${CHECKPOINT_RUN_ID}")"
          jq -e --arg branch "${default_branch}" --arg actor "${INTENDED_ACTOR}" --arg sha "${MERGED_SHA}" '
            .event == "workflow_dispatch" and .status == "completed" and .conclusion == "success"
            and .path == ".github/workflows/aviato-protection-checkpoint.yml"
            and .head_branch == $branch and .head_sha == $sha
          ' <<<"${run}" >/dev/null || { echo "::error::checkpoint run mismatch"; exit 1; }
          mkdir -p "${RUNNER_TEMP}/checkpoint"
          gh run download "${CHECKPOINT_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name verified-checkpoint --dir "${RUNNER_TEMP}/checkpoint"
          checkpoint="${RUNNER_TEMP}/checkpoint/verified-checkpoint-envelope.json"
          [ "$(shasum -a 256 "${checkpoint}" | awk '{print $1}')" = "${CHECKPOINT_DIGEST}" ] || { echo "::error::checkpoint digest mismatch"; exit 1; }
          gh attestation verify "${checkpoint}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          jq -e --arg repo "${GITHUB_REPOSITORY}" --arg tag "${NEXT}" --arg sha "${MERGED_SHA}" --arg actor "${INTENDED_ACTOR}" '
            .checkpoint.repository == $repo and .checkpoint.tag == $tag and .checkpoint.sha == $sha
            and .checkpoint.intended_actor == $actor and .checkpoint.submitter == $actor and .checkpoint.reviewer != $actor
            and .checkpoint.authority_snapshot.schema == "aviato-protection-authority-snapshot/v1"
            and (.checkpoint.issued_at | type == "number") and .checkpoint.issued_at <= (now + 30)
            and (.checkpoint.expires_at | type == "number") and .checkpoint.expires_at > now
          ' "${checkpoint}" >/dev/null || { echo "::error::missing, stale, or mismatched checkpoint"; exit 1; }
          reviewer="$(jq -r .checkpoint.reviewer "${checkpoint}")"
          key_id="$(jq -r .key_id "${checkpoint}")"
          [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/collaborators/${reviewer}/permission" --jq .permission)" = "admin" ]
          public_key="$(gh api --paginate --slurp -H 'Cache-Control: no-cache' "users/${reviewer}/ssh_signing_keys?per_page=100" --jq "[flatten[] | select((.id|tostring) == \"${key_id}\")] | if length == 1 then .[0].key else error(\"signing key must be unique\") end")"
          [ -n "${public_key}" ]
          authority_dir="$(mktemp -d)"
          printf '%s %s\n' "${reviewer}" "${public_key}" > "${authority_dir}/allowed"
          jq -cS .checkpoint "${checkpoint}" > "${authority_dir}/message"
          jq -r .signature "${checkpoint}" | python3 -c 'import base64,sys; value=sys.stdin.read().strip(); sys.stdout.buffer.write(base64.urlsafe_b64decode(value + "=" * (-len(value) % 4)))' > "${authority_dir}/signature"
          ssh-keygen -Y verify -f "${authority_dir}/allowed" -I "${reviewer}" -n aviato -s "${authority_dir}/signature" < "${authority_dir}/message"
          while IFS= read -r environment_name; do
            [ "$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/environments/${environment_name}" --jq .can_admins_bypass)" = "false" ]
          done < <(jq -r '.checkpoint.authority_snapshot.environments | keys[]' "${checkpoint}")
          verifier_repo="$(jq -r .checkpoint.authority_snapshot.guard.verifier.repository "${checkpoint}")"
          verifier_ref="$(jq -r .checkpoint.authority_snapshot.guard.verifier.ref "${checkpoint}")"
          verifier_path="$(jq -r .checkpoint.authority_snapshot.guard.verifier.path "${checkpoint}")"
          verifier_blob="$(jq -r .checkpoint.authority_snapshot.guard.verifier.blob_sha "${checkpoint}")"
          verifier_json="$(GH_TOKEN="${VERIFIER_GH_TOKEN}" gh api --method GET -H 'Cache-Control: no-cache' "repos/${verifier_repo}/contents/${verifier_path}" -f "ref=${verifier_ref}")"
          aviato_verify_authority() {
            local envelope="$1"
            # AVIATO_SECURE_VERIFIER_BOOTSTRAP: execute the locally Git-hash-bound verifier only in memory.
            /usr/bin/env -i PATH=/usr/bin:/bin LANG=C LC_ALL=C AVIATO_VERIFIER_JSON="${verifier_json}" AVIATO_VERIFIER_BLOB="${verifier_blob}" GH_TOKEN="${VERIFIER_GH_TOKEN}" /usr/bin/python3 -I - "${envelope}" "${GITHUB_REPOSITORY}" <<'PY'
          import base64, hashlib, json, os, sys
          payload = json.loads(os.environ.pop("AVIATO_VERIFIER_JSON")); expected = os.environ.pop("AVIATO_VERIFIER_BLOB")
          if payload.get("encoding") != "base64" or not isinstance(payload.get("content"), str): raise SystemExit("invalid verifier encoding")
          content = payload["content"]
          if any(character.isspace() and character not in "\r\n" for character in content): raise SystemExit("invalid verifier whitespace")
          encoded = content.replace("\r", "").replace("\n", "")
          if len(encoded) > 349_528: raise SystemExit("invalid verifier size")
          body = base64.b64decode(encoded, validate=True)
          if not 1 <= len(body) <= 262_144: raise SystemExit("invalid verifier size")
          actual = hashlib.sha1(b"blob " + str(len(body)).encode("ascii") + b"\0" + body).hexdigest()
          if actual != expected or payload.get("sha") != expected: raise SystemExit("verifier blob mismatch")
          sys.argv = ["authority_verifier.py", "--envelope", sys.argv[1], "--repository", sys.argv[2]]
          exec(compile(body, "<checkpoint-bound-authority-verifier>", "exec"), {"__name__": "__main__", "__file__": "<memory>"})
          PY
          }
          workflow_blob="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/aviato-protection-checkpoint.yml?ref=${default_branch}" --jq .sha)"
          [ "${workflow_blob}" = "$(jq -r .checkpoint.workflow_blob_sha "${checkpoint}")" ] || { echo "::error::trusted default-branch checkpoint workflow blob changed"; exit 1; }
          ci_run="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/actions/workflows/aviato-ci.yml/runs?head_sha=${MERGED_SHA}&event=push&per_page=20" --jq '[.workflow_runs[] | select(.head_sha == "'"${MERGED_SHA}"'" and .status == "completed" and .conclusion == "success")] | sort_by(.run_attempt) | last // empty')"
          [ -n "${ci_run}" ] || { echo "::error::exact merged SHA has no successful CI workflow"; exit 1; }
          effective_rules="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/rules/branches/${default_branch}")"
          jq -e 'any(.[]?; .type == "pull_request") and any(.[]?; .type == "required_status_checks")' <<<"${effective_rules}" >/dev/null || { echo "::error::fresh effective default-branch protection is incomplete"; exit 1; }

          peel_tag() {
            local name="$1" type sha count=0
            read -r type sha < <(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/git/ref/tags/${name}" --jq '.object.type + " " + .object.sha') || return 1
            while [ "${type}" = "tag" ] && [ "${count}" -lt 5 ]; do
              read -r type sha < <(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/git/tags/${sha}" --jq '.object.type + " " + .object.sha') || return 1
              count=$((count + 1))
            done
            [ "${type}" = "commit" ] || return 1
            printf '%s' "${sha}"
          }
          # Correlated idempotence: annotated and lightweight tags are accepted only
          # when their final peeled commit equals the exact checkpoint-bound SHA.
          existing="$(peel_tag "${NEXT}" 2>/dev/null || true)"
          if [ -n "${existing}" ] && [ "${existing}" != "${MERGED_SHA}" ]; then
            echo "::error::existing tag is not correlated with this promotion"
            exit 1
          fi
          if [ -z "${existing}" ]; then
            aviato_verify_authority "${checkpoint}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${NEXT}" -f sha="${MERGED_SHA}" >/dev/null 2>&1 || true
            [ "$(peel_tag "${NEXT}" 2>/dev/null || true)" = "${MERGED_SHA}" ] || { echo "::error::tag response lost and exact peeled readback did not converge"; exit 1; }
          fi
          major="$(printf '%s' "${NEXT}" | sed -E 's/^([0-9]+).*/\1/')"
          highest="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/tags?per_page=100" --jq '.[].name' \
            | grep -E "^${major}\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)"
          if [ "${highest}" = "${NEXT}" ]; then
            { aviato_verify_authority "${checkpoint}" && \
              gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${major}" -f sha="${MERGED_SHA}" -F force=true >/dev/null 2>&1 || \
              aviato_verify_authority "${checkpoint}" && \
              gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${major}" -f sha="${MERGED_SHA}" >/dev/null 2>&1 || true; }
            [ "$(peel_tag "${major}" 2>/dev/null || true)" = "${MERGED_SHA}" ] || { echo "::error::floating tag response was ambiguous or raced"; exit 1; }
          else
            echo "Not advancing floating major ${major}: ${NEXT} is not the highest release (${highest})."
          fi
          release_body="$(printf 'Aviato-Checkpoint-Run: %s\nAviato-Checkpoint-Digest: %s\nAviato-Intended-Actor: %s\nAviato-Merged-SHA: %s' "${CHECKPOINT_RUN_ID}" "${CHECKPOINT_DIGEST}" "${INTENDED_ACTOR}" "${MERGED_SHA}")"
          existing_release="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/releases/tags/${NEXT}" 2>/dev/null || true)"
          if [ -z "${existing_release}" ]; then
            aviato_verify_authority "${checkpoint}"
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" -f tag_name="${NEXT}" -f target_commitish="${MERGED_SHA}" -f name="${NEXT}" -f body="${release_body}" >/dev/null 2>&1 || true
            existing_release="$(gh api -H 'Cache-Control: no-cache' "repos/${GITHUB_REPOSITORY}/releases/tags/${NEXT}" 2>/dev/null || true)"
          fi
          actual_release_body="$(jq -r .body <<<"${existing_release}")"
          [ "$(jq -r .tag_name <<<"${existing_release}")" = "${NEXT}" ] \
            && [ "$(sed -n 's/^Aviato-Checkpoint-Run: //p' <<<"${actual_release_body}" | head -n1)" = "${CHECKPOINT_RUN_ID}" ] \
            && [ "$(sed -n 's/^Aviato-Checkpoint-Digest: //p' <<<"${actual_release_body}" | head -n1)" = "${CHECKPOINT_DIGEST}" ] \
            && [ "$(sed -n 's/^Aviato-Intended-Actor: //p' <<<"${actual_release_body}" | head -n1)" = "${INTENDED_ACTOR}" ] \
            && [ "$(sed -n 's/^Aviato-Merged-SHA: //p' <<<"${actual_release_body}" | head -n1)" = "${MERGED_SHA}" ] \
            || { echo "::error::release response was ambiguous or marker correlation failed"; exit 1; }
          echo "released=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${NEXT}" >> "${GITHUB_OUTPUT}"
          echo "Promoted ${NEXT} from checkpoint ${CHECKPOINT_DIGEST}."
