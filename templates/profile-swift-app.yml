name: Aviato Swift App

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "*.*.*"
  schedule:
    - cron: "23 5 * * 1"

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release-gate: actions:read; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-swift-ci.yml@main
    with:
      xcode-version: ""
      working-directory: "."
      scheme: "App"
      workspace: "App.xcworkspace"
      project: ""
      destination: "platform=iOS Simulator,name=iPhone 16"
      # §11.3 day-zero exception: swift-format/swiftlint install via Homebrew UNPINNED — neither
      # ships a versioned formula and `brew install` fetches latest (not the runner snapshot).
      # Checksum-pinned release binaries are a documented post-day-zero hardening (REQUIREMENTS §11.3).
      install-command: "brew install swift-format swiftlint"
      run-install: true

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@main
    with:
      codeql-languages: "swift"
      codeql-runner: macos-latest

  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@main

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security, common-lint]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@main
    with:
      aviato-ref: main
      local-install: false
      build-number: ""

  # Gate before deploy. Two entry points: IN-RUN (release just tagged on this push;
  # release-tag = its output) or a manual tag push (classic tag-ref context).
  release-gate:
    needs: [release]
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@main
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}

  app-store-connect:
    needs: [release, release-gate, security]
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-app-store-connect.yml@main
    with:
      release-tag: ${{ needs.release.outputs.tag }}
      environment-name: "app-store-connect"
      xcode-version: ""
      working-directory: "."
      scheme: "App"
      workspace: "App.xcworkspace"
      project: ""
      bundle-identifier: "com.example.app"
      team-id: "TEAMID1234"
      export-options-plist: ""
      export-method: "app-store"
      version-command: ""
    secrets:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
