name: Aviato Swift App

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "*"

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release-gate: actions:read; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-swift-ci.yml@main
    with:
      scheme: "App"
      workspace: "App.xcworkspace"
      destination: "platform=iOS Simulator,name=iPhone 16"
      install-command: "brew install swiftformat swiftlint"
      run-install: true

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@main
    with:
      codeql-languages: "swift"
      codeql-runner: macos-latest

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@main
    with:
      aviato-ref: main

  release-gate:
    if: ${{ github.ref_type == 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@main
    with:
      default-branch: main
      require-merged-pr: true

  app-store-connect:
    if: ${{ github.ref_type == 'tag' }}
    needs: [release-gate, security]
    uses: amattas/aviato/.github/workflows/reusable-app-store-connect.yml@main
    with:
      environment-name: app-store-connect
      scheme: "App"
      workspace: "App.xcworkspace"
      bundle-identifier: "com.example.app"
      team-id: "TEAMID1234"
      export-options-plist: ExportOptions.plist
      version-command: |
        base_version="${RELEASE_TAG%%-*}"
        agvtool new-marketing-version "${base_version}"
        agvtool new-version -all "${BUILD_NUMBER}"
    secrets:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}

