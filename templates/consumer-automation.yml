name: Aviato Drift Detection
'on':
  schedule:
    - cron: 17 6 * * 1
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  drift:
    uses: amattas/aviato/.github/workflows/reusable-consumer-automation.yml@EXAMPLE_PIN
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false
    secrets:
      settings-token: ${{ secrets.AVIATO_SETTINGS_TOKEN }}
