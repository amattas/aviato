name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  node:
    uses: amattas/aviato/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: "22"
      install-command: "npm ci"
      lint-command: "npm run lint --if-present"
      test-command: "npm test --if-present"
      build-command: "npm run build --if-present"
      run-install: true
      run-lint: true
      run-tests: true
      run-build: true
