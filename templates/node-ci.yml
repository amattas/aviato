name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  node:
    uses: amattas/aviato/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: "22"
      install-command: "npm ci"
      # Required gates are explicit (no --if-present): a missing script fails verify (§12.2).
      lint-command: "npx eslint ."
      test-command: "npm test"
      build-command: "npm run build"
      run-install: true
      run-lint: true
      run-tests: true
      # Type-check is selected by the declaration's language-variant enum (§12.2):
      #   typescript -> run-typecheck: true (the default, blocking)
      #   javascript -> run-typecheck: false
      # (The reusable workflow also auto-skips tsc when no tsconfig.json is present.)
      run-typecheck: true
