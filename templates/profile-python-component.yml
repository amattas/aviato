name: Aviato Python Component

# Zero-deploy profile (§10.3/§15): verify + security baseline + release gate, with
# NO deployment plug-in. The GitHub release/tag is the only output (e.g. consumed
# by a HACS integration or a not-yet-published library).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "*.*.*"
  schedule:
    - cron: "23 5 * * 1"

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release-gate: actions:read; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-python-ci.yml@EXAMPLE_PIN
    with:
      python-version: "3.12"
      install-command: "python -m pip install -e .[dev]"
      lint-command: "python -m ruff check ."
      test-command: "python -m pytest --cov --cov-report=term-missing"

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@EXAMPLE_PIN
    with:
      codeql-languages: "python"

  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@EXAMPLE_PIN

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security, common-lint]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@EXAMPLE_PIN
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false

  # Gate before deploy. Two entry points: IN-RUN (release just tagged on this push;
  # release-tag = its output) or a manual tag push (classic tag-ref context).
  release-gate:
    needs: [release]
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@EXAMPLE_PIN
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}
