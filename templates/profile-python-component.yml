name: Aviato Python Component
'on':
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - '*.*.*'
  schedule:
    - cron: 23 5 * * 1
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-python-ci.yml@EXAMPLE_PIN
    permissions:
      contents: read
    with:
      python-version: '3.12'
      install-command: python -m pip install -e .[dev]
      lint-command: python -m ruff check .
      test-command: python -m pytest --cov --cov-report=term-missing
      build-command: python -m build
      typecheck-command: python -m mypy --strict .
      run-typecheck: true
      run-build: true
  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@EXAMPLE_PIN
    permissions:
      contents: read
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false
  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs:
      - ci
      - security
      - common-lint
    uses: amattas/aviato/.github/workflows/reusable-release.yml@EXAMPLE_PIN
    permissions:
      contents: write
      pull-requests: write
      actions: write
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false
  release-gate:
    needs:
      - release
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@EXAMPLE_PIN
    permissions:
      actions: read
      contents: read
      pull-requests: read
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}
  security:
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@EXAMPLE_PIN
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    with:
      codeql-languages: python
      codeql-runner: ubuntu-latest
  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - ci
      - security
      - common-lint
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish verify status
        env:
          STATUS_CONTEXT: ci / Python CI
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: security / Security baseline heartbeat
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: common-lint / Common lint
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' ||
            'failure' }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
