name: Aviato Node Service

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags:
      - "*.*.*"
  schedule:
    - cron: "23 5 * * 1"
  # §5.9: lets the release propose phase dispatch this workflow at the
  # release/<next> branch (workflow_dispatch is exempt from GITHUB_TOKEN event
  # suppression), so the release PR reports the same required status checks as
  # any human branch.
  workflow_dispatch:

# Granted to the UNION of every called reusable workflow's permissions: a caller
# cannot elevate the token for a called workflow, so it must grant >= their needs
# (release propose-dispatch: actions:write; GHCR/PyPI provenance: id-token+attestations:write).
permissions:
  contents: write
  pull-requests: write
  security-events: write
  actions: write
  statuses: write
  packages: write
  id-token: write
  attestations: write

jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-node-ci.yml@EXAMPLE_PIN
    with:
      node-version: "24"
      install-command: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
      # Required gates are explicit (no --if-present): a missing script fails the
      # verify pipeline (§12.2). Format-check (Prettier) and TS type-check (tsc,
      # auto-skipped when there is no tsconfig.json, i.e. language-variant=javascript)
      # use the reusable workflow defaults.
      lint-command: "npx --no-install eslint ."
      test-command: "npm test"
      build-command: "npm run build"
      run-typecheck: true
      run-build: true

  security:
    # Runs on PRs AND on the release tag, so source scans gate the verify pipeline
    # and are re-run on the release ref before any deploy (§2.13/§5.14).
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@EXAMPLE_PIN
    with:
      codeql-languages: "javascript-typescript"

  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@EXAMPLE_PIN
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false

  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs: [ci, security, common-lint]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish Node CI status
        env:
          STATUS_CONTEXT: "ci / Node CI"
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure' }}
        run: &publish_status |
          set -euo pipefail
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="${STATUS_CONTEXT}"
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: "security / Security baseline heartbeat"
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure' }}
        run: *publish_status
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: "common-lint / Common lint"
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' || 'failure' }}
        run: *publish_status

  release:
    if: ${{ github.ref_type != 'tag' && github.event_name == 'push' }}
    needs: [ci, security, common-lint]
    uses: amattas/aviato/.github/workflows/reusable-release.yml@EXAMPLE_PIN
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false

  # Gate before deploy. Two entry points: IN-RUN (release just tagged on this push;
  # release-tag = its output) or a manual tag push (classic tag-ref context).
  release-gate:
    needs: [release]
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@EXAMPLE_PIN
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}

  docker:
    needs: [release, release-gate, security]
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-docker-ghcr.yml@EXAMPLE_PIN
    with:
      context: "."
      dockerfile: "Dockerfile"
      platforms: "linux/amd64"
      release-tag: ${{ needs.release.outputs.tag }}
      gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
