name: Aviato Node Service
'on':
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: 23 5 * * 1
  workflow_dispatch:
    inputs:
      checkpoint-digest:
        default: ''
        description: Canonical checkpoint digest
        required: false
        type: string
      checkpoint-run-id:
        default: ''
        description: Verified checkpoint intake run
        required: false
        type: string
      checkpoint-workflow:
        default: aviato-protection-checkpoint.yml
        description: Generator-owned intake workflow
        required: true
        type: string
      intended-actor:
        default: ''
        description: Exact signed release actor
        required: false
        type: string
      intended-tag:
        default: ''
        description: Exact SemVer tag
        required: false
        type: string
      merged-sha:
        default: ''
        description: Exact merged default-branch SHA
        required: false
        type: string
      promotion:
        default: false
        description: Closed release promotion mode
        required: true
        type: boolean
permissions:
  contents: read
jobs:
  ci:
    if: ${{ github.ref_type != 'tag' && github.event_name != 'schedule' }}
    uses: amattas/aviato/.github/workflows/reusable-node-ci.yml@EXAMPLE_PIN
    permissions:
      contents: read
    with:
      node-version: '24'
      install-command: if [ -f package-lock.json ]; then npm ci; else npm install;
        fi
      lint-command: npx --no-install eslint .
      test-command: npm test
      build-command: npm run build
      run-typecheck: true
      run-build: true
  common-lint:
    if: ${{ github.ref_type != 'tag' }}
    uses: amattas/aviato/.github/workflows/reusable-common-lint.yml@EXAMPLE_PIN
    permissions:
      contents: read
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false
  docker:
    needs:
      - release
      - release-gate
      - security
    if: ${{ always() && needs.release-gate.result == 'success' && needs.security.result
      == 'success' && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-docker-ghcr.yml@EXAMPLE_PIN
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    with:
      context: .
      dockerfile: Dockerfile
      platforms: linux/amd64
      release-tag: ${{ needs.release.outputs.tag }}
      gated-sha: ${{ needs.release-gate.outputs.gated-sha }}
      environment-name: ghcr
  release:
    if: ${{ github.ref_type != 'tag' && (github.event_name == 'push' || (github.event_name
      == 'workflow_dispatch' && inputs.promotion)) }}
    needs:
      - ci
      - security
      - common-lint
    uses: amattas/aviato/.github/workflows/reusable-release.yml@EXAMPLE_PIN
    permissions:
      contents: write
      pull-requests: write
      actions: write
    with:
      aviato-ref: EXAMPLE_PIN
      local-install: false
      checkpoint-workflow: ${{ inputs.checkpoint-workflow }}
      promotion: ${{ inputs.promotion || false }}
      merged-sha: ${{ inputs.merged-sha || '' }}
      intended-tag: ${{ inputs.intended-tag || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      checkpoint-run-id: ${{ inputs.checkpoint-run-id || '' }}
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
  release-gate:
    needs:
      - release
    if: ${{ always() && (github.ref_type == 'tag' || needs.release.outputs.released
      == 'true') }}
    uses: amattas/aviato/.github/workflows/reusable-release-gate.yml@EXAMPLE_PIN
    permissions:
      actions: read
      contents: read
      pull-requests: read
    with:
      default-branch: main
      require-merged-pr: true
      release-tag: ${{ needs.release.outputs.tag }}
      checkpoint-run-id: ${{ inputs.checkpoint-run-id || '' }}
      checkpoint-digest: ${{ inputs.checkpoint-digest || '' }}
      intended-actor: ${{ inputs.intended-actor || '' }}
      merged-sha: ${{ inputs.merged-sha || '' }}
  security:
    uses: amattas/aviato/.github/workflows/reusable-security-baseline.yml@EXAMPLE_PIN
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      actions: read
    with:
      codeql-languages: javascript-typescript
      codeql-runner: ubuntu-latest
  status-bridge:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - ci
      - security
      - common-lint
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish verify status
        env:
          STATUS_CONTEXT: ci / Node CI
          STATUS_STATE: ${{ needs.ci.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish security baseline status
        env:
          STATUS_CONTEXT: security / Security baseline heartbeat
          STATUS_STATE: ${{ needs.security.result == 'success' && 'success' || 'failure'
            }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
      - name: Publish common lint status
        env:
          STATUS_CONTEXT: common-lint / Common lint
          STATUS_STATE: ${{ needs.common-lint.result == 'success' && 'success' ||
            'failure' }}
        run: 'set -euo pipefail

          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}"
          -f state="${STATUS_STATE}" -f context="${STATUS_CONTEXT}"

          '
